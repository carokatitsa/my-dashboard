<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Bronze Archive Pro | LingoArchive</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

  <style>
    :root { 
      --bg-dark: #0d1117; --bg-sidebar: #161b22; --accent: #cd7f32; 
      --gold: #f1c40f; --text: #c9d1d9; --border: #30363d;
      --edit-mode: #2980b9;
    }
    body { margin:0; font-family: -apple-system, sans-serif; background: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    header { background: var(--bg-sidebar); padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 1001; flex-shrink: 0; }
    nav a { color: var(--text); text-decoration: none; font-size: 14px; margin-left: 15px; }

    #lang-switcher { display: flex; gap: 5px; margin-right: 15px; }
    #lang-switcher button { background: #333; color: #fff; border: 1px solid #555; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 11px; }
    #lang-switcher button.active { background: var(--accent); border-color: #fff; }

    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 360px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; overflow-y: auto; z-index: 10; }

    .map-container { flex: 1; position: relative; background: #2b2317; display: flex; flex-direction: column; }
    #map { flex: 1; width: 100%; filter: sepia(0.6) contrast(1.1) brightness(0.9) hue-rotate(-10deg); }

    .input-group { background: #0d1117; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; transition: 0.3s; }
    .input-group.editing { border: 2px solid var(--edit-mode); box-shadow: 0 0 15px rgba(41, 128, 185, 0.3); }
    
    input, textarea { background: #161b22; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; outline: none; }
    
    .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
    .btn-main.editing { background: var(--edit-mode); }
    
    .country-card { background: #0d1117; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
    .country-header { padding: 10px; background: #1c2128; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .country-header strong { color: var(--gold); font-size: 14px; }

    .btn-sm { padding: 4px 8px; font-size: 11px; background: #21262d; color: #c9d1d9; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }

    .timeline-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; z-index: 1000; background: rgba(13, 17, 23, 0.9); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--accent); backdrop-filter: blur(10px); }
    #yearSlider { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .year-label { font-size: 20px; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 2px; }

    .map-label { background: transparent; border: none; color: white; font-weight: 900; font-size: 14px; text-align: center; pointer-events: none; }
    .map-label-text { text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 0 2px 4px rgba(0,0,0,0.9); }

    .leaflet-popup-content-wrapper { background: #161b22; color: #c9d1d9; border: 1px solid var(--accent); }
    .leaflet-popup-tip { background: var(--accent); }

    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: 40vh; border-right: none; border-top: 1px solid var(--border); order: 2; padding: 10px; }
      .map-container { flex: 1; min-height: 60vh; order: 1; }
    }
  </style>
</head>
<body>

<header>
  <div style="display: flex; align-items: center;">
    <div style="font-weight: bold; font-size: 20px; color: var(--accent); margin-right: 20px;">🏛 BRONZE ARCHIVE</div>
    <div id="lang-switcher">
      <button onclick="setLang('ru')" id="ln-ru">RU</button>
      <button onclick="setLang('en')" id="ln-en">EN</button>
      <button onclick="setLang('de')" id="ln-de">DE</button>
    </div>
  </div>
  <nav><a href="index.html" id="nav-home">🏠 Главная</a><a href="history.html" style="color:var(--gold)" id="nav-hist">🏛 История</a></nav>
</header>

<div class="layout">
  <div class="sidebar">
    <div id="inputBox" class="input-group">
      <input id="countryName" placeholder="Название страны">
      <div style="display:flex; gap:10px">
          <input id="startYear" type="number" placeholder="От">
          <input id="endYear" type="number" placeholder="До">
      </div>
      <input type="color" id="objColor" value="#cd7f32" style="height:35px; cursor:pointer; margin-bottom:8px">
      <textarea id="description" placeholder="Описание этапа..." rows="2"></textarea>
      <button class="btn-main" onclick="saveHistory()" id="btn-save">Вписать этап</button>
      <button id="cancelEdit" style="display:none; background:transparent; border:none; color:#8b949e; cursor:pointer; font-size:11px; margin-top:5px;" onclick="resetInputs()">Отмена редактирования</button>
    </div>

    <h3 style="font-size: 11px; color: #8b949e; margin-bottom:10px; text-transform: uppercase;" id="txt-list-title">База государств</h3>
    <div id="historyList"></div>
  </div>

  <div class="map-container">
    <div id="map"></div>
    <div class="timeline-box">
        <div class="year-label" id="currentYear">2026 AD</div>
        <input type="range" id="yearSlider" min="-4000" max="2026" value="2026">
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
    authDomain: "my-dashboard-dc67a.firebaseapp.com",
    projectId: "my-dashboard-dc67a",
    storageBucket: "my-dashboard-dc67a.firebasestorage.app",
    messagingSenderId: "710702954120",
    appId: "1:710702954120:web:f06b1038c48d3bd328913d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const i18n = {
    ru: { home: "🏠 Главная", hist: "🏛 История", save: "Вписать этап", update: "Сохранить изменения", list: "База государств", name: "Название страны", desc: "Описание этапа...", del: "Удалить?", alert: "Заполни поля и нарисуй!" },
    en: { home: "🏠 Home", hist: "🏛 History", save: "Add Stage", update: "Save Changes", list: "States Database", name: "Country Name", desc: "Stage Description...", del: "Delete?", alert: "Fill fields and draw!" },
    de: { home: "🏠 Start", hist: "🏛 Geschichte", save: "Phase hinzufügen", update: "Änderungen speichern", list: "Staaten-Datenbank", name: "Ländername", desc: "Beschreibung...", del: "Löschen?", alert: "Felder ausfüllen und zeichnen!" }
};
window.currentLang = localStorage.getItem('atlas_lang') || 'ru';

const map = L.map('map', { zoomControl: false }).setView([30, 31], 3);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { opacity: 0.6 }).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);
const drawControl = new L.Control.Draw({
    draw: { polygon: true, rectangle: true, circle: false, marker: false, polyline: false },
    edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

let currentGeoData = null;
let editContext = null; 

map.on(L.Draw.Event.CREATED, (e) => {
    drawnItems.clearLayers();
    currentGeoData = e.layer.toGeoJSON();
    drawnItems.addLayer(e.layer);
});

map.on(L.Draw.Event.EDITED, (e) => {
    e.layers.eachLayer(layer => {
        currentGeoData = layer.toGeoJSON();
    });
});

const slider = document.getElementById("yearSlider");
const yearDisplay = document.getElementById("currentYear");
let countriesData = [];
const mapLayers = L.layerGroup().addTo(map);

slider.oninput = function() {
    let y = parseInt(this.value);
    yearDisplay.innerText = y < 0 ? Math.abs(y) + " BC" : y + " AD";
    renderAtlas(y);
};

// ЗАГРУЗКА ИЗ ОБЕИХ КОЛЛЕКЦИЙ
async function loadHistory() {
    countriesData = [];
    
    // Новая база
    const snapNew = await getDocs(collection(db, "historical_countries"));
    snapNew.forEach(d => {
        const data = d.data();
        if (data.history) {
            countriesData.push({ id: d.id, ...data, type: 'modern' });
        }
    });

    // Старая база (Египет тут)
    const snapOld = await getDocs(collection(db, "history_atlas"));
    snapOld.forEach(d => {
        const data = d.data();
        // Конвертируем старый формат в новый, чтобы всё работало одинаково
        countriesData.push({
            id: d.id,
            name: data.name,
            color: data.color || "#cd7f32",
            history: data.history ? data.history : [{ 
                start: data.start, 
                end: data.end, 
                geo: data.geo, 
                desc: data.desc || "" 
            }],
            type: 'legacy'
        });
    });

    renderAtlas(parseInt(slider.value));
}

function renderAtlas(year) {
    mapLayers.clearLayers();
    const list = document.getElementById("historyList");
    list.innerHTML = "";

    countriesData.forEach(country => {
        const stageIndex = country.history.findIndex(h => year >= h.start && year <= h.end);
        const stage = country.history[stageIndex];
        
        if (stage) {
            try {
                const geo = JSON.parse(stage.geo);
                const layer = L.geoJSON(geo, { style: { color: country.color, fillColor: country.color, fillOpacity: 0.4, weight: 2 } });
                layer.bindPopup(`<b>${country.name}</b><br><small>${stage.start} - ${stage.end}</small><hr>${stage.desc || ""}`);
                layer.addTo(mapLayers);

                const center = L.geoJSON(geo).getBounds().getCenter();
                L.marker(center, { icon: L.divIcon({ className: 'map-label', html: `<div class="map-label-text">${country.name}</div>`, iconSize: [120, 30] }) }).addTo(mapLayers);
            } catch(e) { console.error("GeoJSON error in", country.name); }
        }

        list.innerHTML += `
            <div class="country-card" style="border-left: 4px solid ${country.color}">
                <div class="country-header">
                    <strong>${country.name} ${country.type === 'legacy' ? '📜' : ''}</strong>
                    <div style="display:flex; gap:3px;">
                        <button class="btn-sm" title="Продлить" onclick="prepareNewStage('${country.id}')">➕</button>
                        <button class="btn-sm" title="Исправить" onclick="editCurrentStage('${country.id}')">✎</button>
                        <button class="btn-sm" onclick="deleteEntry('${country.id}', '${country.type}')">🗑</button>
                    </div>
                </div>
            </div>`;
    });
}

window.editCurrentStage = function(id) {
    const year = parseInt(slider.value);
    const country = countriesData.find(c => c.id === id);
    const idx = country.history.findIndex(h => year >= h.start && year <= h.end);

    if (idx === -1) return alert("Государство не существовало в этом году на слайдере!");

    const stage = country.history[idx];
    editContext = { countryId: id, stageIndex: idx, type: country.type };
    
    document.getElementById("inputBox").classList.add("editing");
    document.getElementById("btn-save").innerText = i18n[window.currentLang].update;
    document.getElementById("btn-save").classList.add("editing");
    document.getElementById("cancelEdit").style.display = "block";

    document.getElementById("countryName").value = country.name;
    document.getElementById("startYear").value = stage.start;
    document.getElementById("endYear").value = stage.end;
    document.getElementById("description").value = stage.desc || "";
    document.getElementById("objColor").value = country.color;

    drawnItems.clearLayers();
    const geoJSON = JSON.parse(stage.geo);
    L.geoJSON(geoJSON).eachLayer(l => { if (l.editing) drawnItems.addLayer(l); });
    currentGeoData = geoJSON;
    map.fitBounds(drawnItems.getBounds());
};

window.prepareNewStage = function(id) {
    resetInputs();
    const country = countriesData.find(c => c.id === id);
    const last = country.history[country.history.length - 1];
    
    document.getElementById("countryName").value = country.name;
    document.getElementById("startYear").value = last.end;
    document.getElementById("objColor").value = country.color;
    
    drawnItems.clearLayers();
    const geoJSON = JSON.parse(last.geo);
    L.geoJSON(geoJSON).eachLayer(l => { if (l.editing) drawnItems.addLayer(l); });
    currentGeoData = geoJSON;
    map.fitBounds(drawnItems.getBounds());
};

window.saveHistory = async function() {
    const name = document.getElementById("countryName").value.trim();
    const start = parseInt(document.getElementById("startYear").value);
    const end = parseInt(document.getElementById("endYear").value);
    const desc = document.getElementById("description").value;
    const color = document.getElementById("objColor").value;
    const geo = JSON.stringify(currentGeoData);

    if (!name || isNaN(start) || !currentGeoData) return alert(i18n[window.currentLang].alert);

    const coll = (editContext && editContext.type === 'legacy') ? "history_atlas" : "historical_countries";

    if (editContext) {
        const country = countriesData.find(c => c.id === editContext.countryId);
        country.history[editContext.stageIndex] = { start, end, desc, geo };
        await updateDoc(doc(db, coll, country.id), { history: country.history, color, name });
    } else {
        const existing = countriesData.find(c => c.name.toLowerCase() === name.toLowerCase());
        if (existing) {
            const updated = [...existing.history, { start, end, desc, geo }].sort((a,b) => a.start - b.start);
            await updateDoc(doc(db, existing.type === 'legacy' ? "history_atlas" : "historical_countries", existing.id), { history: updated, color });
        } else {
            await addDoc(collection(db, "historical_countries"), { name, color, history: [{ start, end, desc, geo }] });
        }
    }

    resetInputs();
    loadHistory();
};

window.deleteEntry = async function(id, type) {
    if(confirm(i18n[window.currentLang].del)) {
        const coll = type === 'modern' ? "historical_countries" : "history_atlas";
        await deleteDoc(doc(db, coll, id));
        loadHistory();
    }
};

window.resetInputs = function() {
    editContext = null;
    document.getElementById("inputBox").classList.remove("editing");
    document.getElementById("btn-save").innerText = i18n[window.currentLang].save;
    document.getElementById("btn-save").classList.remove("editing");
    document.getElementById("cancelEdit").style.display = "none";
    document.getElementById("countryName").value = "";
    document.getElementById("startYear").value = "";
    document.getElementById("endYear").value = "";
    document.getElementById("description").value = "";
    drawnItems.clearLayers();
    currentGeoData = null;
};

window.setLang = function(ln) {
    window.currentLang = ln;
    localStorage.setItem('atlas_lang', ln);
    updateUI();
};

function updateUI() {
    const t = i18n[window.currentLang];
    document.getElementById("nav-home").innerText = t.home;
    document.getElementById("nav-hist").innerText = t.hist;
    document.getElementById("btn-save").innerText = editContext ? t.update : t.save;
    document.getElementById("txt-list-title").innerText = t.list;
    document.getElementById("countryName").placeholder = t.name;
    document.getElementById("description").placeholder = t.desc;
    document.querySelectorAll('#lang-switcher button').forEach(b => b.classList.remove('active'));
    document.getElementById(`ln-${window.currentLang}`).classList.add('active');
}

updateUI();
loadHistory();
</script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>История | LingoArchive Pro</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

  <style>
    :root { 
      --bg-dark: #0d1117; --bg-sidebar: #161b22; --accent: #58a6ff; 
      --gold: #f1c40f; --text: #c9d1d9; --border: #30363d;
    }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    header { background: var(--bg-sidebar); padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    nav { display: flex; gap: 20px; }
    nav a { color: var(--text); text-decoration: none; font-weight: 500; font-size: 14px; transition: 0.2s; }
    nav a:hover { color: var(--gold); }

    .layout { display: flex; flex: 1; overflow: hidden; }
    
    /* Стили базы данных слева */
    .sidebar { width: 320px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
    .sidebar h2 { font-size: 18px; margin: 0 0 15px 0; color: var(--gold); }

    .input-group { background: #0d1117; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
    .input-group label { display: block; font-size: 11px; text-transform: uppercase; color: #8b949e; margin-bottom: 5px; }
    input, textarea, select { background: #161b22; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 13px; }
    
    .btn-main { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
    .btn-main:hover { filter: brightness(1.2); }

    /* Список стран */
    .event-card { background: #0d1117; padding: 12px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 10px; border-left: 4px solid var(--accent); cursor: pointer; transition: 0.2s; }
    .event-card:hover { transform: translateX(5px); border-color: var(--gold); }
    .event-card strong { display: block; font-size: 14px; margin-bottom: 4px; }
    .event-card span { font-size: 11px; color: #8b949e; }

    /* Карта */
    .map-container { flex: 1; position: relative; }
    #map { height: 100%; width: 100%; background: #c5d8d6; }

    /* Плавающий таймлайн */
    .timeline-box { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70%; z-index: 1000; background: rgba(22, 27, 34, 0.95); padding: 20px; border-radius: 50px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
    #yearSlider { -webkit-appearance: none; width: 100%; height: 6px; background: #30363d; border-radius: 5px; outline: none; }
    #yearSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: var(--gold); border-radius: 50%; cursor: pointer; border: 3px solid #0d1117; }
    .year-label { font-size: 24px; font-weight: 800; color: var(--gold); text-align: center; margin-bottom: 10px; }

    /* Стили для названий на карте */
    .map-label { background: transparent; border: none; box-shadow: none; color: white; text-shadow: 1px 1px 4px #000; font-weight: bold; font-size: 12px; text-align: center; }
  </style>
</head>
<body>

<header>
  <div style="font-weight: bold; font-size: 20px; color: var(--gold);">LingoArchive <span style="color: white;">Pro</span></div>
  <nav>
    <a href="index.html">🏠 Главная</a>
    <a href="coins.html">🪙 Монеты</a>
    <a href="languages.html">📚 Языки</a>
    <a href="history.html" style="border-bottom: 2px solid var(--gold); padding-bottom: 5px;">🏛 История</a>
  </nav>
</header>

<div class="layout">
  <div class="sidebar">
    <h2>📜 База данных</h2>
    
    <div class="input-group">
      <label>Тип объекта</label>
      <select id="objType">
          <option value="country">🌍 Государство</option>
          <option value="battle">⚔️ Битва / Маневр</option>
      </select>
      <label>Название и цвет</label>
      <div style="display:flex; gap:10px; margin-bottom:10px;">
          <input id="countryName" placeholder="Напр: Хеттское царство" style="margin:0">
          <input type="color" id="objColor" value="#58a6ff" style="width:60px; height:38px; padding:2px; margin:0">
      </div>
      <label>Годы существования</label>
      <div style="display:flex; gap:10px">
          <input id="startYear" type="number" placeholder="От">
          <input id="endYear" type="number" placeholder="До">
      </div>
      <label>Описание</label>
      <textarea id="description" placeholder="Краткая история..." rows="2"></textarea>
      <button class="btn-main" onclick="saveHistory()">Нанести в летопись</button>
    </div>

    <h3 style="font-size: 14px; color: #8b949e;">ОБЪЕКТЫ ТЕКУЩЕЙ ЭПОХИ:</h3>
    <div id="historyList"></div>
  </div>

  <div class="map-container">
    <div id="map"></div>
    
    <div class="timeline-box">
        <div class="year-label" id="currentYear">2026 AD</div>
        <input type="range" id="yearSlider" min="-4000" max="2026" value="2026">
        <div style="display:flex; justify-content: space-between; font-size: 10px; color: #8b949e; margin-top:5px; padding: 0 10px">
            <span>4000 BC</span><span>0</span><span>2026 AD</span>
        </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polyline-decorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
    authDomain: "my-dashboard-dc67a.firebaseapp.com",
    projectId: "my-dashboard-dc67a",
    storageBucket: "my-dashboard-dc67a.firebasestorage.app",
    messagingSenderId: "710702954120",
    appId: "1:710702954120:web:f06b1038c48d3bd328913d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const map = L.map('map', { zoomControl: false }).setView([45, 30], 4);
L.control.zoom({ position: 'topright' }).addTo(map);

// 1. Физический слой (Рельеф и Реки)
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 8 }).addTo(map);

// 2. СЕГОДНЯШНИЕ ГРАНИЦЫ (Серые, для ориентира)
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
    opacity: 0.6
}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
    draw: { polyline: true, polygon: true, rectangle: true, circle: false, marker: false, circlemarker: false },
    edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

let currentGeoData = null;
map.on(L.Draw.Event.CREATED, (e) => {
    drawnItems.clearLayers();
    currentGeoData = e.layer.toGeoJSON();
    const color = document.getElementById("objColor").value;
    e.layer.setStyle({ color: color, fillColor: color, fillOpacity: 0.5 });
    drawnItems.addLayer(e.layer);
});

const slider = document.getElementById("yearSlider");
const yearDisplay = document.getElementById("currentYear");
let allHistoryData = [];
const mapLayers = L.layerGroup().addTo(map);

slider.oninput = function() {
    let y = parseInt(this.value);
    yearDisplay.innerText = y < 0 ? Math.abs(y) + " BC" : y + " AD";
    renderAtlas(y);
};

async function loadHistory() {
    const snap = await getDocs(collection(db, "history_atlas"));
    allHistoryData = [];
    snap.forEach(doc => allHistoryData.push({id: doc.id, ...doc.data()}));
    renderAtlas(parseInt(slider.value));
}

function renderAtlas(year) {
    mapLayers.clearLayers();
    const list = document.getElementById("historyList");
    list.innerHTML = "";

    allHistoryData.forEach(item => {
        if (year >= item.start && year <= item.end) {
            const geo = JSON.parse(item.geo);
            const color = item.color || "#58a6ff";
            
            const layer = L.geoJSON(geo, {
                style: { color: color, fillColor: color, fillOpacity: 0.4, weight: 2 }
            });

            // Названия прямо на карте
            let center;
            if (geo.geometry.type === "Polygon" || geo.geometry.type === "MultiPolygon") {
                center = L.geoJSON(geo).getBounds().getCenter();
            } else if (geo.geometry.type === "LineString") {
                center = L.geoJSON(geo).getBounds().getCenter();
            }
            
            if (center) {
                L.marker(center, {
                    icon: L.divIcon({
                        className: 'map-label',
                        html: `<div>${item.name}</div><div style="font-size:9px; opacity:0.8">${item.start}..${item.end}</div>`,
                        iconSize: [120, 40]
                    })
                }).addTo(mapLayers);
            }

            if (item.type === 'battle' && geo.geometry.type === 'LineString') {
                L.polylineDecorator(geo.geometry.coordinates.map(c => [c[1], c[0]]), {
                    patterns: [{ offset: '100%', repeat: 0, symbol: L.Symbol.arrowHead({ pixelSize: 14, pathOptions: { color: color, fillOpacity: 1 } }) }]
                }).addTo(mapLayers);
            }

            layer.bindPopup(`<b>${item.name}</b><br>${item.desc}`);
            mapLayers.addLayer(layer);

            list.innerHTML += `
                <div class="event-card" style="border-left-color: ${color}" onclick="map.flyTo(L.geoJSON(${item.geo}).getBounds().getCenter(), 5)">
                    <strong>${item.name}</strong>
                    <span>${item.start} — ${item.end} гг.</span>
                </div>`;
        }
    });
}

async function saveHistory() {
    if (!currentGeoData) return alert("Сначала нарисуй на карте!");
    const name = document.getElementById("countryName").value;
    const start = parseInt(document.getElementById("startYear").value);
    const end = parseInt(document.getElementById("endYear").value);
    const desc = document.getElementById("description").value;
    const color = document.getElementById("objColor").value;
    const type = document.getElementById("objType").value;

    await addDoc(collection(db, "history_atlas"), {
        name, start, end, desc, color, type,
        geo: JSON.stringify(currentGeoData),
        created: Date.now()
    });
    location.reload();
}

window.saveHistory = saveHistory;
loadHistory();
</script>
</body>
</html>

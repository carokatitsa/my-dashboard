<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>История | LingoArchive Pro</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

  <style>
    :root { --bg-main: #06090f; --bg-card: #111a2e; --text-main: #e8eefc; --accent: #3498db; --gold: #f1c40f; }
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); }
    header { background:#111a2e; padding:16px; border-bottom: 1px solid #1e2a44; display: flex; justify-content: space-between; }
    nav a { color: var(--text-main); margin-right:14px; text-decoration:none; font-weight:600; }
    main { padding: 20px; max-width: 1200px; margin: auto; }
    #map { height: 600px; border-radius: 15px; border: 1px solid var(--accent); margin-bottom: 20px; background: #aad3df; }
    
    .timeline-container { background: var(--bg-card); padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
    #yearSlider { width: 100%; margin: 15px 0; cursor: pointer; }
    .year-display { font-size: 28px; font-weight: bold; color: var(--gold); }

    .card { background: var(--bg-card); border-radius:14px; padding:20px; border: 1px solid #1e2a44; margin-bottom: 20px; }
    input, textarea, select { background:#000; border:1px solid #333; color:#fff; padding:10px; border-radius:8px; width:100%; box-sizing:border-box; margin-bottom: 10px; }
    .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .color-picker-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    #objColor { width: 60px; height: 40px; padding: 2px; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="index.html">🏠 Главная</a>
    <a href="coins.html">🪙 Монеты</a>
    <a href="languages.html">📚 Языки</a>
    <a href="history.html" style="color:var(--gold)">🏛 История</a>
  </nav>
</header>

<main>
  <div class="timeline-container">
    <div class="year-display">Год: <span id="currentYear">2026</span></div>
    <input type="range" id="yearSlider" min="-4000" max="2026" value="2026">
    <div style="display:flex; justify-content: space-between; font-size: 12px; color: #888;">
        <span>4000 до н.э.</span><span>0</span><span>2026 н.э.</span>
    </div>
  </div>

  <div id="map"></div>

  <div class="card" style="border: 2px solid var(--accent)">
    <h3>➕ Добавить на карту</h3>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
        <select id="objType">
            <option value="country">🌍 Государство (Полигон)</option>
            <option value="battle">⚔️ Битва / Маневр (Стрелка)</option>
        </select>
        <div class="color-picker-wrapper">
            <span>Цвет объекта:</span>
            <input type="color" id="objColor" value="#3498db">
        </div>
    </div>
    <input id="countryName" placeholder="Название">
    <div style="display:flex; gap:10px">
        <input id="startYear" type="number" placeholder="Год начала">
        <input id="endYear" type="number" placeholder="Год конца">
    </div>
    <textarea id="description" placeholder="Детали, правители, итоги битвы..." rows="2"></textarea>
    <button class="btn" onclick="saveHistory()"><i class="fas fa-save"></i> Сохранить в Атлас</button>
  </div>

  <div id="historyList"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polyline-decorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
    authDomain: "my-dashboard-dc67a.firebaseapp.com",
    projectId: "my-dashboard-dc67a",
    storageBucket: "my-dashboard-dc67a.firebasestorage.app",
    messagingSenderId: "710702954120",
    appId: "1:710702954120:web:f06b1038c48d3bd328913d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Карта с четкими реками (OpenTopoMap)
const map = L.map('map').setView([50, 20], 4);
L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    maxZoom: 17,
    attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap'
}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
    draw: { 
        polyline: { shapeOptions: { color: '#f39c12', weight: 4 } }, 
        polygon: { allowIntersection: false, drawError: { color: '#e1e1e1', message: 'Нельзя пересекать!' }, shapeOptions: { color: '#3498db' } },
        circle: false, marker: true, rectangle: true, circlemarker: false 
    },
    edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

let currentGeoData = null;
map.on(L.Draw.Event.CREATED, function (e) {
    drawnItems.clearLayers();
    currentGeoData = e.layer.toGeoJSON();
    drawnItems.addLayer(e.layer);
});

const slider = document.getElementById("yearSlider");
const yearDisplay = document.getElementById("currentYear");
let allHistoryData = [];
const mapLayers = L.layerGroup().addTo(map);

slider.oninput = function() {
    yearDisplay.innerText = this.value;
    renderAtlas(parseInt(this.value));
};

async function loadHistory() {
    const snap = await getDocs(collection(db, "history_atlas"));
    allHistoryData = [];
    snap.forEach(doc => allHistoryData.push({id: doc.id, ...doc.data()}));
    renderAtlas(parseInt(slider.value));
}

function renderAtlas(year) {
    mapLayers.clearLayers();
    document.getElementById("historyList").innerHTML = "";

    allHistoryData.forEach(item => {
        if (year >= item.start && year <= item.end) {
            const geo = JSON.parse(item.geo);
            const color = item.color || "#3498db";
            
            const layer = L.geoJSON(geo, {
                style: { color: color, fillColor: color, fillOpacity: 0.4, weight: 3 }
            });

            // Если это битва (стрелка)
            if (item.type === 'battle' && geo.geometry.type === 'LineString') {
                L.polylineDecorator(geo.geometry.coordinates.map(c => [c[1], c[0]]), {
                    patterns: [
                        { offset: '100%', repeat: 0, symbol: L.Symbol.arrowHead({ pixelSize: 15, polygon: false, pathOptions: { stroke: true, color: color } }) }
                    ]
                }).addTo(mapLayers);
            }

            layer.bindPopup(`<b>${item.name}</b><br>${item.desc}`);
            mapLayers.addLayer(layer);
        }
    });
}

async function saveHistory() {
    if (!currentGeoData) return alert("Сначала нарисуй объект на карте!");
    const name = document.getElementById("countryName").value;
    const start = parseInt(document.getElementById("startYear").value);
    const end = parseInt(document.getElementById("endYear").value);
    const desc = document.getElementById("description").value;
    const color = document.getElementById("objColor").value;
    const type = document.getElementById("objType").value;

    await addDoc(collection(db, "history_atlas"), {
        name, start, end, desc, color, type,
        geo: JSON.stringify(currentGeoData),
        created: Date.now()
    });

    alert("Добавлено в летопись!");
    location.reload();
}

window.saveHistory = saveHistory;
loadHistory();
</script>

</body>
</html>

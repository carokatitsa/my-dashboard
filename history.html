<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>История | LingoArchive Pro</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

  <style>
    :root { --bg-main: #06090f; --bg-card: #111a2e; --text-main: #e8eefc; --accent: #3498db; --gold: #f1c40f; }
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); }
    
    header { background:#111a2e; padding:16px; border-bottom: 1px solid #1e2a44; position: sticky; top: 0; z-index: 1000; }
    nav { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
    nav a { color: var(--text-main); text-decoration:none; font-weight:600; font-size: 14px; opacity: 0.8; transition: 0.3s; }
    nav a:hover { opacity: 1; color: var(--gold); }
    
    main { padding: 20px; max-width: 1200px; margin: auto; }
    
    /* Стили карты как на том сайте */
    #map { height: 600px; border-radius: 15px; border: 1px solid #1e2a44; margin-bottom: 20px; background: #d4cfc0; }
    .leaflet-container { background: #d4cfc0 !important; }

    .timeline-container { background: var(--bg-card); padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; border: 1px solid #1e2a44; }
    #yearSlider { width: 100%; margin: 15px 0; cursor: pointer; accent-color: var(--gold); }
    .year-display { font-size: 32px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }

    .card { background: var(--bg-card); border-radius:14px; padding:20px; border: 1px solid #1e2a44; margin-bottom: 20px; }
    input, textarea, select { background:#000; border:1px solid #333; color:#fff; padding:12px; border-radius:8px; width:100%; box-sizing:border-box; margin-bottom: 10px; font-size: 16px; }
    
    .btn { background: var(--accent); color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
    .color-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; background: #1a243a; padding: 10px; border-radius: 8px; }
    #objColor { width: 80px; height: 45px; border: none; cursor: pointer; background: none; }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="index.html">🏠 Главная</a>
    <a href="coins.html">🪙 Монеты</a>
    <a href="languages.html">📚 Языки</a>
    <a href="training.html">💪 Тренировки</a>
    <a href="chess.html">♟️ Шахматы</a>
    <a href="kbzhu.html">🍎 КБЖУ</a>
    <a href="history.html" style="color:var(--gold)">🏛️ История</a>
  </nav>
</header>

<main>
  <div class="timeline-container">
    <div class="year-display"><i class="fas fa-clock"></i> Год: <span id="currentYear">2026</span></div>
    <input type="range" id="yearSlider" min="-4000" max="2026" value="2026">
    <div style="display:flex; justify-content: space-between; font-size: 14px; color: #666; font-weight: bold;">
        <span>4000 BC</span><span>0</span><span>2026 AD</span>
    </div>
  </div>

  <div id="map"></div>

  <div class="card">
    <h3 style="margin-top:0"><i class="fas fa-map-marker-alt"></i> Новое событие на карту</h3>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
        <select id="objType">
            <option value="country">🌍 Государство (Границы)</option>
            <option value="battle">⚔️ Битва (Стрелка)</option>
        </select>
        <div class="color-row" style="margin-bottom:0">
            <span>Цвет:</span>
            <input type="color" id="objColor" value="#e74c3c">
        </div>
    </div>

    <input id="countryName" placeholder="Название (напр. Римская Республика)">
    
    <div style="display:flex; gap:10px">
        <input id="startYear" type="number" placeholder="Год появления">
        <input id="endYear" type="number" placeholder="Год финала">
    </div>
    
    <textarea id="description" placeholder="Описание, правители или ход сражения..." rows="3"></textarea>
    
    <button class="btn" onclick="saveHistory()">
        <i class="fas fa-save"></i> Нанести на карту
    </button>
  </div>

  <div id="historyList"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polyline-decorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
    authDomain: "my-dashboard-dc67a.firebaseapp.com",
    projectId: "my-dashboard-dc67a",
    storageBucket: "my-dashboard-dc67a.firebasestorage.app",
    messagingSenderId: "710702954120",
    appId: "1:710702954120:web:f06b1038c48d3bd328913d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Инициализация карты со стилем Shaded Relief
const map = L.map('map').setView([45, 25], 4);

// Слой рельефа и рек (неяркий, спокойный)
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}', {
	attribution: 'Tiles &copy; Esri &mdash; Source: Esri',
	maxZoom: 13
}).addTo(map);

// Слой границ и рек (для четкости)
L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/toner-lines/{z}/{x}/{y}{r}.png', {
	attribution: 'Map tiles by Stamen Design, CC BY 3.0',
	subdomains: 'abcd',
	opacity: 0.3
}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
    draw: { 
        polyline: { shapeOptions: { weight: 5 } }, 
        polygon: { allowIntersection: false, shapeOptions: { fillOpacity: 0.5 } },
        circle: false, marker: false, rectangle: true, circlemarker: false 
    },
    edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

let currentGeoData = null;
map.on(L.Draw.Event.CREATED, function (e) {
    drawnItems.clearLayers();
    currentGeoData = e.layer.toGeoJSON();
    
    // Применяем выбранный цвет сразу при рисовании
    const color = document.getElementById("objColor").value;
    e.layer.setStyle({ color: color, fillColor: color });
    drawnItems.addLayer(e.layer);
});

const slider = document.getElementById("yearSlider");
const yearDisplay = document.getElementById("currentYear");
let allHistoryData = [];
const mapLayers = L.layerGroup().addTo(map);

slider.oninput = function() {
    yearDisplay.innerText = this.value;
    renderAtlas(parseInt(this.value));
};

async function loadHistory() {
    const snap = await getDocs(collection(db, "history_atlas"));
    allHistoryData = [];
    snap.forEach(doc => allHistoryData.push({id: doc.id, ...doc.data()}));
    renderAtlas(parseInt(slider.value));
}

function renderAtlas(year) {
    mapLayers.clearLayers();
    document.getElementById("historyList").innerHTML = "";

    allHistoryData.forEach(item => {
        if (year >= item.start && year <= item.end) {
            const geo = JSON.parse(item.geo);
            const color = item.color || "#e74c3c";
            
            const layer = L.geoJSON(geo, {
                style: { color: color, fillColor: color, fillOpacity: 0.5, weight: 3 }
            });

            if (item.type === 'battle' && geo.geometry.type === 'LineString') {
                L.polylineDecorator(geo.geometry.coordinates.map(c => [c[1], c[0]]), {
                    patterns: [
                        { offset: '100%', repeat: 0, symbol: L.Symbol.arrowHead({ pixelSize: 18, polygon: false, pathOptions: { stroke: true, color: color, weight: 4 } }) }
                    ]
                }).addTo(mapLayers);
            }

            layer.bindPopup(`<div style="color:#000"><b>${item.name}</b><br>${item.desc}</div>`);
            mapLayers.addLayer(layer);

            document.getElementById("historyList").innerHTML += `
                <div class="card" style="border-left: 5px solid ${color}">
                    <h4 style="margin:0">${item.name} (${item.start} — ${item.end})</h4>
                    <p class="muted" style="margin:5px 0 0 0; font-size:14px">${item.desc}</p>
                </div>`;
        }
    });
}

async function saveHistory() {
    if (!currentGeoData) return alert("Нарисуй объект на карте!");
    const name = document.getElementById("countryName").value;
    const start = parseInt(document.getElementById("startYear").value);
    const end = parseInt(document.getElementById("endYear").value);
    const desc = document.getElementById("description").value;
    const color = document.getElementById("objColor").value;
    const type = document.getElementById("objType").value;

    if (!name || isNaN(start)) return alert("Заполни имя и год!");

    await addDoc(collection(db, "history_atlas"), {
        name, start, end, desc, color, type,
        geo: JSON.stringify(currentGeoData),
        created: Date.now()
    });

    alert("Событие внесено в историю!");
    location.reload();
}

window.saveHistory = saveHistory;
loadHistory();
</script>

</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>История | LingoArchive Pro</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

  <style>
    :root { --bg-main: #06090f; --bg-card: #111a2e; --text-main: #e8eefc; --accent: #3498db; --gold: #f1c40f; }
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    header { background:#111a2e; padding:12px; border-bottom: 1px solid #1e2a44; z-index: 1000; }
    nav { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    nav a { color: var(--text-main); text-decoration:none; font-weight:600; font-size: 13px; opacity: 0.8; }
    nav a:hover { color: var(--gold); }

    .layout { display: flex; flex: 1; overflow: hidden; }
    
    /* Боковая панель (База данных) */
    .sidebar { width: 350px; background: #0b1221; border-right: 1px solid #1e2a44; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
    
    /* Карта */
    .map-container { flex: 1; position: relative; background: #c5d8d6; }
    #map { height: 100%; width: 100%; }

    .timeline-float { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; z-index: 999; background: rgba(17, 26, 46, 0.9); padding: 15px; border-radius: 12px; border: 1px solid var(--accent); backdrop-filter: blur(5px); }
    #yearSlider { width: 100%; accent-color: var(--gold); cursor: pointer; }

    .card { background: var(--bg-card); border-radius:10px; padding:15px; border: 1px solid #1e2a44; margin-bottom: 15px; }
    input, textarea, select { background:#000; border:1px solid #333; color:#fff; padding:8px; border-radius:6px; width:100%; box-sizing:border-box; margin-bottom: 8px; font-size: 14px; }
    
    .btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    .btn-save { background: var(--gold); color: #000; margin-top: 5px; }

    .history-item { padding: 10px; border-bottom: 1px solid #1e2a44; cursor: pointer; transition: 0.2s; }
    .history-item:hover { background: #1a243a; }
    .year-tag { font-size: 28px; font-weight: bold; color: var(--gold); text-align: center; }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="index.html">🏠 Главная</a>
    <a href="coins.html">🪙 Монеты</a>
    <a href="languages.html">📚 Языки</a>
    <a href="training.html">💪 Тренировки</a>
    <a href="history.html" style="color:var(--gold)">🏛️ История</a>
  </nav>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="year-tag" id="currentYear">2026</div>
    
    <div class="card">
      <h3 style="margin-top:0; font-size: 16px;"><i class="fas fa-plus-circle"></i> Добавить в базу</h3>
      <select id="objType">
          <option value="country">🌍 Государство</option>
          <option value="battle">⚔️ Битва / Стрелка</option>
      </select>
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px">
          <span style="font-size:12px">Цвет:</span>
          <input type="color" id="objColor" value="#e74c3c" style="width:50px; height:30px; padding:0; border:none;">
      </div>
      <input id="countryName" placeholder="Название">
      <div style="display:flex; gap:5px">
          <input id="startYear" type="number" placeholder="От (год)">
          <input id="endYear" type="number" placeholder="До (год)">
      </div>
      <textarea id="description" placeholder="Описание..." rows="2"></textarea>
      <button class="btn btn-save" onclick="saveHistory()">Сохранить объект</button>
    </div>

    <h3 style="font-size: 16px; border-bottom: 1px solid var(--accent); padding-bottom: 5px;">📜 События эпохи:</h3>
    <div id="historyList"></div>
  </div>

  <div class="map-container">
    <div id="map"></div>
    
    <div class="timeline-float">
        <input type="range" id="yearSlider" min="-4000" max="2026" value="2026">
        <div style="display:flex; justify-content: space-between; font-size: 11px; margin-top: 5px;">
            <span>4000 до н.э.</span><span>Рождество Христово</span><span>2026 н.э.</span>
        </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polyline-decorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
    authDomain: "my-dashboard-dc67a.firebaseapp.com",
    projectId: "my-dashboard-dc67a",
    storageBucket: "my-dashboard-dc67a.firebasestorage.app",
    messagingSenderId: "710702954120",
    appId: "1:710702954120:web:f06b1038c48d3bd328913d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Настройка "Той самой карты"
const map = L.map('map', { zoomControl: false }).setView([48, 32], 4);
L.control.zoom({ position: 'topright' }).addTo(map);

// 1. Основной слой: Физическая карта (рельеф и реки)
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', {
	maxZoom: 8
}).addTo(map);

// 2. Слой с городами и границами (прозрачный)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
    pane: 'shadowPane' // Чтобы надписи были чуть выше объектов
}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
    draw: { polyline: true, polygon: true, circle: false, marker: false, rectangle: true, circlemarker: false },
    edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

let currentGeoData = null;
map.on(L.Draw.Event.CREATED, (e) => {
    drawnItems.clearLayers();
    currentGeoData = e.layer.toGeoJSON();
    const color = document.getElementById("objColor").value;
    e.layer.setStyle({ color: color, fillColor: color, fillOpacity: 0.5 });
    drawnItems.addLayer(e.layer);
});

const slider = document.getElementById("yearSlider");
const yearDisplay = document.getElementById("currentYear");
let allHistoryData = [];
const mapLayers = L.layerGroup().addTo(map);

slider.oninput = function() {
    yearDisplay.innerText = this.value;
    renderAtlas(parseInt(this.value));
};

async function loadHistory() {
    const snap = await getDocs(collection(db, "history_atlas"));
    allHistoryData = [];
    snap.forEach(doc => allHistoryData.push({id: doc.id, ...doc.data()}));
    renderAtlas(parseInt(slider.value));
}

function renderAtlas(year) {
    mapLayers.clearLayers();
    const list = document.getElementById("historyList");
    list.innerHTML = "";

    allHistoryData.forEach(item => {
        if (year >= item.start && year <= item.end) {
            const geo = JSON.parse(item.geo);
            const color = item.color || "#e74c3c";
            
            const layer = L.geoJSON(geo, {
                style: { color: color, fillColor: color, fillOpacity: 0.4, weight: 2 }
            });

            if (item.type === 'battle' && geo.geometry.type === 'LineString') {
                L.polylineDecorator(geo.geometry.coordinates.map(c => [c[1], c[0]]), {
                    patterns: [{ offset: '100%', repeat: 0, symbol: L.Symbol.arrowHead({ pixelSize: 15, pathOptions: { color: color, fillOpacity: 1 } }) }]
                }).addTo(mapLayers);
            }

            layer.bindPopup(`<b>${item.name}</b><br>${item.desc}`);
            mapLayers.addLayer(layer);

            list.innerHTML += `
                <div class="history-item" onclick="map.panTo(L.geoJSON(${item.geo}).getBounds().getCenter())">
                    <strong style="color:${color}">● ${item.name}</strong>
                    <div style="font-size:11px; color:#888;">${item.start} — ${item.end}</div>
                </div>`;
        }
    });
}

async function saveHistory() {
    if (!currentGeoData) return alert("Нарисуй объект!");
    const name = document.getElementById("countryName").value;
    const start = parseInt(document.getElementById("startYear").value);
    const end = parseInt(document.getElementById("endYear").value);
    const desc = document.getElementById("description").value;
    const color = document.getElementById("objColor").value;
    const type = document.getElementById("objType").value;

    await addDoc(collection(db, "history_atlas"), {
        name, start, end, desc, color, type,
        geo: JSON.stringify(currentGeoData),
        created: Date.now()
    });
    location.reload();
}

window.saveHistory = saveHistory;
loadHistory();
</script>
</body>
</html>

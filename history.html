<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Бронзовый Атлас Pro | LingoArchive</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

  <style>
    :root { 
      --bg-dark: #0d1117; --bg-sidebar: #161b22; --accent: #cd7f32; 
      --gold: #f1c40f; --text: #c9d1d9; --border: #30363d;
    }
    body { margin:0; font-family: -apple-system, sans-serif; background: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    header { background: var(--bg-sidebar); padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 1001; flex-shrink: 0; }
    nav a { color: var(--text); text-decoration: none; font-size: 14px; margin-left: 15px; }

    .layout { display: flex; flex: 1; overflow: hidden; }
    
    /* Сайдбар */
    .sidebar { width: 360px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; overflow-y: auto; z-index: 10; }

    /* Карта */
    .map-container { flex: 1; position: relative; background: #2b2317; display: flex; flex-direction: column; }
    #map { flex: 1; width: 100%; filter: sepia(0.6) contrast(1.1) brightness(0.9) hue-rotate(-10deg); }

    .input-group { background: #0d1117; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
    input, textarea { background: #161b22; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; outline: none; }
    
    .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
    
    .country-card { background: #0d1117; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
    .country-header { padding: 10px; background: #1c2128; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .country-header strong { color: var(--gold); font-size: 14px; }
    .country-body { padding: 8px 12px; font-size: 12px; color: #8b949e; }

    .btn-sm { padding: 4px 8px; font-size: 11px; background: #21262d; color: #c9d1d9; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }

    /* Таймлайн */
    .timeline-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; z-index: 1000; background: rgba(13, 17, 23, 0.9); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--accent); backdrop-filter: blur(10px); }
    #yearSlider { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .year-label { font-size: 20px; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 2px; }

    /* АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ */
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: 40vh; border-right: none; border-top: 1px solid var(--border); order: 2; padding: 10px; }
      .map-container { flex: 1; min-height: 60vh; order: 1; }
      .timeline-box { bottom: 10px; width: 90%; padding: 8px 15px; }
      .year-label { font-size: 18px; }
      header { padding: 8px 15px; }
      header div { font-size: 16px !important; }
    }

    .map-label { background: transparent; border: none; color: white; font-weight: 900; font-size: 14px; text-align: center; pointer-events: none; }
    .map-label-text { text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 0 2px 4px rgba(0,0,0,0.9); }
  </style>
</head>
<body>

<header>
  <div style="font-weight: bold; font-size: 20px; color: var(--accent);">🏛 BRONZE ARCHIVE</div>
  <nav><a href="index.html">🏠 Главная</a><a href="history.html" style="color:var(--gold)">🏛 История</a></nav>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="input-group">
      <input id="countryName" placeholder="Название страны (напр. Рим)">
      <div style="display:flex; gap:10px">
          <input id="startYear" type="number" placeholder="От">
          <input id="endYear" type="number" placeholder="До">
      </div>
      <input type="color" id="objColor" value="#cd7f32" style="height:35px; cursor:pointer; margin-bottom:8px">
      <textarea id="description" placeholder="Описание этапа..." rows="2"></textarea>
      <button class="btn-main" onclick="saveHistory()">Вписать этап</button>
    </div>

    <h3 style="font-size: 11px; color: #8b949e; margin-bottom:10px; text-transform: uppercase;">База государств</h3>
    <div id="historyList"></div>
  </div>

  <div class="map-container">
    <div id="map"></div>
    <div class="timeline-box">
        <div class="year-label" id="currentYear">2026 AD</div>
        <input type="range" id="yearSlider" min="-4000" max="2026" value="2026">
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
    authDomain: "my-dashboard-dc67a.firebaseapp.com",
    projectId: "my-dashboard-dc67a",
    storageBucket: "my-dashboard-dc67a.firebasestorage.app",
    messagingSenderId: "710702954120",
    appId: "1:710702954120:web:f06b1038c48d3bd328913d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Инициализация карты
const map = L.map('map', { zoomControl: false }).setView([30, 31], 3);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { opacity: 0.6 }).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);
const drawControl = new L.Control.Draw({
    draw: { polygon: true, rectangle: true, circle: false, marker: false, polyline: false },
    edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

let currentGeoData = null;
map.on(L.Draw.Event.CREATED, (e) => {
    drawnItems.clearLayers();
    currentGeoData = e.layer.toGeoJSON();
    drawnItems.addLayer(e.layer);
});

const slider = document.getElementById("yearSlider");
const yearDisplay = document.getElementById("currentYear");
let countriesData = [];
const mapLayers = L.layerGroup().addTo(map);

slider.oninput = function() {
    let y = parseInt(this.value);
    yearDisplay.innerText = y < 0 ? Math.abs(y) + " BC" : y + " AD";
    renderAtlas(y);
};

async function loadHistory() {
    countriesData = [];
    const snapNew = await getDocs(collection(db, "historical_countries"));
    snapNew.forEach(d => countriesData.push({ id: d.id, ...d.data(), type: 'modern' }));

    const snapOld = await getDocs(collection(db, "history_atlas"));
    snapOld.forEach(d => {
        const data = d.data();
        countriesData.push({
            id: d.id, name: data.name, color: data.color || "#cd7f32",
            history: [{ start: data.start, end: data.end, geo: data.geo, desc: data.desc }],
            type: 'legacy'
        });
    });
    renderAtlas(parseInt(slider.value));
}

function renderAtlas(year) {
    mapLayers.clearLayers();
    const list = document.getElementById("historyList");
    list.innerHTML = "";

    countriesData.forEach(country => {
        const stage = country.history.find(h => year >= h.start && year <= h.end);
        if (stage) {
            const geo = JSON.parse(stage.geo);
            L.geoJSON(geo, { style: { color: country.color, fillColor: country.color, fillOpacity: 0.4, weight: 2 } }).addTo(mapLayers);
            const center = L.geoJSON(geo).getBounds().getCenter();
            L.marker(center, {
                icon: L.divIcon({ className: 'map-label', html: `<div class="map-label-text">${country.name}</div>`, iconSize: [120, 30] })
            }).addTo(mapLayers);
        }

        list.innerHTML += `
            <div class="country-card" style="border-left: 4px solid ${country.color}">
                <div class="country-header">
                    <strong>${country.name} ${country.type === 'legacy' ? '📜' : ''}</strong>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-sm" onclick="extendCountry('${country.id}', '${country.type}')">➕</button>
                        <button class="btn-sm" onclick="deleteEntry('${country.id}', '${country.type}')">🗑</button>
                    </div>
                </div>
            </div>`;
    });
}

window.saveHistory = async function() {
    const name = document.getElementById("countryName").value.trim();
    const start = parseInt(document.getElementById("startYear").value);
    const end = parseInt(document.getElementById("endYear").value);
    const desc = document.getElementById("description").value;
    const color = document.getElementById("objColor").value;

    if (!name || isNaN(start) || !currentGeoData) return alert("Заполни поля и нарисуй границы!");

    const newStage = { start, end: end || start, desc, geo: JSON.stringify(currentGeoData) };
    const existing = countriesData.find(c => c.name.toLowerCase() === name.toLowerCase() && c.type === 'modern');

    if (existing) {
        const updated = [...existing.history, newStage].sort((a,b) => a.start - b.start);
        await updateDoc(doc(db, "historical_countries", existing.id), { history: updated, color });
    } else {
        await addDoc(collection(db, "historical_countries"), { name, color, history: [newStage] });
    }

    document.getElementById("countryName").value = "";
    document.getElementById("startYear").value = "";
    document.getElementById("endYear").value = "";
    document.getElementById("description").value = "";
    drawnItems.clearLayers();
    currentGeoData = null;
    loadHistory();
};

window.extendCountry = function(id, type) {
    const country = countriesData.find(c => c.id === id);
    const last = country.history[country.history.length - 1];
    document.getElementById("countryName").value = country.name;
    document.getElementById("startYear").value = last.end;
    document.getElementById("objColor").value = country.color;
    drawnItems.clearLayers();
    L.geoJSON(JSON.parse(last.geo)).eachLayer(l => drawnItems.addLayer(l));
    currentGeoData = JSON.parse(last.geo);
};

window.deleteEntry = async function(id, type) {
    if(confirm("Удалить?")) {
        const coll = type === 'modern' ? "historical_countries" : "history_atlas";
        await deleteDoc(doc(db, coll, id));
        loadHistory();
    }
};

loadHistory();
</script>
</body>
</html>

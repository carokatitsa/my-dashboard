<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Запоминалка Pro</title>
    <style>
        body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#0b0f17; color:#e8eefc; }
        header { background:#111a2e; padding:16px; position:sticky; top:0; border-bottom: 1px solid #2a4cff; z-index: 100; }
        nav { display: flex; flex-wrap: wrap; gap: 15px; max-width: 900px; margin: auto; }
        nav a { color:#e8eefc; text-decoration:none; font-weight:600; font-size: 0.9rem; white-space: nowrap; }

        main { max-width:900px; margin:auto; padding:24px; display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
        }

        h1 { font-size: 1.8em; margin-bottom: 20px; }
        h2 { font-size: 1.4em; margin-top: 0; margin-bottom: 15px; }

        .card { background:#111a2e; border-radius:14px; padding:20px; margin-bottom: 20px; border: 1px solid #1e293b; }
        
        .btn {
            display:inline-block;
            width: 100%;
            background:#2a4cff;
            color:white;
            padding:12px 20px;
            border-radius:10px;
            text-decoration:none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            text-align: center;
            box-sizing: border-box;
        }
        .btn:hover { background: #1a36d9; }
        
        .btn-danger { background: #ef4444; width: auto; padding: 4px 8px; border-radius: 6px; font-size: 0.8em; }
        .btn-danger:hover { background: #dc2626; }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #1e293b;
            border: 1px solid #2a4cff;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #6366f1;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #1e293b;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .category-item:hover { border-color: #2a4cff; }
        .category-item.active { background: #2a4cff; }

        .note-card {
            background: #111a2e;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            position: relative;
        }
        .note-header { display: flex; justify-content: space-between; color: #94a3b8; font-size: 0.85em; margin-bottom: 10px; }
        .note-text { white-space: pre-wrap; word-break: break-word; font-size: 1.05em; line-height: 1.5; }
        .note-file-link { display: inline-block; margin-top: 12px; color: #38bdf8; text-decoration: none; font-weight: 600; }
        .note-file-link:hover { text-decoration: underline; }
        .delete-note-btn { position: absolute; top: 16px; right: 16px; background: transparent; border: none; color: #64748b; cursor: pointer; font-size: 1.2em; }
        .delete-note-btn:hover { color: #ef4444; }

        .add-cat-container { display: flex; gap: 8px; }
        .add-cat-container input { margin-bottom: 0; }
        .btn-add-cat { width: auto; padding: 0 15px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <header>
        <nav>
            <a href="index.html">← На главную</a>
            <a href="#" style="pointer-events: none; opacity: 0.8;">Запоминалка Pro</a>
        </nav>
    </header>

    <main>
        <div>
            <div class="card">
                <h2>Добавить информацию</h2>
                <label for="note-cat-select">Категория</label>
                <select id="note-cat-select">
                    <option value="">-- Выберите категорию --</option>
                </select>

                <label for="note-text">Текст заметки / Формула</label>
                <textarea id="note-text" rows="5" placeholder="Примеры формул:&#10;Простая дробь: 4224000/2500&#10;Сложная: $\sqrt{x}$ или $\frac{a}{b}$"></textarea>

                <label for="note-file-url">Ссылка на документ / картинку</label>
                <input type="url" id="note-file-url" placeholder="https://example.com/image.png">

                <button class="btn" id="save-btn" onclick="saveNote()">Сохранить в облако</button>
            </div>

            <div class="card">
                <h2>Категории</h2>
                <div class="add-cat-container" style="margin-bottom: 15px;">
                    <input type="text" id="new-cat-name" placeholder="Новая категория">
                    <button class="btn btn-add-cat" onclick="addCategory()">+</button>
                </div>
                <div id="categories-list">
                    <div class="category-item active" id="cat-all" onclick="selectCategory('all')">
                        <span>📁 Все записи</span>
                    </div>
                </div>
            </div>
        </div>

        <div>
            <h1 id="view-title">Выбрано: Все записи</h1>
            <div id="notes-container">
                <div style="color: #64748b;">Загрузка записей...</div>
            </div>
        </div>
    </main>

    <script>
        // TODO: Вставьте СВОИ конфиги Firebase из настроек проекта, если они отличаются!
        const firebaseConfig = {
            apiKey: "AIzaSyAs...", 
            authDomain: "my-dashboard-dc67a.firebaseapp.com",
            projectId: "my-dashboard-dc67a",
            storageBucket: "my-dashboard-dc67a.appspot.com",
            messagingSenderId: "105...",
            appId: "1:105..."
        };

        // Инициализация Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        let currentCategoryId = 'all';
        let categoriesMap = {};

        // Загрузка категорий и заметок при старте
        window.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadNotes();
        });

        // 1. ЗАГРУЗКА КАТЕГОРИЙ
        function loadCategories() {
            db.collection("categories").orderBy("name").onSnapshot(snapshot => {
                const listContainer = document.getElementById('categories-list');
                const selectElement = document.getElementById('note-cat-select');
                
                // Сохраняем первый элемент "Все записи"
                listContainer.innerHTML = `
                    <div class="category-item ${currentCategoryId === 'all' ? 'active' : ''}" id="cat-all" onclick="selectCategory('all')">
                        <span>📁 Все записи</span>
                    </div>
                `;
                
                selectElement.innerHTML = '<option value="">-- Выберите категорию --</option>';
                categoriesMap = {};

                snapshot.forEach(doc => {
                    const cat = doc.data();
                    const id = doc.id;
                    categoriesMap[id] = cat.name;

                    // Добавляем в список слева
                    const div = document.createElement('div');
                    div.className = `category-item ${currentCategoryId === id ? 'active' : ''}`;
                    div.id = `cat-${id}`;
                    div.onclick = () => selectCategory(id);
                    div.innerHTML = `
                        <span>📂 ${cat.name}</span>
                        <button class="btn-danger" onclick="event.stopPropagation(); deleteCategory('${id}', '${cat.name}')">×</button>
                    `;
                    listContainer.appendChild(div);

                    // Добавляем в выпадающий список формы
                    const opt = document.createElement('option');
                    opt.value = id;
                    opt.innerText = cat.name;
                    selectElement.appendChild(opt);
                });
            });
        }

        // 2. ДОБАВЛЕНИЕ КАТЕГОРИИ
        async function addCategory() {
            const input = document.getElementById('new-cat-name');
            const name = input.value.trim();
            if(!name) return;

            try {
                await db.collection("categories").add({ name: name });
                input.value = '';
            } catch(e) {
                alert("Ошибка добавления категории: " + e.message);
            }
        }

        // 3. УДАЛЕНИЕ КАТЕГОРИИ
        async function deleteCategory(id, name) {
            if(!confirm(`Уверен, что хочешь удалить категорию "${name}"? Заметки в ней останутся.`)) return;
            try {
                await db.collection("categories").document(id).delete();
                if(currentCategoryId === id) selectCategory('all');
            } catch(e) {
                alert("Ошибка удаления: " + e.message);
            }
        }

        // 4. ПЕРЕКЛЮЧЕНИЕ КАТЕГОРИЙ СЛЕВА
        function selectCategory(id) {
            currentCategoryId = id;
            
            document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`cat-${id}`);
            if(activeEl) activeEl.classList.add('active');

            const title = document.getElementById('view-title');
            if(id === 'all') {
                title.innerText = "Выбрано: Все записи";
            } else {
                title.innerText = `Категория: ${categoriesMap[id] || 'Загрузка...'}`;
            }

            loadNotes();
        }

        // 5. ЗАГРУЗКА ЗАМЕТОК (ФИЛЬТРАЦИЯ ПО КАТЕГОРИИ)
        function loadNotes() {
            let query = db.collection("notes").orderBy("createdAt", "desc");
            
            if(currentCategoryId !== 'all') {
                query = query.where("catId", "==", currentCategoryId);
            }

            query.onSnapshot(snapshot => {
                const container = document.getElementById('notes-container');
                container.innerHTML = '';

                if(snapshot.empty) {
                    container.innerHTML = '<div class="card" style="color:#64748b; text-align:center;">В этой категории еще нет записей...</div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const note = doc.data();
                    const id = doc.id;

                    const dateStr = note.createdAt ? new Date(note.createdAt.seconds * 1000).toLocaleString('ru-RU') : 'Сохранение...';
                    const catName = categoriesMap[note.catId] || 'Без категории';

                    const card = document.createElement('div');
                    card.className = 'note-card';
                    
                    let fileHtml = '';
                    if(note.fileUrl) {
                        const nameOfFile = note.fileName || 'Открыть прикрепленный файл';
                        fileHtml = `<br><a href="${note.fileUrl}" target="_blank" class="note-file-link">📎 ${nameOfFile}</a>`;
                    }

                    card.innerHTML = `
                        <div class="note-header">
                            <span>📅 ${dateStr} | 📁 ${catName}</span>
                        </div>
                        <div class="note-text">${note.text || ''}</div>
                        ${fileHtml}
                        <button class="delete-note-btn" onclick="deleteNote('${id}')">×</button>
                    `;
                    container.appendChild(card);
                });
            }, error => {
                console.error("Ошибка при чтении заметок: ", error);
            });
        }

        // 6. СОХРАНЕНИЕ ЗАМЕТКИ (БЕЗ STORAGE, ЧЕРЕЗ ССЫЛКИ)
        async function saveNote() {
            const catId = document.getElementById('note-cat-select').value;
            const textInput = document.getElementById('note-text');
            const fileUrlInput = document.getElementById('note-file-url');
            const saveBtn = document.getElementById('save-btn');
            
            const text = textInput.value.trim();
            const fileUrl = fileUrlInput.value.trim();

            if(!catId) { alert('Пожалуйста, выберите категорию!'); return; }
            if(!text && !fileUrl) { alert('Введите текст или вставьте ссылку на файл/картинку!'); return; }

            saveBtn.disabled = true;
            saveBtn.innerText = "Сохранение...";

            try {
                // Напрямую пишем в бесплатный Firestore
                await db.collection("notes").add({
                    catId: catId,
                    text: text,
                    fileUrl: fileUrl || null,
                    fileName: fileUrl ? fileUrl.split('/').pop().split('?')[0] : null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Очистка формы при успехе
                textInput.value = '';
                fileUrlInput.value = '';

            } catch (error) {
                console.error("Ошибка сохранения в Firestore:", error);
                alert("Ошибка: " + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Сохранить в облако";
            }
        }

        // 7. УДАЛЕНИЕ ЗАМЕТКИ
        async function deleteNote(id) {
            if(!confirm("Удалить эту запись?")) return;
            try {
                await db.collection("notes").doc(id).delete();
            } catch(e) {
                alert("Не удалось удалить: " + e.message);
            }
        }
    </script>
</body>
</html>

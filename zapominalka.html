<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Запоминалка Pro</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <style>
        :root {
            --bg: #070a13;
            --panel: rgba(19, 26, 38, 0.75);
            --panel-light: rgba(28, 38, 55, 0.7);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --border-neon: rgba(59, 130, 246, 0.2);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, Arial, sans-serif; 
            background: radial-gradient(circle at 80% 20%, #1e1b4b 0%, #070a13 50%), 
                        radial-gradient(circle at 10% 80%, #0f172a 0%, #070a13 100%);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            background: rgba(7, 10, 19, 0.65); 
            backdrop-filter: blur(20px);
            padding: 18px 24px; 
            position: sticky; 
            top: 0; 
            border-bottom: 1px solid var(--border-neon); 
            z-index: 100; 
        }
        nav { display: flex; gap: 24px; max-width: 1400px; margin: auto; width: 100%; align-items: center;}
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.95em; transition: 0.3s; }
        nav a:hover { color: var(--text); }
        
        .workspace {
            display: grid;
            grid-template-columns: 380px 1fr;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            gap: 30px;
            padding: 30px;
            box-sizing: border-box;
            flex-grow: 1;
        }

        @media (max-width: 950px) {
            .workspace { grid-template-columns: 1fr; padding: 15px; gap: 20px;}
        }

        .panel { 
            background: var(--panel); 
            backdrop-filter: blur(16px);
            border-radius: 24px; 
            padding: 26px; 
            border: 1px solid var(--border-neon);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            height: fit-content;
        }
        
        h3 { margin-top: 0; font-size: 1.3em; color: #fff; margin-bottom: 20px; font-weight: 600; letter-spacing: 0.5px;}

        input[type="text"], textarea, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            background: var(--panel-light);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: var(--text);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
            background: rgba(20, 28, 43, 0.9);
        }

        /* КРАСИВАЯ КАСТОМНАЯ КНОПКА ВЫБОРА ФАЙЛА */
        .file-upload-wrapper {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }
        .file-upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(59, 130, 246, 0.35);
            color: #60a5fa;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-size: 0.95em;
        }
        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%;
            cursor: pointer;
        }
        .file-upload-wrapper:hover .file-upload-btn {
            background: rgba(59, 130, 246, 0.08);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.2);
        }
        
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            padding: 15px;
            border-radius: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(29, 78, 216, 0.4);
            font-size: 1em;
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 26px rgba(29, 78, 216, 0.6);
            filter: brightness(1.15);
        }
        .btn:active { transform: translateY(0); }
        .btn:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .cat-item {
            padding: 14px 18px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.25s ease;
            border-left: 4px solid transparent;
            font-weight: 500;
        }
        .cat-item:hover {
            background: rgba(59, 130, 246, 0.08);
            border-left-color: rgba(59, 130, 246, 0.5);
            transform: translateX(4px);
        }
        .cat-item.active {
            background: rgba(59, 130, 246, 0.16);
            border-left-color: var(--accent);
            border-color: rgba(59, 130, 246, 0.2);
            color: #fff;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
        }
        .cat-item .del-btn { color: var(--text-muted); padding: 2px 6px; border-radius: 6px; transition: 0.2s;}
        .cat-item .del-btn:hover { color: var(--danger); background: rgba(239, 68, 68, 0.15); }

        .notes-feed { display: flex; flex-direction: column; gap: 20px; }
        .note-card {
            background: var(--panel);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-neon);
            padding: 26px;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }
        .note-card:hover {
            border-color: rgba(59, 130, 246, 0.35);
            box-shadow: 0 16px 45px rgba(0,0,0,0.4);
            transform: translateY(-3px);
        }
        .note-card .meta { font-size: 0.8em; color: var(--text-muted); margin-bottom: 16px; display: flex; gap: 8px;}
        .note-card .content-text { font-size: 1.1em; line-height: 1.7; white-space: pre-wrap; color: #e2e8f0; }
        .note-card .delete-note-btn { 
            position: absolute; top: 24px; right: 24px; background:none; border:none; 
            color: var(--text-muted); cursor:pointer; font-size: 1.25em; transition: 0.2s;
            padding: 4px 8px; border-radius: 8px;
        }
        .note-card .delete-note-btn:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .mjx-chtml, .MathJax {
            font-size: 1.15em !important;
            color: #fff;
            background: rgba(255,255,255,0.04);
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.07);
        }

        .attachment-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 12px 18px;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 12px;
            cursor: pointer;
            color: #60a5fa;
            font-weight: 500;
            transition: all 0.25s ease;
        }
        .attachment-badge:hover { 
            background: rgba(59, 130, 246, 0.2); 
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 14px rgba(59, 130, 246, 0.3);
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 6, 10, 0.9);
            backdrop-filter: blur(14px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: #131a26;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }
        #modal-body {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px;
            box-sizing: border-box;
            min-height: 150px;
        }
        .modal-preview { max-width: 100%; max-height: 55vh; border-radius: 8px; object-fit: contain; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 14px; margin-top: 10px; }
        .close-modal { background: rgba(255,255,255,0.05); color: white; padding: 12px 24px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); font-weight: 600; transition: 0.2s;}
        .close-modal:hover { background: rgba(255,255,255,0.1); }
        .download-btn { background: var(--success); color: white; padding: 12px 24px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);}
        .download-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .view-external-btn { background: var(--accent); color: white; padding: 12px 24px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.2s;}
        .view-external-btn:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="index.html">← На главную</a>
        <a href="#" style="color: var(--accent); font-size: 1.1em; box-shadow: 0 2px 0 var(--accent); padding-bottom:4px;">Запоминалка Pro</a>
    </nav>
</header>

<div class="workspace">
    <div style="display: flex; flex-direction: column; gap: 24px;">
        <div class="panel">
            <h3>Добавить информацию</h3>
            <label style="font-size: 0.85em; color: var(--text-muted); display:block; margin-bottom: 6px;">Категория</label>
            <select id="note-cat-select"><option value="">Загрузка категорий...</option></select>
            
            <label style="font-size: 0.85em; color: var(--text-muted); display:block; margin-bottom: 6px;">Текст заметки / Формула</label>
            <textarea id="note-text" rows="5" placeholder="Примеры формул:&#13;Просто дробь: 4224000/2500&#13;Сложная: $\sqrt{x}$ или $\frac{a}{b}$"></textarea>
            
            <label style="font-size: 0.85em; color: var(--text-muted); display:block; margin-bottom: 6px;">Прикрепить документ</label>
            <div class="file-upload-wrapper">
                <div class="file-upload-btn" id="file-label-text">📂 Выбрать файл...</div>
                <input type="file" id="note-file" onchange="document.getElementById('file-label-text').innerText = this.files[0] ? '✓ ' + this.files[0].name : '📂 Выбрать файл...'">
            </div>
            
            <button class="btn" id="save-btn" onclick="saveNote()">Сохранить в облако</button>
        </div>

        <div class="panel">
            <h3>Категории</h3>
            <div style="display:flex; gap: 10px; margin-bottom: 18px;">
                <input type="text" id="new-cat-name" placeholder="Новая категория" style="margin:0;">
                <button class="btn" onclick="addCategory()" style="width: 50px; padding: 0;">+</button>
            </div>
            <div id="categories-container"></div>
        </div>
    </div>

    <div>
        <h2 style="margin: 0 0 24px 0; font-weight: 500; letter-spacing: 0.5px;">Выбрано: <span id="current-cat-title" style="color: var(--accent); font-weight:700;">Все записи</span></h2>
        <div id="notes-container" class="notes-feed"></div>
    </div>
</div>

<div id="file-modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modal-filename" style="margin: 0; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px;">Просмотр файла</h3>
        <div id="modal-body"></div>
        <div class="modal-actions">
            <button class="close-modal" onclick="closeModal()">Закрыть</button>
            <a id="modal-view-external" class="view-external-btn" href="#" target="_blank">Открыть вкладку</a>
            <a id="modal-download" class="download-btn" href="#" download target="_blank">Скачать файл</a>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let currentCategoryId = "all";
    let unsubscribeNotes = null;

    function formatFractions(text) {
        if (!text) return "";
        let processed = text;
        const regex = /(?<!\$)\b([A-Za-z0-9А-Яа-я,\.\s]+)\/([A-Za-z0-9А-Яа-я,\.\s]+)\b(?!(\$|\w))/g;
        if (regex.test(processed)) {
            processed = processed.replace(regex, (match, p1, p2) => {
                return `$\\frac{${p1.trim()}}{${p2.trim()}}$`;
            });
        }
        return processed;
    }

    // СЛУШАТЕЛЬ КАТЕГОРИЙ
    db.collection("categories").orderBy("name").onSnapshot((snapshot) => {
        const container = document.getElementById('categories-container');
        const select = document.getElementById('note-cat-select');
        
        container.innerHTML = `<div class="cat-item ${currentCategoryId === 'all' ? 'active' : ''}" onclick="switchCategory('all', 'Все записи')"><span>📂 Все записи</span></div>`;
        select.innerHTML = '<option value="">-- Выберите категорию --</option>';

        snapshot.forEach(docSnap => {
            const cat = docSnap.data();
            const id = docSnap.id;

            const div = document.createElement('div');
            div.className = `cat-item ${currentCategoryId === id ? 'active' : ''}`;
            div.onclick = () => switchCategory(id, cat.name);
            div.innerHTML = `<span>📁 ${cat.name}</span> <span class="del-btn" onclick="deleteCategory('${id}', event)">✕</span>`;
            container.appendChild(div);

            const opt = document.createElement('option');
            opt.value = id;
            opt.innerText = cat.name;
            select.appendChild(opt);
        });
    });

    // СЛУШАТЕЛЬ ЗАМЕТОК
    function loadNotes() {
        if (unsubscribeNotes) unsubscribeNotes();

        let notesRef = db.collection("notes");
        let q = (currentCategoryId !== "all") 
            ? notesRef.where("catId", "==", currentCategoryId).orderBy("createdAt", "desc")
            : notesRef.orderBy("createdAt", "desc");

        unsubscribeNotes = q.onSnapshot((snapshot) => {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';

            if(snapshot.empty) {
                container.innerHTML = '<div class="panel" style="color: var(--text-muted); text-align:center; padding: 40px; width:100%; box-sizing:border-box;">В этой категории еще нет записей...</div>';
                return;
            }

            snapshot.forEach(docSnap => {
                const note = docSnap.data();
                const id = docSnap.id;
                const div = document.createElement('div');
                div.className = 'note-card';

                let fileHtml = '';
                if (note.fileUrl) {
                    fileHtml = `
                        <div class="attachment-badge" onclick="viewFile('${note.fileUrl}', '${note.fileName}', '${note.fileType}')">
                            📎 Документ: ${note.fileName}
                        </div>
                    `;
                }

                const formattedText = formatFractions(note.text);

                div.innerHTML = `
                    <button class="delete-note-btn" onclick="deleteNote('${id}', '${note.fileStoragePath || ''}')">✕</button>
                    <div class="meta"><span>📅 ${note.createdAt ? new Date(note.createdAt.seconds * 1000).toLocaleString('ru-RU') : 'Сейчас'}</span></div>
                    <div class="content-text">${formattedText}</div>
                    ${fileHtml}
                `;
                container.appendChild(div);
            });

            if(window.MathJax && MathJax.typeset) {
                MathJax.typeset();
            }
        }, (error) => {
            console.error("Ошибка получения заметок: ", error);
        });
    }

    function switchCategory(id, name) {
        currentCategoryId = id;
        document.getElementById('current-cat-title').innerText = name;
        loadNotes();
    }

    function addCategory() {
        const input = document.getElementById('new-cat-name');
        const name = input.value.trim();
        if(!name) return;
        db.collection("categories").add({ name: name }).then(() => { input.value = ''; }).catch(e => console.error(e));
    }

    function deleteCategory(id, e) {
        e.stopPropagation();
        if(confirm("Удалить эту категорию?")) {
            db.collection("categories").doc(id).delete().then(() => {
                if(currentCategoryId === id) switchCategory('all', 'Все записи');
            }).catch(e => console.error(e));
        }
    }

    // ПОЛНОСТЬЮ ИСПРАВЛЕННАЯ ФУНКЦИЯ ДЛЯ ЗАГРУЗКИ ФАЙЛОВ И ТЕКСТА
    function saveNote() {
        const catId = document.getElementById('note-cat-select').value;
        const text = document.getElementById('note-text').value.trim();
        const fileInput = document.getElementById('note-file');
        const saveBtn = document.getElementById('save-btn');
        const file = fileInput.files[0];

        if(!catId || catId === "") { alert('Пожалуйста, выберите существующую категорию!'); return; }
        if(!text && !file) { alert('Напишите текст или выберите файл для загрузки!'); return; }

        saveBtn.disabled = true;
        saveBtn.innerText = file ? "Отправка файла в облако..." : "Сохранение...";

        let fileUrl = null;
        let fileStoragePath = null;

        const uploadToFirestore = () => {
            db.collection("notes").add({
                catId: catId,
                text: text,
                fileUrl: fileUrl,
                fileName: file ? file.name : null,
                fileType: file ? file.type : null,
                fileStoragePath: fileStoragePath,
                createdAt: firebase.firestore.FieldValue.serverTimestamp() || new Date()
            }).then(() => {
                document.getElementById('note-text').value = '';
                fileInput.value = '';
                document.getElementById('file-label-text').innerText = '📂 Выбрать файл...';
                saveBtn.disabled = false;
                saveBtn.innerText = "Сохранить в облако";
            }).catch(e => {
                console.error("Firestore ошибка:", e);
                alert("Ошибка! Проверь правила (Rules) во вкладке Cloud Firestore.");
                saveBtn.disabled = false;
                saveBtn.innerText = "Сохранить в облако";
            });
        };

        if (file) {
            fileStoragePath = `uploads/${Date.now()}_${file.name}`;
            const storageRef = storage.ref().child(fileStoragePath);
            
            storageRef.put(file).then((snapshot) => {
                return snapshot.ref.getDownloadURL();
            }).then((url) => {
                fileUrl = url;
                uploadToFirestore();
            }).catch(error => {
                console.error("Storage сбой:", error);
                // Четкая подсказка пользователю, если Firebase Storage закрыт правилами доступа
                alert("⚠️ Ошибка Firebase Storage!\n\nФайлы не загружаются, потому что облачное хранилище заблокировано.\n\nРЕШЕНИЕ:\n1. Зайди в Firebase Console\n2. Открой вкладку Storage -> Rules\n3. Замени строку на:\n   allow read, write: if true;\n4. Нажми Publish!");
                saveBtn.disabled = false;
                saveBtn.innerText = "Сохранить в облако";
            });
        } else {
            uploadToFirestore();
        }
    }

    function deleteNote(id, storagePath) {
        if(confirm("Удалить эту запись?")) {
            db.collection("notes").doc(id).delete().then(() => {
                if (storagePath) {
                    storage.ref().child(storagePath).delete().catch(e => console.log("Файл удален вручную"));
                }
            }).catch(e => console.error(e));
        }
    }

    function viewFile(url, name, type) {
        document.getElementById('modal-filename').innerText = name;
        const body = document.getElementById('modal-body');
        const downloadLink = document.getElementById('modal-download');
        const externalLink = document.getElementById('modal-view-external');
        
        body.innerHTML = '';
        downloadLink.href = url;
        externalLink.href = url;

        if (type && type.startsWith('image/')) {
            body.innerHTML = `<img src="${url}" class="modal-preview" alt="Превью">`;
            externalLink.style.display = 'inline-block';
        } else {
            body.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <span style="font-size: 3em;">📄</span>
                    <p style="color: var(--text-muted); margin-top: 10px;">
                        Документ: <b>${name}</b>.<br>
                        Для работы с таблицей/файлом откройте его в новой вкладке.
                    </p>
                </div>`;
            externalLink.style.display = 'inline-block';
        }

        document.getElementById('file-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('file-modal').style.display = 'none';
    }

    loadNotes();
</script>

</body>
</html>

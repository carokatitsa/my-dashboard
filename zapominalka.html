<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Запоминалка Pro</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg: #0a0e17;
            --panel: #131a26;
            --panel-light: #1c2637;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.35);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --border-neon: rgba(59, 130, 246, 0.15);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            background: rgba(19, 26, 38, 0.85); 
            backdrop-filter: blur(16px);
            padding: 18px 24px; 
            position: sticky; 
            top: 0; 
            border-bottom: 1px solid var(--border-neon); 
            z-index: 100; 
        }
        nav { display: flex; gap: 24px; max-width: 1400px; margin: auto; width: 100%; align-items: center;}
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.95em; transition: 0.3s; }
        nav a:hover { color: var(--text); }
        
        .workspace {
            display: grid;
            grid-template-columns: 360px 1fr;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            gap: 30px;
            padding: 30px;
            box-sizing: border-box;
            flex-grow: 1;
        }

        @media (max-width: 950px) {
            .workspace { grid-template-columns: 1fr; padding: 15px; gap: 20px;}
        }

        .panel { 
            background: var(--panel); 
            border-radius: 20px; 
            padding: 24px; 
            border: 1px solid var(--border-neon);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            height: fit-content;
        }
        
        h3 { margin-top: 0; font-size: 1.25em; color: #fff; margin-bottom: 20px; font-weight: 600; letter-spacing: 0.3px;}

        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            background: var(--panel-light);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 14px var(--accent-glow);
            background: rgba(28, 38, 55, 0.7);
        }
        
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(29, 78, 216, 0.3);
            font-size: 0.95em;
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(29, 78, 216, 0.45);
            filter: brightness(1.1);
        }
        .btn:active { transform: translateY(0); }

        .cat-item {
            padding: 14px 18px;
            margin-bottom: 10px;
            background: var(--panel-light);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
            font-weight: 500;
        }
        .cat-item:hover {
            background: rgba(59, 130, 246, 0.08);
            border-left-color: rgba(59, 130, 246, 0.5);
            transform: translateX(3px);
        }
        .cat-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-left-color: var(--accent);
            color: #fff;
            box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.1);
        }
        .cat-item .del-btn { color: var(--text-muted); padding: 2px 6px; border-radius: 6px; transition: 0.2s;}
        .cat-item:hover .del-btn { display: block; }
        .cat-item .del-btn:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .notes-feed { display: flex; flex-direction: column; gap: 20px; }
        .note-card {
            background: var(--panel);
            border: 1px solid var(--border-neon);
            padding: 24px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .note-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 12px 36px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }
        .note-card .meta { font-size: 0.8em; color: var(--text-muted); margin-bottom: 14px; display: flex; gap: 8px;}
        .note-card .content-text { font-size: 1.1em; line-height: 1.7; white-space: pre-wrap; color: #e2e8f0; }
        .note-card .delete-note-btn { 
            position: absolute; top: 22px; right: 22px; background:none; border:none; 
            color: var(--text-muted); cursor:pointer; font-size: 1.2em; transition: 0.2s;
            padding: 4px 8px; border-radius: 8px;
        }
        .note-card .delete-note-btn:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        /* Красивое оформление формул */
        .mjx-chtml, .MathJax {
            font-size: 1.15em !important;
            color: #fff;
            background: rgba(255,255,255,0.03);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .attachment-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
            padding: 10px 16px;
            background: rgba(59, 130, 246, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            cursor: pointer;
            color: #60a5fa;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .attachment-badge:hover { 
            background: rgba(59, 130, 246, 0.15); 
            border-color: var(--accent);
            color: #fff;
        }

        /* Адаптивное модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 6, 10, 0.88);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }
        #modal-body {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px;
            box-sizing: border-box;
            min-height: 150px;
        }
        .modal-preview { max-width: 100%; max-height: 55vh; border-radius: 8px; object-fit: contain; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 14px; margin-top: 10px; }
        .close-modal { background: var(--panel-light); color: white; padding: 12px 24px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); font-weight: 600; transition: 0.2s;}
        .close-modal:hover { background: #232f44; }
        .download-btn { background: var(--success); color: white; padding: 12px 24px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);}
        .download-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .view-external-btn { background: var(--accent); color: white; padding: 12px 24px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.2s;}
        .view-external-btn:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="index.html">← На главную</a>
        <a href="#" style="color: var(--accent); font-size: 1.1em; box-shadow: 0 2px 0 var(--accent); padding-bottom:4px;">Запоминалка Pro</a>
    </nav>
</header>

<div class="workspace">
    <div style="display: flex; flex-direction: column; gap: 24px;">
        <div class="panel">
            <h3>Добавить информацию</h3>
            <label style="font-size: 0.85em; color: var(--text-muted); display:block; margin-bottom: 6px;">Категория</label>
            <select id="note-cat-select"><option value="">Загрузка категорий...</option></select>
            
            <label style="font-size: 0.85em; color: var(--text-muted); display:block; margin-bottom: 6px;">Текст заметки / Формула</label>
            <textarea id="note-text" rows="5" placeholder="Примеры формул:&#13;Просто дробь: 4224000/2500&#13;Сложная: $\sqrt{x}$ или $\frac{a}{b}$"></textarea>
            
            <label style="font-size: 0.85em; color: var(--text-muted); display:block; margin-bottom: 6px;">Прикрепить файл</label>
            <input type="file" id="note-file">
            
            <button class="btn" onclick="saveNote()">Сохранить в облако</button>
        </div>

        <div class="panel">
            <h3>Категории</h3>
            <div style="display:flex; gap: 10px; margin-bottom: 18px;">
                <input type="text" id="new-cat-name" placeholder="Новая категория" style="margin:0;">
                <button class="btn" onclick="addCategory()" style="width: 50px; padding: 0;">+</button>
            </div>
            <div id="categories-container"></div>
        </div>
    </div>

    <div>
        <h2 style="margin: 0 0 24px 0; font-weight: 500; letter-spacing: 0.5px;">Выбрано: <span id="current-cat-title" style="color: var(--accent); font-weight:700;">Все записи</span></h2>
        <div id="notes-container" class="notes-feed"></div>
    </div>
</div>

<div id="file-modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modal-filename" style="margin: 0; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px;">Просмотр файла</h3>
        <div id="modal-body"></div>
        <div class="modal-actions">
            <button class="close-modal" onclick="closeModal()">Закрыть</button>
            <a id="modal-view-external" class="view-external-btn" href="#" target="_blank">Открыть вкладку</a>
            <a id="modal-download" class="download-btn" href="#" download target="_blank">Скачать файл</a>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentCategoryId = "all";
    let unsubscribeNotes = null;

    // ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ ДЛЯ АВТО-ПЕРЕВОДА ОБЫЧНЫХ ДРОБЕЙ (например, 2/3) В LaTeX
    function formatFractions(text) {
        if (!text) return "";
        // Ищет шаблоны чисел или переменных, разделенных слэшем, например 4224000/2500 или a/b, кроме тех, что уже внутри знаков $
        // Заменяет их на формат LaTeX $\frac{числитель}{знаменатель}$
        let processed = text;
        const regex = /(?<!\$)\b([A-Za-z0-9А-Яа-я,\.\s]+)\/([A-Za-z0-9А-Яа-я,\.\s]+)\b(?!(\$|\w))/g;
        
        if (regex.test(processed)) {
            processed = processed.replace(regex, (match, p1, p2) => {
                return `$\\frac{${p1.trim()}}{${p2.trim()}}$`;
            });
        }
        return processed;
    }

    // СЛУШАТЕЛЬ КАТЕГОРИЙ
    const catQuery = query(collection(db, "categories"), orderBy("name"));
    onSnapshot(catQuery, (snapshot) => {
        const container = document.getElementById('categories-container');
        const select = document.getElementById('note-cat-select');
        
        container.innerHTML = `<div class="cat-item ${currentCategoryId === 'all' ? 'active' : ''}" onclick="switchCategory('all', 'Все записи')"><span>📂 Все записи</span></div>`;
        select.innerHTML = '<option value="">-- Выберите категорию --</option>';

        snapshot.forEach(docSnap => {
            const cat = docSnap.data();
            const id = docSnap.id;

            const div = document.createElement('div');
            div.className = `cat-item ${currentCategoryId === id ? 'active' : ''}`;
            div.onclick = () => switchCategory(id, cat.name);
            div.innerHTML = `<span>📁 ${cat.name}</span> <span class="del-btn" onclick="deleteCategory('${id}', event)">✕</span>`;
            container.appendChild(div);

            const opt = document.createElement('option');
            opt.value = id;
            opt.innerText = cat.name;
            select.appendChild(opt);
        });
    });

    // СЛУШАТЕЛЬ ЗАМЕТОК
    function loadNotes() {
        if (unsubscribeNotes) unsubscribeNotes();

        let notesRef = collection(db, "notes");
        let q;
        
        if (currentCategoryId !== "all") {
            q = query(notesRef, where("catId", "==", currentCategoryId), orderBy("createdAt", "desc"));
        } else {
            q = query(notesRef, orderBy("createdAt", "desc"));
        }

        unsubscribeNotes = onSnapshot(q, (snapshot) => {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';

            if(snapshot.empty) {
                container.innerHTML = '<div class="panel" style="color: var(--text-muted); text-align:center; padding: 40px;">В этой категории еще нет записей...</div>';
                return;
            }

            snapshot.forEach(docSnap => {
                const note = docSnap.data();
                const id = docSnap.id;
                const div = document.createElement('div');
                div.className = 'note-card';

                let fileHtml = '';
                if (note.fileUrl) {
                    fileHtml = `
                        <div class="attachment-badge" onclick="viewFile('${note.fileUrl}', '${note.fileName}', '${note.fileType}')">
                            📎 Скрепка: ${note.fileName}
                        </div>
                    `;
                }

                // Форматируем текст (обрабатываем дробы /)
                const formattedText = formatFractions(note.text);

                div.innerHTML = `
                    <button class="delete-note-btn" onclick="deleteNote('${id}', '${note.fileStoragePath || ''}')">✕</button>
                    <div class="meta"><span>📅 ${note.createdAt ? new Date(note.createdAt.seconds * 1000).toLocaleString('ru-RU') : 'Сейчас'}</span></div>
                    <div class="content-text">${formattedText}</div>
                    ${fileHtml}
                `;
                container.appendChild(div);
            });

            // Запуск рендера формул MathJax
            if(window.MathJax && MathJax.typeset) {
                MathJax.typeset();
            }
        }, (error) => {
            console.error("Ошибка при получении заметок: ", error);
        });
    }

    function switchCategory(id, name) {
        currentCategoryId = id;
        document.getElementById('current-cat-title').innerText = name;
        loadNotes();
    }

    async function addCategory() {
        const input = document.getElementById('new-cat-name');
        const name = input.value.trim();
        if(!name) return;
        try {
            await addDoc(collection(db, "categories"), { name: name });
            input.value = '';
        } catch(e) { console.error(e); }
    }

    async function deleteCategory(id, e) {
        e.stopPropagation();
        if(confirm("Удалить эту категорию?")) {
            try {
                await deleteDoc(doc(db, "categories", id));
                if(currentCategoryId === id) switchCategory('all', 'Все записи');
            } catch(e) { console.error(e); }
        }
    }

    async function saveNote() {
        const catId = document.getElementById('note-cat-select').value;
        const text = document.getElementById('note-text').value.trim();
        const fileInput = document.getElementById('note-file');
        const file = fileInput.files[0];

        if(!catId) { alert('Пожалуйста, выберите категорию!'); return; }
        if(!text && !file) { alert('Напишите текст или выберите файл!'); return; }

        let fileUrl = null;
        let fileStoragePath = null;

        if (file) {
            fileStoragePath = `uploads/${Date.now()}_${file.name}`;
            const storageRef = ref(storage, fileStoragePath);
            
            try {
                const snapshot = await uploadBytes(storageRef, file);
                fileUrl = await getDownloadURL(snapshot.ref);
            } catch (error) {
                console.error(error);
                alert("Ошибка загрузки файла! Пожалуйста, проверьте правила (Rules) вашего Firebase Storage.");
                return;
            }
        }

        try {
            await addDoc(collection(db, "notes"), {
                catId: catId,
                text: text,
                fileUrl: fileUrl,
                fileName: file ? file.name : null,
                fileType: file ? file.type : null,
                fileStoragePath: fileStoragePath,
                createdAt: serverTimestamp()
            });
            document.getElementById('note-text').value = '';
            fileInput.value = '';
        } catch (e) { console.error(e); }
    }

    async function deleteNote(id, storagePath) {
        if(confirm("Удалить эту запись?")) {
            try {
                await deleteDoc(doc(db, "notes", id));
                if (storagePath) {
                    const fileRef = ref(storage, storagePath);
                    await deleteObject(fileRef).catch(e => console.log("Файл в хранилище не найден или уже удален"));
                }
            } catch(e) { console.error(e); }
        }
    }

    // УЛУЧШЕННЫЙ ПРОСМОТР ФАЙЛОВ
    function viewFile(url, name, type) {
        document.getElementById('modal-filename').innerText = name;
        const body = document.getElementById('modal-body');
        const downloadLink = document.getElementById('modal-download');
        const externalLink = document.getElementById('modal-view-external');
        
        body.innerHTML = '';
        downloadLink.href = url;
        externalLink.href = url;

        // Если файл - картинка, показываем её в окне напрямую
        if (type && type.startsWith('image/')) {
            body.innerHTML = `<img src="${url}" class="modal-preview" alt="Превью">`;
            externalLink.style.display = 'inline-block';
        } else {
            // Для остальных типов файлов (pdf, docx, zip)
            body.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <span style="font-size: 3em;">📄</span>
                    <p style="color: var(--text-muted); margin-top: 10px;">
                        Файл системы: <b>${name}</b>.<br>
                        Для быстрого просмотра нажмите «Открыть вкладку».
                    </p>
                </div>`;
            externalLink.style.display = 'inline-block';
        }

        document.getElementById('file-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('file-modal').style.display = 'none';
    }

    // Привязка к объекту window
    window.addCategory = addCategory;
    window.deleteCategory = deleteCategory;
    window.saveNote = saveNote;
    window.deleteNote = deleteNote;
    window.viewFile = viewFile;
    window.closeModal = closeModal;
    window.switchCategory = switchCategory;

    loadNotes();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Coin Archive Ultra Pro v4.9 | Smart Parser & Lazy Load</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --bg: #0a0a0a; --card: #161616; --gold: #f1c40f; --text: #e0e0e0; 
            --blue: #3498db; --green: #2ecc71; --red: #e74c3c; --border: #333; 
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .stats-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card span { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card b { font-size: 24px; color: var(--gold); }

        .admin-panel { background: var(--card); padding: 25px; border-radius: 12px; border: 2px solid var(--border); margin-bottom: 20px; }
        .inputs-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, textarea, select { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }
        
        .btn-main { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.3s; }
        .btn-main.edit-mode { background: var(--blue); color: #fff; }

        .filter-bar { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border); }

        .coin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .coin-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); 
            position: relative; transition: 0.3s; min-height: 350px;
        }
        .coin-card[data-s="Продано"] { border-color: var(--red); opacity: 0.8; }
        .coin-card[data-s="Аукцион"] { border-color: var(--blue); box-shadow: 0 0 10px rgba(52, 152, 219, 0.2); }
        .coin-card.hidden { display: none !important; }
        
        .coin-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: #000; height: 160px; overflow: hidden; }
        .coin-gallery img { 
            width: 100%; height: 160px; object-fit: cover; cursor: pointer; background: #222; 
            opacity: 0; transition: opacity 0.5s;
        }
        .coin-gallery img.loaded { opacity: 1; }

        .coin-info { padding: 15px; }
        .coin-id { color: var(--gold); font-size: 20px; font-weight: bold; }
        .coin-price { font-size: 18px; font-weight: bold; color: #fff; }
        
        .card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .btn-card { padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: #222; color: #fff; font-size: 12px; }
        .btn-del { background: var(--red); position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; z-index: 5; color: white; border: none; cursor: pointer; }

        #saleModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); padding: 30px; border-radius: 12px; border: 2px solid var(--gold); width: 320px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-panel" id="statsDisplay">
        <div class="stat-card"><span>Выручка / Лотов</span><b id="stat1">0</b></div>
        <div class="stat-card"><span>Продано / Активно</span><b id="stat2">0</b></div>
        <div class="stat-card"><span>Ср. чек / Тип</span><b id="stat3">0</b></div>
    </div>

    <div class="admin-panel">
        <div class="inputs-row">
            <input type="number" id="cNum" placeholder="Номер">
            <input type="text" id="cPrice" placeholder="Цена / Старт">
            <select id="cStatus">
                <option value="В наличии">В наличии</option>
                <option value="Продано">Продано</option>
                <option value="Аукцион">Аукцион</option>
            </select>
        </div>
        <textarea id="cUrls" placeholder="Вставьте ссылки или HTML-код с ImgBB..." rows="2"></textarea>
        <textarea id="cDesc" placeholder="Описание..." rows="2" style="margin-top:10px"></textarea>
        <button id="mainBtn" class="btn-main" onclick="saveData()">Добавить в базу</button>
        <button id="cancelBtn" onclick="resetForm()" style="display:none; color:gray; width:100%; margin-top:10px; cursor:pointer; background:none; border:none;">Отмена</button>
        
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="applyFilters()">
            <select id="sortSelect" onchange="applyFilters()">
                <option value="newest">Сначала новые</option>
                <option value="numAsc">Номер: 1 > 99</option>
                <option value="numDesc">Номер: 99 > 1</option>
            </select>
            <select id="filterStatus" onchange="applyFilters()">
                <option value="all">Все монеты</option>
                <option value="В наличии">В наличии</option>
                <option value="Продано">Архив продаж</option>
                <option value="Аукцион">Аукционы</option>
            </select>
        </div>
    </div>

    <div id="coinGrid" class="coin-grid"></div>
</div>

<div id="saleModal">
    <div class="modal-content">
        <h3>💰 Фиксация продажи</h3>
        <input type="number" id="modalPrice" placeholder="Цена финала">
        <input type="number" id="modalQty" value="1" style="margin-top:10px">
        <button class="btn-main" style="margin-top:15px" onclick="confirmSale()">ПОДТВЕРДИТЬ</button>
        <button style="color:gray; margin-top:10px; background:none; border:none; cursor:pointer;" onclick="closeModal()">ОТМЕНА</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDLzkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:90e5e9a158f31d9728913d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let allCoins = [];
    let currentEditId = null;
    let salePendingId = null;

    db.collection("my_coins").onSnapshot(snap => {
        allCoins = snap.docs.map(d => ({
            id: d.id, 
            ...d.data(),
            numSort: parseInt(d.data().num) || 0,
            tsSort: d.data().lastUpdate ? d.data().lastUpdate.toMillis() : 0
        }));
        renderAllCards();
    });

    function renderAllCards() {
        const grid = document.getElementById('coinGrid');
        grid.innerHTML = allCoins.map(c => `
            <div class="coin-card" id="card-${c.id}" data-s="${c.status}">
                <button class="btn-del" onclick="deleteCoin('${c.id}')">✕</button>
                <div class="coin-gallery">
                    ${(c.imgs||[]).slice(0,2).map(url=>`
                        <img data-src="${url}" 
                             src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" 
                             class="lazy"
                             onerror="this.src='https://via.placeholder.com/300x160?text=Error'"
                             onload="this.classList.add('loaded')"
                             onclick="window.open('${url}')">
                    `).join('')}
                </div>
                <div class="coin-info">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <span class="coin-id"># ${c.num}</span>
                        <span class="coin-price">${c.price}</span>
                    </div>
                    <div style="color:${getStatusColor(c.status)}; font-weight:bold; font-size:12px; margin-bottom:8px;">
                        ● ${c.status} ${c.saleTotal ? ` | ${c.saleTotal}` : ''}
                    </div>
                    <div style="height:36px; overflow:hidden; font-size:12px; color:#888;">${c.desc || ''}</div>
                    <div class="card-btns">
                        <button class="btn-card" onclick="editCoin('${c.id}')">ПРАВКА</button>
                        <button class="btn-card" style="border:1px solid var(--gold); color:var(--gold);" onclick="handleStatusClick('${c.id}', '${c.status}', '${c.price}')">СТАТУС</button>
                    </div>
                </div>
            </div>
        `).join('');
        
        initLazyLoad();
        applyFilters();
    }

    function initLazyLoad() {
        const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    const img = entry.target;
                    if(img.dataset.src) img.src = img.dataset.src;
                    obs.unobserve(img);
                }
            });
        }, { rootMargin: "300px" });
        document.querySelectorAll('img.lazy').forEach(img => observer.observe(img));
    }

    function getStatusColor(s) {
        if(s === 'Продано') return 'var(--red)';
        if(s === 'Аукцион') return 'var(--blue)';
        return 'var(--green)';
    }

    function applyFilters() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const statusF = document.getElementById('filterStatus').value;
        const sortF = document.getElementById('sortSelect').value;
        const grid = document.getElementById('coinGrid');
        
        let rev = 0, qty = 0, count = 0;
        let filtered = allCoins.filter(c => {
            const matchStatus = (statusF === "all" || c.status === statusF);
            const matchSearch = (`${c.num} ${c.desc}`.toLowerCase().includes(query));
            return matchStatus && matchSearch;
        });

        filtered.sort((a, b) => {
            if (sortF === "numAsc") return a.numSort - b.numSort;
            if (sortF === "numDesc") return b.numSort - a.numSort;
            return b.tsSort - a.tsSort;
        });

        document.querySelectorAll('.coin-card').forEach(el => el.classList.add('hidden'));
        filtered.forEach(c => {
            const el = document.getElementById(`card-${c.id}`);
            if(el) {
                el.classList.remove('hidden');
                grid.appendChild(el);
                if(c.status === "Продано") { rev += (parseFloat(c.saleTotal) || 0); qty += (parseInt(c.saleQty) || 0); count++; }
            }
        });

        const s1 = document.getElementById('stat1'), s2 = document.getElementById('stat2'), s3 = document.getElementById('stat3');
        if(statusF === "Продано") {
            s1.innerText = rev.toLocaleString(); s2.innerText = qty; s3.innerText = count > 0 ? (rev/count).toFixed(0) : 0;
        } else {
            s1.innerText = filtered.length; s2.innerText = statusF === "Аукцион" ? "Торги" : "В наличии"; s3.innerText = "Активно";
        }
    }

    async function saveData() {
        const num = document.getElementById('cNum').value;
        if(!num) return alert("Нужен номер!");
        
        let rawInput = document.getElementById('cUrls').value;
        let cleanImgs = [];

        // УМНЫЙ ПАРСЕР: Ищем все прямые ссылки (начинаются на http и заканчиваются на расширение фото)
        // Либо вытаскиваем из тегов <img src="...">
        const imgRegex = /(https?:\/\/[^"'\s<>]+?\.(?:jpg|jpeg|png|webp|gif))/gi;
        let match;
        while ((match = imgRegex.exec(rawInput)) !== null) {
            cleanImgs.push(match[0]);
        }

        // Если регулярка ничего не нашла, пробуем просто разделить запятыми (на всякий случай)
        if(cleanImgs.length === 0 && rawInput.trim() !== "") {
            cleanImgs = rawInput.split(',').map(s => s.trim()).filter(s => s);
        }

        const data = {
            num: num, price: document.getElementById('cPrice').value,
            status: document.getElementById('cStatus').value,
            imgs: cleanImgs,
            desc: document.getElementById('cDesc').value,
            lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        if(currentEditId) { await db.collection("my_coins").doc(currentEditId).update(data); currentEditId = null; }
        else { await db.collection("my_coins").add(data); }
        resetForm();
    }

    function handleStatusClick(id, status, price) {
        if(status === "Продано") {
            if(confirm("Вернуть в наличие?")) db.collection("my_coins").doc(id).update({ status: "В наличии", saleQty: firebase.firestore.FieldValue.delete(), saleTotal: firebase.firestore.FieldValue.delete() });
            return;
        }
        salePendingId = id;
        document.getElementById('modalPrice').value = price.toString().replace(/[^0-9.]/g, '');
        document.getElementById('saleModal').style.display = "flex";
    }

    async function confirmSale() {
        const p = parseFloat(document.getElementById('modalPrice').value) || 0;
        const q = parseInt(document.getElementById('modalQty').value) || 1;
        await db.collection("my_coins").doc(salePendingId).update({ status: "Продано", salePrice: p, saleQty: q, saleTotal: p*q, lastUpdate: firebase.firestore.FieldValue.serverTimestamp() });
        closeModal();
    }

    function editCoin(id) {
        const c = allCoins.find(x => x.id === id);
        currentEditId = id;
        ['cNum','cPrice','cUrls','cDesc','cStatus'].forEach(f => document.getElementById(f).value = (f==='cUrls' ? (c.imgs||[]).join(', ') : c[f.slice(1)]));
        document.getElementById('mainBtn').innerText = "ОБНОВИТЬ";
        document.getElementById('mainBtn').classList.add('edit-mode');
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo({top:0, behavior:'smooth'});
    }

    function resetForm() { currentEditId = null; ['cNum','cPrice','cUrls','cDesc'].forEach(id => document.getElementById(id).value = ""); document.getElementById('mainBtn').innerText = "Добавить"; document.getElementById('mainBtn').classList.remove('edit-mode'); document.getElementById('cancelBtn').style.display = "none"; }
    function closeModal() { document.getElementById('saleModal').style.display = "none"; }
    async function deleteCoin(id) { if(confirm("Удалить?")) await db.collection("my_coins").doc(id).delete(); }

</script>
</body>
</html>

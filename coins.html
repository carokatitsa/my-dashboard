<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Coin Archive Pro v4.0 | Ultra Fast</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --gold: #f1c40f; --text: #e0e0e0; --blue: #3498db; --green: #2ecc71; --red: #e74c3c; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* ОПТИМИЗАЦИЯ РЕНДЕРА */
        .coin-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); 
            position: relative; transition: 0.3s;
            /* Магия: браузер не тратит ресурсы на карточки вне экрана */
            content-visibility: auto;
            contain-intrinsic-size: 400px; 
        }
        .coin-card.hidden { display: none; }

        .stats-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .stat-card b { font-size: 26px; color: var(--gold); }

        .admin-panel { background: var(--card); padding: 25px; border-radius: 12px; border: 2px solid var(--border); margin-bottom: 20px; }
        .inputs-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, textarea, select { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 14px; outline: none; }
        
        .btn-main { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; text-transform: uppercase; }
        .btn-main.edit-mode { background: var(--blue); color: #fff; }

        .filter-bar { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border); }

        .coin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .coin-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 5px; background: #000; padding: 5px; min-height: 140px; }
        
        /* Ускорение картинок */
        .coin-gallery img { width: 100%; height: 140px; object-fit: cover; cursor: pointer; background: #222; }

        .coin-info { padding: 20px; }
        .coin-id { color: var(--gold); font-size: 22px; font-weight: bold; }
        .card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-card { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #222; color: #fff; }
        .btn-del { background: var(--red); position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 50%; z-index: 5; color: white; border: none; cursor: pointer; }

        #saleModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 30px; border-radius: 15px; border: 2px solid var(--gold); width: 350px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-panel" id="statsDisplay" style="display: none;">
        <div class="stat-card"><span>Выручка</span><b id="totalRevenue">0.00</b></div>
        <div class="stat-card"><span>Продано</span><b id="totalSoldQty">0</b></div>
        <div class="stat-card"><span>Средний чек</span><b id="avgCheck">0.00</b></div>
    </div>

    <div class="admin-panel">
        <div class="inputs-row">
            <input type="text" id="cNum" placeholder="Номер">
            <input type="text" id="cPrice" placeholder="Цена">
            <select id="cStatus">
                <option value="В наличии">В наличии</option>
                <option value="Продано">Продано</option>
            </select>
        </div>
        <textarea id="cUrls" placeholder="Ссылки на фото..." rows="2"></textarea>
        <textarea id="cDesc" placeholder="Описание..." rows="2" style="margin-top:10px"></textarea>
        <button id="mainBtn" class="btn-main" onclick="saveData()">Добавить</button>
        <button id="cancelBtn" onclick="resetForm()" style="display:none; color:gray; width:100%; margin-top:10px; cursor:pointer; background:none; border:none;">Отмена</button>
        
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 Быстрый поиск..." oninput="fastFilter()">
            <select id="sortSelect" onchange="fastFilter()">
                <option value="lastUpdate">Последние изменения</option>
                <option value="numAsc">По номеру (1-9)</option>
                <option value="numDesc">По номеру (9-1)</option>
            </select>
            <select id="filterStatus" onchange="fastFilter()">
                <option value="all">Все монеты</option>
                <option value="В наличии">В наличии</option>
                <option value="Продано">Архив продаж</option>
            </select>
        </div>
    </div>

    <div id="coinGrid" class="coin-grid"></div>
</div>

<div id="saleModal">
    <div class="modal-content">
        <h3>💰 Оформление продажи</h3>
        <label>Цена продажи</label>
        <input type="number" id="modalPrice">
        <label>Количество</label>
        <input type="number" id="modalQty" value="1">
        <button class="btn-main" onclick="confirmSale()">Подтвердить</button>
        <button style="color:gray; margin-top:15px; cursor:pointer; background:none; border:none;" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDLzkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:90e5e9a158f31d9728913d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let allCoins = [];
    let currentEditId = null;
    let salePendingId = null;
    let filterTimeout; // Для задержки поиска

    // Загрузка один раз при старте или изменении
    db.collection("my_coins").orderBy("lastUpdate", "desc").onSnapshot(snap => {
        allCoins = snap.docs.map(d => ({id: d.id, ...d.data()}));
        fullRender(); // Первичная отрисовка всех элементов
    });

    // Полная перерисовка только при изменении данных в базе
    function fullRender() {
        const grid = document.getElementById('coinGrid');
        grid.innerHTML = allCoins.map(c => `
            <div class="coin-card" id="card-${c.id}" data-num="${c.num}" data-status="${c.status}" data-desc="${(c.desc||'').toLowerCase()}">
                <button class="btn-del" onclick="deleteCoin('${c.id}')">✕</button>
                <div class="coin-gallery">
                    ${(c.imgs||[]).map(url=>`<img src="${url}" loading="lazy" onclick="window.open('${url}')">`).join('')}
                </div>
                <div class="coin-info">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span class="coin-id"># ${c.num}</span>
                        <span class="coin-price">${c.price}</span>
                    </div>
                    <div class="status-label" style="color:${c.status==='Продано'?'var(--red)':'var(--green)'}; font-weight:bold; font-size:13px; margin-bottom:10px;">
                        ● ${c.status} ${c.saleTotal ? ` | Сумма: ${c.saleTotal}` : ''}
                    </div>
                    <div class="coin-desc" style="height:40px; overflow:hidden; font-size:13px; color:#aaa;">${c.desc || 'Нет описания'}</div>
                    <div class="card-btns">
                        <button class="btn-card" onclick="editCoin('${c.id}')">ИЗМЕНИТЬ</button>
                        <button class="btn-card" style="border:1px solid var(--gold); color:var(--gold);" onclick="handleStatusClick('${c.id}', '${c.status}', '${c.price}')">СТАТУС</button>
                    </div>
                </div>
            </div>
        `).join('');
        fastFilter(); // Сразу применяем текущие фильтры
    }

    // СВЕРХБЫСТРЫЙ ФИЛЬТР (без перерисовки HTML)
    function fastFilter() {
        clearTimeout(filterTimeout);
        filterTimeout = setTimeout(() => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            const sort = document.getElementById('sortSelect').value;
            
            document.getElementById('statsDisplay').style.display = statusFilter === "Продано" ? "grid" : "none";

            const cards = document.querySelectorAll('.coin-card');
            let visibleCount = 0;
            let rev = 0, qty = 0;

            cards.forEach(card => {
                const id = card.id.replace('card-', '');
                const coin = allCoins.find(x => x.id === id);
                if(!coin) return;

                const matchStatus = (statusFilter === "all" || coin.status === statusFilter);
                const matchSearch = (`${coin.num} ${coin.desc}`.toLowerCase().includes(search));

                if (matchStatus && matchSearch) {
                    card.classList.remove('hidden');
                    visibleCount++;
                    if(coin.status === "Продано") {
                        rev += (parseFloat(coin.saleTotal) || 0);
                        qty += (parseInt(coin.saleQty) || 0);
                    }
                } else {
                    card.classList.add('hidden');
                }
            });

            // Обновляем статистику
            if(statusFilter === "Продано") {
                document.getElementById('totalRevenue').innerText = rev.toFixed(2);
                document.getElementById('totalSoldQty').innerText = qty;
                document.getElementById('avgCheck').innerText = visibleCount > 0 ? (rev / visibleCount).toFixed(2) : 0;
            }
        }, 50); // Минимальная задержка для плавности ввода
    }

    // Сохранение / Редактирование
    async function saveData() {
        const numValue = document.getElementById('cNum').value;
        const priceValue = document.getElementById('cPrice').value;
        if(!numValue) return alert("Введите номер!");

        const data = {
            num: numValue,
            price: priceValue,
            status: document.getElementById('cStatus').value,
            imgs: document.getElementById('cUrls').value.split(',').map(s => s.trim()).filter(s => s),
            desc: document.getElementById('cDesc').value,
            lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(currentEditId) {
            await db.collection("my_coins").doc(currentEditId).update(data);
        } else {
            await db.collection("my_coins").add(data);
        }
        resetForm();
    }

    // Остальные функции (handleStatusClick, confirmSale, closeModal, editCoin, deleteCoin, resetForm) 
    // остаются ТАКИМИ ЖЕ, как в твоем исходном коде. Я их не менял, чтобы логика не сломалась.

    function handleStatusClick(id, status, price) {
        if(status === "Продано") {
            if(confirm("Вернуть в наличие?")) {
                db.collection("my_coins").doc(id).update({
                    status: "В наличии",
                    saleQty: firebase.firestore.FieldValue.delete(),
                    salePrice: firebase.firestore.FieldValue.delete(),
                    saleTotal: firebase.firestore.FieldValue.delete()
                });
            }
            return;
        }
        salePendingId = id;
        document.getElementById('modalPrice').value = price.toString().replace(/[^0-9.]/g, '');
        document.getElementById('modalQty').value = 1;
        document.getElementById('saleModal').style.display = "flex";
    }

    async function confirmSale() {
        const p = parseFloat(document.getElementById('modalPrice').value) || 0;
        const q = parseInt(document.getElementById('modalQty').value) || 0;
        await db.collection("my_coins").doc(salePendingId).update({
            status: "Продано", salePrice: p, saleQty: q, saleTotal: p*q,
            lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
        });
        closeModal();
    }

    function closeModal() { document.getElementById('saleModal').style.display = "none"; }

    function editCoin(id) {
        const c = allCoins.find(x => x.id === id);
        currentEditId = id;
        document.getElementById('cNum').value = c.num;
        document.getElementById('cPrice').value = c.price;
        document.getElementById('cStatus').value = c.status;
        document.getElementById('cUrls').value = (c.imgs || []).join(', ');
        document.getElementById('cDesc').value = c.desc;
        document.getElementById('mainBtn').innerText = "Сохранить изменения";
        document.getElementById('mainBtn').classList.add('edit-mode');
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetForm() {
        currentEditId = null;
        ['cNum','cPrice','cUrls','cDesc'].forEach(i => document.getElementById(i).value = "");
        document.getElementById('mainBtn').innerText = "Добавить в базу";
        document.getElementById('mainBtn').classList.remove('edit-mode');
        document.getElementById('cancelBtn').style.display = "none";
    }

    async function deleteCoin(id) { if(confirm("Удалить монету?")) await db.collection("my_coins").doc(id).delete(); }
</script>
</body>
</html>

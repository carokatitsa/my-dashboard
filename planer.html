<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Cloud Dashboard Final Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #a855f7;
            --gold: #fbbf24;
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f8fafc;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: #030712; color: var(--text);
            display: flex; flex-direction: column; align-items: center; padding: 20px;
            /* --- СТИЛИ НАВИГАЦИИ И BODY (ЗАМЕНА СТРОК 21-25) --- */
.top-nav {
    width: 100%; 
    background: #0f172a; 
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    display: flex; 
    justify-content: center; 
    padding: 12px 0;
    position: sticky; 
    top: 0; 
    z-index: 1000;
}

.nav-container {
    display: flex; 
    gap: 15px; 
    max-width: 1400px; 
    width: 95%;
    justify-content: center; 
    align-items: center;
    flex-wrap: wrap;
}

.nav-link {
    text-decoration: none; 
    color: #94a3b8; 
    font-size: 13px; 
    font-weight: 500;
    display: flex; 
    align-items: center; 
    gap: 6px; 
    transition: 0.3s;
    padding: 6px 12px;
}

.nav-link:hover { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

.nav-link.active {
    color: #ffffff; 
    background: rgba(168, 85, 247, 0.15); 
    border-radius: 8px;
    box-shadow: inset 0 0 10px rgba(168, 85, 247, 0.1);
}

body {
    margin: 0; 
    font-family: 'Inter', sans-serif;
    background: #030712; 
    color: var(--text);
    display: flex; 
    flex-direction: column; 
    align-items: center;
}

.container {
    display: grid; 
    grid-template-columns: 350px 1fr; 
    gap: 20px; 
    width: 100%; 
    max-width: 1400px; 
    padding: 25px; /* Отступ для контента под навигацией */
    box-sizing: border-box;
}
/* -------------------------------------------------- */
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px; width: 100%; max-width: 1400px;
        }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: flex; flex-direction: column;
        }

        /* Чтобы журнал растягивался вниз и не оставлял пустоты */
        .main-content { min-height: 500px; } 

        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 20px 0; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
        h2 span { color: var(--accent); }

        /* ИНПУТЫ И КНОПКИ С ПОДСВЕТКОЙ */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            padding: 12px; border-radius: 12px; color: white; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; background: rgba(168, 85, 247, 0.05); }

        .btn-add {
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer;
            transition: 0.3s; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(168, 85, 247, 0.7); }

        /* СПИСОК ШАБЛОНОВ */
        .preset-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
        .preset-item {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            padding: 12px 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .preset-item:hover { background: rgba(255,255,255,0.07); border-color: var(--accent); }
        .preset-item.important { border-color: var(--gold); background: rgba(251, 191, 36, 0.05); box-shadow: inset 0 0 15px rgba(251, 191, 36, 0.1); }
        
        .star { color: #334155; font-size: 20px; transition: 0.3s; }
        .star.active { color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        /* ТАБЛИЦА ЖУРНАЛА */
        .table-wrap { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #475569; font-size: 11px; text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--glass-border); }
        td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }
        .xp-val { font-weight: 800; color: var(--accent); }
        .xp-val.minus { color: var(--danger); }

        /* НИЖНЯЯ ПАНЕЛЬ (ПОД ЖУРНАЛОМ) */
        .bottom-area { 
            grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-top: 20px; width: 100%;
        }

        .progress-bar {
            grid-column: 1 / -1; background: rgba(168, 85, 247, 0.05); border-radius: 20px;
            padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--glass-border); margin-bottom: 20px;
        }
        .total-xp { font-size: 2.5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }

        .btn-finish {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 800;
            cursor: pointer; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .archive-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .archive-tag { background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 10px; border: 1px solid var(--glass-border); font-size: 12px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h2><span>✦</span> ШАБЛОНЫ</h2>
        <div class="input-group">
            <input type="text" id="baseTitle" placeholder="Что сделали?">
            <input type="number" id="baseXP" placeholder="Сколько XP?">
            <button class="btn-add" onclick="saveToBase()">СОХРАНИТЬ В БАЗУ</button>
        </div>
        <div class="preset-list" id="actionBase"></div>
    </div>

    <div class="glass-card main-content">
        <h2><span>⚡</span> ЖУРНАЛ ЗАДАЧ</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Дата</th><th>Действие</th><th>Результат</th><th></th></tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <div class="progress-bar">
        <div>
            <div style="font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 5px;">СЕГОДНЯ НАБРАНО</div>
            <div class="total-xp" id="todayTotal">0</div>
        </div>
        <button id="finishBtn" class="btn-finish" style="display:none" onclick="finishDay()">ЗАСЧИТАТЬ ЭФФЕКТИВНЫЙ ДЕНЬ</button>
    </div>

    <div class="bottom-area">
        <div class="glass-card" style="height: 250px;">
            <h2><span>📈</span> ДИНАМИКА</h2>
            <canvas id="mainChart"></canvas>
        </div>
        <div class="glass-card">
            <h2><span>📜</span> АРХИВ</h2>
            <div id="archiveDays" class="archive-grid"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZks9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        databaseURL: "https://my-dashboard-dc67a-default-rtdb.firebaseio.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.appspot.com",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d",
        measurementId: "G-74720EWKSB"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logRef = db.ref('daily_log');
    const baseRef = db.ref('action_presets');
    const archiveRef = db.ref('daily_archive');
    let chart;

    function getToday() { return new Date().toLocaleDateString('ru-RU').replace(/\//g, '.'); }

    function saveToBase() {
        const title = document.getElementById('baseTitle').value;
        const xp = parseInt(document.getElementById('baseXP').value);
        if(title && !isNaN(xp)) { 
            baseRef.push({ title, xp, important: false }); 
            document.getElementById('baseTitle').value = ''; 
            document.getElementById('baseXP').value = ''; 
        }
    }

    baseRef.on('value', snap => {
        const data = snap.val();
        const container = document.getElementById('actionBase');
        container.innerHTML = '';
        for(let id in data) {
            const item = data[id];
            container.innerHTML += `
                <div class="preset-item ${item.important ? 'important' : ''}" onclick="addToLog('${item.title}', ${item.xp})">
                    <span style="font-weight:600">${item.title} <small style="color:var(--accent); margin-left:5px;">+${item.xp}</small></span>
                    <span class="star ${item.important ? 'active' : ''}" onclick="event.stopPropagation(); baseRef.child('${id}').update({important:!${item.important}})">★</span>
                </div>`;
        }
    });

    function addToLog(title, xp, isFine = false) {
        logRef.push({ title, xp: isFine ? -xp : xp, date: getToday(), ts: Date.now() });
    }

    logRef.on('value', snap => {
        const data = snap.val();
        const today = getToday();
        let html = ''; let total = 0; let chartData = {};

        if(data) {
            Object.keys(data).sort((a,b) => data[b].ts - data[a].ts).forEach(id => {
                const item = data[id];
                if(item.date === today) total += Number(item.xp);
                chartData[item.date] = (chartData[item.date] || 0) + Number(item.xp);
                html += `<tr>
                    <td style="color:#64748b;">${item.date}</td>
                    <td style="font-weight:600">${item.title}</td>
                    <td class="xp-val ${item.xp < 0 ? 'minus' : ''}">${item.xp > 0 ? '+' : ''}${item.xp} XP</td>
                    <td style="text-align:right; color:#ef4444; cursor:pointer; font-weight:bold;" onclick="logRef.child('${id}').remove()">✕</td>
                </tr>`;
            });
        }
        document.getElementById('logBody').innerHTML = html;
        const display = document.getElementById('todayTotal');
        display.innerText = total;
        display.style.color = total >= 100 ? 'var(--gold)' : 'var(--accent)';
        document.getElementById('finishBtn').style.display = total >= 100 ? 'block' : 'none';
        updateChart(chartData);
    });

    async function finishDay() {
        const today = getToday();
        const base = (await baseRef.once('value')).val();
        const logs = (await logRef.once('value')).val();
        const doneTitles = Object.values(logs || {}).filter(l => l.date === today).map(l => l.title);
        
        for(let id in base) {
            if(base[id].important && !doneTitles.includes(base[id].title)) {
                addToLog(`ШТРАФ: ${base[id].title}`, base[id].xp, true);
            }
        }
        setTimeout(() => {
            const finalXP = document.getElementById('todayTotal').innerText;
            archiveRef.child(today.replace(/\./g, '_')).set({ total: finalXP, date: today });
            alert("Проверка завершена. День отправлен в архив!");
        }, 800);
    }

    archiveRef.on('value', snap => {
        const data = snap.val();
        const cont = document.getElementById('archiveDays'); cont.innerHTML = '';
        if(data) {
            for(let d in data) {
                cont.innerHTML += `<div class="archive-tag"><b>${data[d].date}</b>: ${data[d].total} XP</div>`;
            }
        }
    });

    function updateChart(chartData) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const labels = Object.keys(chartData).sort();
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: 'XP', data: labels.map(l => chartData[l]), borderColor: '#a855f7', tension: 0.4, fill: true, backgroundColor: 'rgba(168, 85, 247, 0.1)', borderWidth: 3, pointRadius: 4 }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
        });
    }
</script>
</body>
</html>

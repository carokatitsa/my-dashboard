<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Cloud Dashboard Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #a855f7;
            --gold: #fbbf24;
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f8fafc;
            --nav-bg: #0f172a;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: #030712; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
        }

        .top-nav {
            width: 100%; background: var(--nav-bg); 
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: center; padding: 12px 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-container {
            display: flex; gap: 15px; max-width: 1400px; width: 95%;
            justify-content: center; align-items: center; flex-wrap: wrap;
        }
        .nav-link {
            text-decoration: none; color: #94a3b8; font-size: 13px; font-weight: 500;
            display: flex; align-items: center; gap: 6px; transition: 0.3s;
            padding: 6px 12px; border-radius: 8px;
        }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-link.active { color: white; background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.3); }

        .container {
            display: grid; grid-template-columns: 350px 1fr;
            gap: 20px; width: 100%; max-width: 1400px; padding: 25px; box-sizing: border-box;
        }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: flex; flex-direction: column;
        }
        .main-content { min-height: 520px; } 
        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 20px 0; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
        h2 span { color: var(--accent); }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        .btn-add { background: linear-gradient(135deg, var(--accent), #6366f1); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        
        .preset-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
        .preset-item { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 12px 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .preset-item:hover { background: rgba(255,255,255,0.05); }
        
        .preset-item.penalty { border-color: rgba(239, 68, 68, 0.3); }
        .preset-item.penalty b { color: var(--danger); }
        .preset-item.important { border-color: var(--gold); background: rgba(251, 191, 36, 0.05); }

        .star { color: #334155; font-size: 18px; transition: 0.3s; }
        .star.active { color: var(--gold); }
        .edit-icon { color: #64748b; font-size: 14px; margin-left: 10px; transition: 0.3s; }
        .edit-icon:hover { color: white; }

        .table-wrap { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #475569; font-size: 11px; padding: 10px; border-bottom: 1px solid var(--glass-border); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }
        
        .progress-bar { grid-column: 1 / -1; background: rgba(168, 85, 247, 0.05); border-radius: 20px; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--glass-border); margin-bottom: 20px; }
        .total-xp { font-size: 2.5rem; font-weight: 900; color: var(--accent); }
        .btn-finish { background: linear-gradient(135deg, var(--success), #059669); color: white; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 800; cursor: pointer; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .bottom-area { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 400px; gap: 20px; margin-top: 20px; width: 100%; }
        
        /* Стили архива */
        .archive-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 400px; padding-right: 5px; }
        .archive-day { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .archive-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .archive-header:hover { background: rgba(255,255,255,0.05); }
        .archive-details { display: none; padding: 10px 15px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--glass-border); font-size: 12px; color: #94a3b8; }
        .archive-day.open .archive-details { display: block; }
        .archive-day.open .archive-header { border-bottom: 1px solid var(--glass-border); }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-container">
        <a href="index.html" class="nav-link">🏠 Главная</a>
        <a href="planer.html" class="nav-link active">🚀 Планер</a>
        <a href="monety.html" class="nav-link">🪙 Монеты</a>
        <a href="yazyki.html" class="nav-link">📚 Языки</a>
        <a href="trenirovki.html" class="nav-link">💪 Тренировки</a>
        <a href="shahmaty.html" class="nav-link">♟ Шахматы</a>
        <a href="kbzhu.html" class="nav-link">🍎 КБЖУ</a>
        <a href="istoriya.html" class="nav-link">🏛 История</a>
    </div>
</nav>

<div class="container">
    <div class="glass-card">
        <h2><span>✦</span> ШАБЛОНЫ</h2>
        <div class="input-group">
            <input type="text" id="baseTitle" placeholder="Действие...">
            <input type="number" id="baseXP" placeholder="XP (можно -50)">
            <input type="hidden" id="editKey">
            <button class="btn-add" id="saveBtn" onclick="saveToBase()">СОХРАНИТЬ</button>
        </div>
        <div class="preset-list" id="actionBase"></div>
    </div>

    <div class="glass-card main-content">
        <h2><span>⚡</span> ЖУРНАЛ (СЕГОДНЯ)</h2>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Время</th><th>Действие</th><th>Результат</th><th></th></tr></thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <div class="progress-bar">
        <div>
            <div style="font-size: 12px; font-weight: 700; color: #64748b;">СЕГОДНЯ НАБРАНО</div>
            <div class="total-xp" id="todayTotal">0</div>
        </div>
        <button id="finishBtn" class="btn-finish" style="display:none" onclick="finishDay()">ЗАСЧИТАТЬ ДЕНЬ</button>
    </div>

    <div class="bottom-area">
        <div class="glass-card" style="height: 350px;">
            <h2><span>📈</span> ДИНАМИКА</h2>
            <canvas id="mainChart"></canvas>
        </div>
        <div class="glass-card">
            <h2><span>📜</span> АРХИВ ДНЕЙ</h2>
            <div id="archiveDays" class="archive-list"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZks9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        databaseURL: "https://my-dashboard-dc67a-default-rtdb.firebaseio.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.appspot.com",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d",
        measurementId: "G-74720EWKSB"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logRef = db.ref('daily_log');
    const baseRef = db.ref('action_presets');
    const archiveRef = db.ref('daily_archive');
    let chart;

    function getToday() { return new Date().toLocaleDateString('ru-RU').replace(/\//g, '.'); }

    // Сохранение и РЕДАКТИРОВАНИЕ шаблонов
    function saveToBase() {
        const title = document.getElementById('baseTitle').value;
        const xp = parseInt(document.getElementById('baseXP').value);
        const key = document.getElementById('editKey').value;

        if(title && !isNaN(xp)) {
            const data = { title, xp, isPenalty: xp < 0 };
            if(key) {
                baseRef.child(key).update(data);
                document.getElementById('editKey').value = '';
                document.getElementById('saveBtn').innerText = 'СОХРАНИТЬ';
            } else {
                baseRef.push({ ...data, important: false });
            }
            document.getElementById('baseTitle').value = '';
            document.getElementById('baseXP').value = '';
        }
    }

    function editPreset(key, title, xp) {
        document.getElementById('baseTitle').value = title;
        document.getElementById('baseXP').value = xp;
        document.getElementById('editKey').value = key;
        document.getElementById('saveBtn').innerText = 'ОБНОВИТЬ';
        document.getElementById('baseTitle').focus();
    }

    baseRef.on('value', snap => {
        const data = snap.val();
        const container = document.getElementById('actionBase');
        container.innerHTML = '';
        for(let id in data) {
            const item = data[id];
            const isPenalty = item.xp < 0;
            container.innerHTML += `
                <div class="preset-item ${item.important ? 'important' : ''} ${isPenalty ? 'penalty' : ''}" onclick="addToLog('${item.title}', ${item.xp})">
                    <span>${isPenalty ? '💀 ' : ''}${item.title} <b>${item.xp > 0 ? '+' : ''}${item.xp}</b></span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="edit-icon" onclick="event.stopPropagation(); editPreset('${id}', '${item.title}', ${item.xp})">✏️</span>
                        <span class="star ${item.important ? 'active' : ''}" onclick="event.stopPropagation(); baseRef.child('${id}').update({important:!${item.important}})">★</span>
                        <span style="color:rgba(255,255,255,0.2); font-size:12px;" onclick="event.stopPropagation(); if(confirm('Удалить?')) baseRef.child('${id}').remove()">✕</span>
                    </div>
                </div>`;
        }
    });

    function addToLog(title, xp) {
        const now = new Date();
        const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        logRef.push({ title, xp, date: getToday(), time: time, ts: Date.now() });
    }

    // ЖУРНАЛ: Только за сегодня
    logRef.on('value', snap => {
        const data = snap.val();
        const today = getToday();
        let total = 0; let html = ''; let chartData = {};
        
        if(data) {
            const entries = Object.entries(data).sort((a,b) => b[1].ts - a[1].ts);
            
            entries.forEach(([id, item]) => {
                chartData[item.date] = (chartData[item.date] || 0) + Number(item.xp);
                
                if(item.date === today) {
                    total += Number(item.xp);
                    const valStyle = item.xp < 0 ? 'color:var(--danger)' : 'color:var(--accent)';
                    html += `<tr>
                        <td>${item.time || '--:--'}</td>
                        <td>${item.title}</td>
                        <td style="${valStyle}; font-weight:800">${item.xp > 0 ? '+' : ''}${item.xp} XP</td>
                        <td style="color:red; cursor:pointer;" onclick="logRef.child('${id}').remove()">✕</td>
                    </tr>`;
                }
            });
        }
        document.getElementById('logBody').innerHTML = html || '<tr><td colspan="4" style="text-align:center; opacity:0.5">На сегодня записей нет</td></tr>';
        document.getElementById('todayTotal').innerText = total;
        document.getElementById('finishBtn').style.display = total >= 100 ? 'block' : 'none';
        updateChart(chartData);
    });

    async function finishDay() {
        const today = getToday();
        const base = (await baseRef.once('value')).val();
        const logs = (await logRef.once('value')).val();
        const dayLogs = Object.values(logs || {}).filter(l => l.date === today);
        const doneTitles = dayLogs.map(l => l.title);
        
        // Авто-штрафы за важные дела
        for(let id in base) {
            if(base[id].important && !doneTitles.includes(base[id].title) && base[id].xp > 0) {
                addToLog(`ПРОПУСК: ${base[id].title}`, -base[id].xp);
            }
        }
        
        setTimeout(() => {
            const finalXP = document.getElementById('todayTotal').innerText;
            // Сохраняем в архив не только сумму, но и список дел
            archiveRef.child(today.replace(/\./g, '_')).set({ 
                total: finalXP, 
                date: today,
                details: dayLogs
            });
            alert("День завершен и сохранен в архив!");
        }, 800);
    }

    // АРХИВ: С разворачивающимся списком
    archiveRef.on('value', snap => {
        const data = snap.val();
        const cont = document.getElementById('archiveDays'); cont.innerHTML = '';
        if(data) {
            Object.values(data).reverse().forEach(day => {
                let detailsHtml = day.details ? day.details.map(i => `<div>• ${i.title} (${i.xp > 0 ? '+' : ''}${i.xp} XP)</div>`).join('') : 'Нет данных';
                
                cont.innerHTML += `
                    <div class="archive-day" onclick="this.classList.toggle('open')">
                        <div class="archive-header">
                            <span>📅 ${day.date}</span>
                            <b style="color:var(--accent)">${day.total} XP</b>
                        </div>
                        <div class="archive-details">
                            ${detailsHtml}
                        </div>
                    </div>`;
            });
        }
    });

    function updateChart(chartData) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const labels = Object.keys(chartData).sort();
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label: 'XP', data: labels.map(l => chartData[l]), borderColor: '#a855f7', tension: 0.4, fill: true, backgroundColor: 'rgba(168, 85, 247, 0.1)' }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } } }
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Planner Excel-Style</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b141d; --panel: #16222e; --border: #2d3d4d; --text: #e1e8ef; --accent: #4ade80; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Левая часть - Главная таблица */
        .main-content { flex: 3; padding: 20px; overflow-y: auto; border-right: 2px solid var(--border); }
        /* Правая часть - База действий */
        .sidebar { flex: 1; background: var(--panel); padding: 20px; overflow-y: auto; }

        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; font-size: 1.2em; }
        
        /* Стиль Excel таблицы */
        table { width: 100%; border-collapse: collapse; background: #1a2a3a; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background: #243b53; color: var(--accent); text-transform: uppercase; font-size: 0.8em; }
        tr:hover { background: #243b53; }

        /* Формы и кнопки */
        .input-group { display: flex; gap: 5px; margin-bottom: 20px; }
        input { background: #0b141d; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; }
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .add-btn { background: var(--accent); color: #000; padding: 8px 15px; }
        
        /* Кнопки в базе справа */
        .base-item { background: #243b53; padding: 10px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .base-item:hover { background: var(--accent); color: #000; }
        
        .total-row { font-weight: bold; background: #243b53 !important; }
        .chart-box { margin-top: 30px; height: 200px; }
    </style>
</head>
<body>

<div class="main-content">
    <h2>📊 ЛОГ АКТИВНОСТИ (EXCEL STYLE)</h2>
    <table id="logTable">
        <thead>
            <tr>
                <th style="width: 150px;">Дата</th>
                <th>Действие</th>
                <th style="width: 80px;">XP</th>
                <th style="width: 50px;"></th>
            </tr>
        </thead>
        <tbody id="logBody">
            </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="2">ИТОГО ЗА СЕГОДНЯ:</td>
                <td id="todayTotal">0</td>
                <td></td>
            </tr>
        </tfoot>
    </table>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<div class="sidebar">
    <h2>🏗️ БАЗА ДЕЙСТВИЙ</h2>
    <div class="input-group">
        <input type="text" id="baseTitle" placeholder="Название" style="flex:2">
        <input type="number" id="baseXP" placeholder="XP" style="flex:1">
        <button class="add-btn" onclick="saveToBase()">+</button>
    </div>
    <div id="actionBase">
        </div>
</div>

<script>
    // КОНФИГ FIREBASE (Вставь свои данные ниже)
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZks9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        databaseURL: "https://my-dashboard-dc67a-default-rtdb.firebaseio.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.appspot.com",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d",
        measurementId: "G-74720EWKSB"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logRef = db.ref('daily_log');
    const baseRef = db.ref('action_presets');

    let chart;

    // 1. Работа с базой заготовок (Справа)
    function saveToBase() {
        const title = document.getElementById('baseTitle').value;
        const xp = parseInt(document.getElementById('baseXP').value);
        if(title && xp) {
            baseRef.push({ title, xp });
            document.getElementById('baseTitle').value = '';
            document.getElementById('baseXP').value = '';
        }
    }

    baseRef.on('value', snap => {
        const data = snap.val();
        const container = document.getElementById('actionBase');
        container.innerHTML = '';
        for(let id in data) {
            container.innerHTML += `
                <div class="base-item" onclick="addToLog('${data[id].title}', ${data[id].xp})">
                    <span>${data[id].title}</span>
                    <b>+${data[id].xp}</b>
                </div>`;
        }
    });

    // 2. Работа с логом (Слева)
    function addToLog(title, xp) {
        logRef.push({
            title,
            xp,
            date: new Date().toLocaleDateString(),
            ts: Date.now()
        });
    }

    function deleteLogItem(id) {
        if(confirm('Удалить запись?')) logRef.child(id).remove();
    }

    logRef.on('value', snap => {
        const data = snap.val();
        const body = document.getElementById('logBody');
        const today = new Date().toLocaleDateString();
        let html = '';
        let total = 0;
        let chartData = {};

        for(let id in data) {
            const item = data[id];
            if(item.date === today) total += item.xp;
            
            // Данные для графика
            chartData[item.date] = (chartData[item.date] || 0) + item.xp;

            html = `<tr>
                <td>${item.date}</td>
                <td>${item.title}</td>
                <td>${item.xp}</td>
                <td><button onclick="deleteLogItem('${id}')" style="background:none; color:red;">✕</button></td>
            </tr>` + html;
        }
        body.innerHTML = html;
        document.getElementById('todayTotal').innerText = total;
        updateChart(chartData);
    });

    function updateChart(chartData) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Object.keys(chartData),
                datasets: [{
                    label: 'XP Progress',
                    data: Object.values(chartData),
                    borderColor: '#4ade80',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(74, 222, 128, 0.1)'
                }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
        });
    }
</script>
</body>
</html>

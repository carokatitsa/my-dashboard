<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Cloud Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #a855f7; /* Магический фиолетовый */
            --accent-2: #3b82f6; /* Неоновый синий */
            --bg: #030712;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #030712);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ОСНОВНАЯ СЕТКА */
        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: auto auto;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { order: 2; }
            .main-content { order: 1; }
            .bottom-row { order: 3; }
        }

        /* СТЕКЛЯННЫЕ КАРТОЧКИ */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 { margin-top: 0; font-weight: 700; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        h2 span { color: var(--accent); }

        /* БАЗА ДЕЙСТВИЙ (СЛЕВА) */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(168, 85, 247, 0.3); }

        .btn-add {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-add:active { transform: scale(0.95); }

        .preset-list { display: flex; flex-direction: column; gap: 10px; }
        .preset-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .preset-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .preset-item .xp-tag { background: rgba(168, 85, 247, 0.2); color: #d8b4fe; padding: 4px 10px; border-radius: 8px; font-weight: 600; font-size: 13px; }

        /* ЛОГ АКТИВНОСТИ (ЦЕНТР) */
        .main-content { min-height: 400px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 16px 12px; border-bottom: 1px solid var(--glass-border); font-size: 14px; }
        .row-date { color: #64748b; font-size: 12px; }
        .del-icon { color: #ef4444; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .del-icon:hover { opacity: 1; }

        .total-banner {
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.1), transparent);
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-value { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

        /* ГРАФИК (ВНИЗУ) */
        .bottom-row { grid-column: 1 / -1; min-height: 350px; }
        .chart-viewport { height: 280px; width: 100%; overflow-x: auto; }
        .chart-container { height: 100%; min-width: 600px; }

        /* СКРОЛЛБАР */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="glass-card">
            <h2><span>✦</span> БАЗА</h2>
            <div class="input-group">
                <input type="text" id="baseTitle" placeholder="Название действия...">
                <input type="number" id="baseXP" placeholder="Очки XP">
                <button class="btn-add" onclick="saveToBase()">СОЗДАТЬ ШАБЛОН</button>
            </div>
            <div class="preset-list" id="actionBase" style="margin-top: 20px;"></div>
        </div>
    </div>

    <div class="main-content glass-card">
        <h2><span>⚡</span> АКТИВНОСТЬ</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Действие</th>
                        <th>XP</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
        <div class="total-banner">
            <span>СЕГОДНЯШНИЙ ПРОГРЕСС</span>
            <span class="total-value" id="todayTotal">0</span>
        </div>
    </div>

    <div class="bottom-row glass-card">
        <h2><span>📈</span> ДИНАМИКА РАЗВИТИЯ</h2>
        <div class="chart-viewport" id="chartViewport">
            <div class="chart-container" id="chartContainer">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZks9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        databaseURL: "https://my-dashboard-dc67a-default-rtdb.firebaseio.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.appspot.com",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d",
        measurementId: "G-74720EWKSB"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logRef = db.ref('daily_log');
    const baseRef = db.ref('action_presets');
    let chart;

    function saveToBase() {
        const title = document.getElementById('baseTitle').value;
        const xp = parseInt(document.getElementById('baseXP').value);
        if(title && xp) { baseRef.push({ title, xp }); document.getElementById('baseTitle').value = ''; document.getElementById('baseXP').value = ''; }
    }

    function deleteFromBase(e, id) {
        e.stopPropagation();
        if(confirm('Удалить шаблон?')) baseRef.child(id).remove();
    }

    baseRef.on('value', snap => {
        const data = snap.val();
        const container = document.getElementById('actionBase');
        container.innerHTML = '';
        for(let id in data) {
            container.innerHTML += `
                <div class="preset-item" onclick="addToLog('${data[id].title}', ${data[id].xp})">
                    <span>${data[id].title}</span>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="xp-tag">+${data[id].xp}</span>
                        <span class="del-icon" onclick="deleteFromBase(event, '${id}')">✕</span>
                    </div>
                </div>`;
        }
    });

    function addToLog(title, xp) {
        logRef.push({ title, xp, date: new Date().toLocaleDateString(), ts: Date.now() });
    }

    function deleteLogItem(id) {
        if(confirm('Стереть запись?')) logRef.child(id).remove();
    }

    logRef.on('value', snap => {
        const data = snap.val();
        const body = document.getElementById('logBody');
        const today = new Date().toLocaleDateString();
        let html = ''; let totalToday = 0; let chartData = {};
        const sortedIds = Object.keys(data || {}).sort((a,b) => data[b].ts - data[a].ts);

        sortedIds.forEach(id => {
            const item = data[id];
            if(item.date === today) totalToday += item.xp;
            chartData[item.date] = (chartData[item.date] || 0) + item.xp;
            html += `<tr>
                <td class="row-date">${item.date}</td>
                <td style="font-weight:600">${item.title}</td>
                <td style="color:var(--accent); font-weight:bold">+${item.xp}</td>
                <td style="text-align:right"><span class="del-icon" onclick="deleteLogItem('${id}')">✕</span></td>
            </tr>`;
        });
        body.innerHTML = html;
        document.getElementById('todayTotal').innerText = totalToday;
        updateChart(chartData);
    });

    function updateChart(chartData) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const container = document.getElementById('chartContainer');
        const viewport = document.getElementById('chartViewport');
        const labels = Object.keys(chartData).sort((a, b) => new Date(a.split('.').reverse().join('-')) - new Date(b.split('.').reverse().join('-')));
        const dataPoints = labels.map(l => chartData[l]);
        
        container.style.width = Math.max(viewport.offsetWidth, labels.length * 80) + 'px';

        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ 
                    label: 'Опыт (XP)', data: dataPoints, 
                    borderColor: '#a855f7', backgroundColor: 'rgba(168, 85, 247, 0.1)', 
                    borderWidth: 4, fill: true, tension: 0.4, pointRadius: 6, pointBackgroundColor: '#fff'
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                    x: { grid: { display: false }, ticks: { color: '#64748b' } }
                }
            }
        });
        setTimeout(() => { viewport.scrollLeft = viewport.scrollWidth; }, 300);
    }
</script>

</body>
</html>

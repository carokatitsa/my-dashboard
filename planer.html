<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Cloud Dashboard Hardcore</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #a855f7; --accent-2: #3b82f6; 
            --bg: #030712; --text: #f8fafc; --gold: #fbbf24;
            --success: #22c55e; --danger: #ef4444;
        }

        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #030712);
            background-attachment: fixed; color: var(--text);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        .container {
            display: grid; grid-template-columns: 320px 1fr; gap: 20px;
            padding: 20px; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box;
        }

        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 { margin-top: 0; font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
        h2 span { color: var(--accent); }

        /* БАЗА */
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        input { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; color: white; font-size: 16px; }
        .btn-add { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .preset-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .preset-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 12px 16px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .preset-item.important { border-color: var(--gold); background: rgba(251, 191, 36, 0.05); }
        .star-icon { color: #4b5563; transition: 0.3s; font-size: 18px; }
        .star-icon.active { color: var(--gold); }

        /* ТАБЛИЦЫ */
        .table-wrap { overflow-x: auto; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
        td { padding: 14px 10px; border-bottom: 1px solid var(--glass-border); font-size: 14px; }
        .minus-xp { color: var(--danger) !important; font-weight: bold; }

        /* НИЖНЯЯ СЕКЦИЯ */
        .bottom-section { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 20px; }
        .progress-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 24px; background: rgba(168, 85, 247, 0.05); border-radius: 20px; border: 1px dashed var(--glass-border);
        }
        .total-value { font-size: 1.8rem; font-weight: 900; color: var(--accent); }
        
        .btn-finish {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white; border: none; padding: 10px 20px; border-radius: 12px;
            font-weight: 700; cursor: pointer; display: none; animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); }
        }

        .chart-viewport { height: 250px; width: 100%; overflow-x: auto; }
        .chart-container { height: 100%; min-width: 600px; }

        .archive-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .archive-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="glass-card">
            <h2><span>✦</span> ШАБЛОНЫ</h2>
            <div class="input-group">
                <input type="text" id="baseTitle" placeholder="Действие...">
                <input type="number" id="baseXP" placeholder="XP">
                <button class="btn-add" onclick="saveToBase()">СОХРАНИТЬ</button>
            </div>
            <div class="preset-list" id="actionBase"></div>
        </div>

        <div class="glass-card" style="margin-top:20px;">
            <h2><span>📜</span> АРХИВ ДНЕЙ</h2>
            <div id="archiveDays" class="archive-list"></div>
        </div>
    </div>

    <div class="main-content glass-card">
        <h2><span>⚡</span> ЖУРНАЛ ЗАДАЧ</h2>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Дата</th><th>Действие</th><th>XP</th><th></th></tr></thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <div class="bottom-section glass-card">
        <div class="progress-footer">
            <div>
                <span style="color: #64748b; font-size: 12px; font-weight: 700;">ПРОГРЕСС СЕГОДНЯ</span>
                <div class="total-value" id="todayTotal">0</div>
            </div>
            <button id="finishBtn" class="btn-finish" onclick="finishDay()">ЗАСЧИТАТЬ ДЕНЬ</button>
        </div>
        
        <h2><span>📈</span> ГРАФИК</h2>
        <div class="chart-viewport"><div class="chart-container"><canvas id="mainChart"></canvas></div></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZks9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        databaseURL: "https://my-dashboard-dc67a-default-rtdb.firebaseio.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.appspot.com",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d",
        measurementId: "G-74720EWKSB"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logRef = db.ref('daily_log');
    const baseRef = db.ref('action_presets');
    const archiveRef = db.ref('daily_archive');
    let chart;

    function getToday() { return new Date().toLocaleDateString('ru-RU').split(/[\.\/]/).join('-'); }

    // БАЗА
    function saveToBase() {
        const title = document.getElementById('baseTitle').value;
        const xp = parseInt(document.getElementById('baseXP').value);
        if(title && !isNaN(xp)) baseRef.push({ title, xp, important: false });
    }

    function toggleStar(e, id, current) {
        e.stopPropagation();
        baseRef.child(id).update({ important: !current });
    }

    baseRef.on('value', snap => {
        const data = snap.val();
        const container = document.getElementById('actionBase');
        container.innerHTML = '';
        for(let id in data) {
            const item = data[id];
            container.innerHTML += `
                <div class="preset-item ${item.important ? 'important' : ''}" onclick="addToLog('${item.title}', ${item.xp})">
                    <span>${item.title}</span>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="xp-tag">+${item.xp}</span>
                        <span class="star-icon ${item.important ? 'active' : ''}" onclick="toggleStar(event, '${id}', ${item.important})">★</span>
                    </div>
                </div>`;
        }
    });

    // ЛОГ
    function addToLog(title, xp, isFine = false) {
        const dateStr = new Date().toLocaleDateString('ru-RU');
        logRef.push({ title, xp: isFine ? -xp : xp, date: dateStr, ts: Date.now(), isFine });
    }

    // ЗАВЕРШЕНИЕ ДНЯ
    async function finishDay() {
        const today = getToday();
        const snapLog = await logRef.once('value');
        const snapBase = await baseRef.once('value');
        const logData = snapLog.val() || {};
        const baseData = snapBase.val() || {};
        
        const todayLogs = Object.values(logData).filter(l => l.date.split(/[\.\/]/).join('-') === today);
        const performedTitles = todayLogs.map(l => l.title);
        
        // Проверка штрафов
        for(let id in baseData) {
            const item = baseData[id];
            if(item.important && !performedTitles.includes(item.title)) {
                addToLog(`ШТРАФ: ${item.title}`, item.xp, true);
            }
        }

        // Сохранение в архив
        setTimeout(async () => {
            const updatedLog = await logRef.once('value');
            const data = updatedLog.val();
            let total = 0;
            Object.values(data).forEach(item => {
                if(item.date.split(/[\.\/]/).join('-') === today) total += Number(item.xp);
            });
            archiveRef.child(today).set({ total, date: today });
            alert(`День завершен! Итоговый опыт: ${total}`);
        }, 1000);
    }

    // ОТОБРАЖЕНИЕ
    logRef.on('value', snap => {
        const data = snap.val();
        const today = getToday();
        let html = ''; let totalToday = 0; let chartData = {};

        if (data) {
            Object.keys(data).sort((a,b) => data[b].ts - data[a].ts).forEach(id => {
                const item = data[id];
                const cleanD = item.date.split(/[\.\/]/).join('-');
                if(cleanD === today) totalToday += Number(item.xp);
                chartData[item.date] = (chartData[item.date] || 0) + Number(item.xp);
                html += `<tr>
                    <td style="color:#64748b; font-size:11px;">${item.date}</td>
                    <td>${item.title}</td>
                    <td class="${item.xp < 0 ? 'minus-xp' : ''}" style="color:var(--accent)">${item.xp > 0 ? '+' : ''}${item.xp}</td>
                    <td style="text-align:right"><span style="cursor:pointer" onclick="logRef.child('${id}').remove()">✕</span></td>
                </tr>`;
            });
        }
        document.getElementById('logBody').innerHTML = html;
        document.getElementById('todayTotal').innerText = totalToday;
        document.getElementById('finishBtn').style.display = totalToday >= 100 ? 'block' : 'none';
        updateChart(chartData);
    });

    archiveRef.on('value', snap => {
        const data = snap.val();
        const cont = document.getElementById('archiveDays');
        cont.innerHTML = '';
        for(let d in data) {
            cont.innerHTML += `<div class="archive-item"><div style="font-size:10px; color:#64748b">${data[d].date}</div><div style="font-weight:bold; color:var(--gold)">${data[d].total} XP</div></div>`;
        }
    });

    function updateChart(chartData) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const labels = Object.keys(chartData).sort((a, b) => new Date(a.split('.').reverse().join('-')) - new Date(b.split('.').reverse().join('-')));
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ 
                    label: 'XP', data: labels.map(l => chartData[l]), borderColor: '#a855f7', 
                    backgroundColor: 'rgba(168, 85, 247, 0.1)', borderWidth: 3, fill: true, tension: 0.4 
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }
</script>
</body>
</html>

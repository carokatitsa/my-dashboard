<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Life Planer v4.5 - Hardcore Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #a855f7;
            --gold: #fbbf24;
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f8fafc;
            --nav-bg: #0f172a;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: #030712; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- RPG UI --- */
        .level-card {
            grid-column: 1 / -1;
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.1), rgba(239, 68, 68, 0.1));
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 25px;
        }

        .level-circle {
            width: 70px; height: 70px; border: 4px solid var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900; color: var(--accent);
            background: rgba(0,0,0,0.4); box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .exp-container { flex-grow: 1; }
        .exp-bar-bg { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; margin-top: 8px; }
        .exp-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: 1s; }

        .container { display: grid; grid-template-columns: 350px 1fr; gap: 20px; width: 100%; max-width: 1400px; padding: 20px; box-sizing: border-box; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; }

        /* --- ITEMS --- */
        .preset-item { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); 
            padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .preset-item.important { border-color: var(--gold); background: rgba(251, 191, 36, 0.05); }
        .preset-item.penalty { border-color: var(--danger); }
        
        .star { color: #334155; font-size: 18px; }
        .star.active { color: var(--gold); }

        .btn-add { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .archive-day { background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 5px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="level-card">
        <div class="level-circle" id="userLvl">1</div>
        <div class="exp-container">
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:12px;">
                <span id="rankName">НОВИЧОК</span>
                <span><span id="currentExp">0</span> / <span id="targetExp">100</span> XP</span>
            </div>
            <div class="exp-bar-bg"><div class="exp-bar-fill" id="expFill"></div></div>
        </div>
    </div>

    <div class="glass-card">
        <h2><span>★</span> БАЗА ДЕЙСТВИЙ</h2>
        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:15px;">
            <input type="text" id="baseTitle" placeholder="Действие..." style="background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); padding:10px; color:white; border-radius:8px;">
            <input type="number" id="baseXP" placeholder="XP (напр. -50 или 100)" style="background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); padding:10px; color:white; border-radius:8px;">
            <button class="btn-add" onclick="saveToBase()">ДОБАВИТЬ ШАБЛОН</button>
        </div>
        <div id="actionBase"></div>
    </div>

    <div class="glass-card">
        <h2 style="display:flex; justify-content:space-between;">
            <span>⚡ ЖУРНАЛ СЕГОДНЯ</span>
            <span id="todayTotal" style="color:var(--gold)">0 XP</span>
        </h2>
        <table id="logTable">
            <tbody id="logBody"></tbody>
        </table>
    </div>

    <div class="glass-card" style="grid-column: 1/-1;">
        <h2><span>📜</span> АРХИВ ДНЕЙ</h2>
        <div id="archiveDays" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZks9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        databaseURL: "https://my-dashboard-dc67a-default-rtdb.firebaseio.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.appspot.com",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logRef = db.ref('daily_log');
    const baseRef = db.ref('action_presets');
    const statsRef = db.ref('user_stats');
    const archiveRef = db.ref('daily_archive');

    function getToday() { return new Date().toLocaleDateString('ru-RU').replace(/\//g, '.'); }

    // --- RPG ЛОГИКА ---
    function updateRPG(totalXP) {
        const level = Math.floor(Math.sqrt(totalXP / 100)) + 1;
        const currentLevelStartXP = Math.pow(level - 1, 2) * 100;
        const nextLevelStartXP = Math.pow(level, 2) * 100;
        const progress = ((totalXP - currentLevelStartXP) / (nextLevelStartXP - currentLevelStartXP)) * 100;

        document.getElementById('userLvl').innerText = level;
        document.getElementById('currentExp').innerText = Math.floor(totalXP - currentLevelStartXP);
        document.getElementById('targetExp').innerText = nextLevelStartXP - currentLevelStartXP;
        document.getElementById('expFill').style.width = progress + '%';
    }

    statsRef.on('value', snap => { if(snap.val()) updateRPG(snap.val().totalXP || 0); });

    async function changeXP(amount) {
        const snap = await statsRef.once('value');
        const current = snap.val() ? snap.val().totalXP : 0;
        statsRef.update({ totalXP: Math.max(0, current + amount) });
    }

    // --- БАЗА ШАБЛОНОВ ---
    function saveToBase() {
        const title = document.getElementById('baseTitle').value;
        const xp = parseInt(document.getElementById('baseXP').value);
        if(title && !isNaN(xp)) {
            baseRef.push({ title, xp, important: false });
            document.getElementById('baseTitle').value = '';
            document.getElementById('baseXP').value = '';
        }
    }

    baseRef.on('value', snap => {
        const container = document.getElementById('actionBase');
        container.innerHTML = '';
        const data = snap.val();
        for(let id in data) {
            const item = data[id];
            const isPenalty = item.xp < 0;
            container.innerHTML += `
                <div class="preset-item ${item.important?'important':''} ${isPenalty?'penalty':''}" onclick="addToLog('${item.title}', ${item.xp})">
                    <span>${isPenalty?'💀':'🔹'} ${item.title} <b>${item.xp>0?'+':''}${item.xp}</b></span>
                    <span class="star ${item.important?'active':''}" onclick="event.stopPropagation(); toggleStar('${id}', ${item.important})">★</span>
                </div>`;
        }
    });

    function toggleStar(id, current) { baseRef.child(id).update({ important: !current }); }

    // --- ЖУРНАЛ ---
    function addToLog(title, xp) {
        const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        logRef.push({ title, xp, date: getToday(), time, ts: Date.now() });
        changeXP(xp);
    }

    logRef.on('value', snap => {
        const today = getToday();
        const body = document.getElementById('logBody');
        let total = 0; body.innerHTML = '';
        const data = snap.val();
        
        // ПРОВЕРКА АВТО-ЗАКРЫТИЯ (Если дата сменилась)
        if(data) {
            const entries = Object.entries(data);
            const lastDate = entries[entries.length-1][1].date;
            if(lastDate !== today) { 
                autoArchiveYesterday(data); 
                return;
            }

            entries.reverse().forEach(([id, item]) => {
                if(item.date === today) {
                    total += item.xp;
                    body.innerHTML += `<tr>
                        <td style="opacity:0.5; width:50px">${item.time}</td>
                        <td>${item.title}</td>
                        <td style="color:${item.xp>0?'var(--accent)':'var(--danger)'}; text-align:right"><b>${item.xp>0?'+':''}${item.xp} XP</b></td>
                    </tr>`;
                }
            });
        }
        document.getElementById('todayTotal').innerText = total + ' XP';
    });

    // --- АВТОМАТИЧЕСКОЕ ЗАКРЫТИЕ ДНЯ ---
    async function autoArchiveYesterday(allLogs) {
        const datesInLog = [...new Set(Object.values(allLogs).map(l => l.date))];
        const yesterday = datesInLog.find(d => d !== getToday());
        
        if(!yesterday) return;

        const dayLogs = Object.values(allLogs).filter(l => l.date === yesterday);
        const presets = (await baseRef.once('value')).val();
        let dayTotal = dayLogs.reduce((sum, item) => sum + item.xp, 0);

        // Проверка пропущенных звезд
        const doneTitles = dayLogs.map(l => l.title);
        for(let id in presets) {
            if(presets[id].important && !doneTitles.includes(presets[id].title)) {
                const penalty = -presets[id].xp;
                dayTotal += penalty;
                changeXP(penalty); // Вычитаем из общего уровня за пропуск
            }
        }

        // Сохраняем в архив
        await archiveRef.child(yesterday.replace(/\./g, '_')).set({
            date: yesterday,
            total: dayTotal,
            logs: dayLogs
        });

        // Чистим старые логи из оперативной ветки
        const updates = {};
        Object.keys(allLogs).forEach(key => {
            if(allLogs[key].date === yesterday) updates[key] = null;
        });
        logRef.update(updates);
    }

    archiveRef.on('value', snap => {
        const cont = document.getElementById('archiveDays');
        cont.innerHTML = '';
        const data = snap.val();
        if(data) {
            Object.values(data).reverse().forEach(day => {
                cont.innerHTML += `<div class="archive-day">
                    <div style="display:flex; justify-content:space-between">
                        <b>${day.date}</b>
                        <span style="color:var(--accent)">${day.total} XP</span>
                    </div>
                </div>`;
            });
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Cloud Dashboard Hardcore</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --glass: rgba(30, 30, 50, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #a855f7;
            --gold: #fbbf24;
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f8fafc;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: #030712; color: var(--text);
            display: flex; justify-content: center; padding: 20px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: auto auto;
            gap: 15px; width: 100%; max-width: 1300px;
        }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; color: #94a3b8; display: flex; align-items: center; gap: 8px; }
        h2 span { color: var(--accent); }

        /* КНОПКИ И ВВОД */
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 10px; border-radius: 10px; color: white; }
        
        .btn-main {
            background: linear-gradient(135deg, var(--accent), #6366f1);
            border: none; color: white; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); }

        /* СПИСОК ШАБЛОНОВ */
        .preset-list { display: flex; flex-direction: column; gap: 6px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .preset-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 10px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .preset-item:hover { background: rgba(168, 85, 247, 0.1); border-color: var(--accent); }
        .preset-item.important { border-color: var(--gold); background: rgba(251, 191, 36, 0.05); box-shadow: inset 0 0 10px rgba(251, 191, 36, 0.1); }
        
        .star { color: #334155; font-size: 18px; transition: 0.3s; }
        .star.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* ТАБЛИЦА */
        .log-container { max-height: 480px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        td, th { padding: 12px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .xp-plus { color: var(--accent); font-weight: bold; }
        .xp-minus { color: var(--danger); font-weight: bold; }

        /* ПРОГРЕСС БАР */
        .progress-section { 
            grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.1), transparent);
            padding: 15px 25px; border-radius: 15px; border-left: 4px solid var(--accent);
        }
        .xp-counter { font-size: 2rem; font-weight: 900; color: var(--accent); }

        .btn-finish {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); animation: glow 2s infinite;
        }

        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; box-shadow: 0 0 25px rgba(34, 197, 94, 0.6); } }

        /* ГРАФИК И АРХИВ */
        .footer-grid { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 350px; gap: 15px; }
        .chart-box { height: 200px; }
        .archive-box { display: flex; flex-wrap: wrap; gap: 8px; }
        .archive-tag { background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 8px; font-size: 11px; border: 1px solid var(--glass-border); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="main-grid">
    <div class="glass-card">
        <h2><span>✦</span> Шаблоны</h2>
        <div class="input-group">
            <input type="text" id="baseTitle" placeholder="Действие...">
            <input type="number" id="baseXP" placeholder="XP">
            <button class="btn-main" onclick="saveToBase()">ДОБАВИТЬ</button>
        </div>
        <div class="preset-list" id="actionBase"></div>
    </div>

    <div class="glass-card">
        <h2><span>⚡</span> Активность</h2>
        <div class="log-container">
            <table>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <div class="progress-section glass-card">
        <div>
            <div style="font-size: 11px; font-weight: bold; color: #64748b;">ПРОГРЕСС ЗА СЕГОДНЯ</div>
            <div class="xp-counter" id="todayTotal">0</div>
        </div>
        <button id="finishBtn" class="btn-finish" style="display:none" onclick="finishDay()">ЗАСЧИТАТЬ ДЕНЬ</button>
    </div>

    <div class="footer-grid">
        <div class="glass-card chart-box">
            <canvas id="mainChart"></canvas>
        </div>
        <div class="glass-card">
            <h2><span>📜</span> Архив</h2>
            <div id="archiveDays" class="archive-box"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZks9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        databaseURL: "https://my-dashboard-dc67a-default-rtdb.firebaseio.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.appspot.com",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d",
        measurementId: "G-74720EWKSB"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logRef = db.ref('daily_log');
    const baseRef = db.ref('action_presets');
    const archiveRef = db.ref('daily_archive');
    let chart;

    function getToday() { return new Date().toLocaleDateString('ru-RU').replace(/\//g, '.'); }

    // --- БАЗА ---
    function saveToBase() {
        const title = document.getElementById('baseTitle').value;
        const xp = parseInt(document.getElementById('baseXP').value);
        if(title && !isNaN(xp)) { baseRef.push({ title, xp, important: false }); document.getElementById('baseTitle').value = ''; document.getElementById('baseXP').value = ''; }
    }

    baseRef.on('value', snap => {
        const data = snap.val();
        const container = document.getElementById('actionBase');
        container.innerHTML = '';
        for(let id in data) {
            const item = data[id];
            container.innerHTML += `
                <div class="preset-item ${item.important ? 'important' : ''}" onclick="addToLog('${item.title}', ${item.xp})">
                    <span style="font-weight:600">${item.title} <small style="color:var(--accent)">+${item.xp}</small></span>
                    <span class="star ${item.important ? 'active' : ''}" onclick="event.stopPropagation(); baseRef.child('${id}').update({important:!${item.important}})">★</span>
                </div>`;
        }
    });

    // --- ЖУРНАЛ ---
    function addToLog(title, xp, isFine = false) {
        logRef.push({ title, xp: isFine ? -xp : xp, date: getToday(), ts: Date.now() });
    }

    logRef.on('value', snap => {
        const data = snap.val();
        const today = getToday();
        let html = ''; let total = 0; let chartData = {};

        if(data) {
            Object.keys(data).sort((a,b) => data[b].ts - data[a].ts).forEach(id => {
                const item = data[id];
                if(item.date === today) total += Number(item.xp);
                chartData[item.date] = (chartData[item.date] || 0) + Number(item.xp);
                html += `<tr>
                    <td style="color:#64748b; width:70px">${item.date}</td>
                    <td style="font-weight:500">${item.title}</td>
                    <td class="${item.xp < 0 ? 'xp-minus' : 'xp-plus'}">${item.xp > 0 ? '+' : ''}${item.xp} XP</td>
                    <td style="text-align:right; color:#ef4444; cursor:pointer" onclick="logRef.child('${id}').remove()">✕</td>
                </tr>`;
            });
        }
        document.getElementById('logBody').innerHTML = html;
        const display = document.getElementById('todayTotal');
        display.innerText = total;
        display.style.color = total >= 100 ? 'var(--gold)' : 'var(--accent)';
        document.getElementById('finishBtn').style.display = total >= 100 ? 'block' : 'none';
        updateChart(chartData);
    });

    // --- ФИНАЛ ДНЯ ---
    async function finishDay() {
        const today = getToday();
        const base = (await baseRef.once('value')).val();
        const logs = (await logRef.once('value')).val();
        const doneTitles = Object.values(logs || {}).filter(l => l.date === today).map(l => l.title);
        
        for(let id in base) {
            if(base[id].important && !doneTitles.includes(base[id].title)) {
                addToLog(`ШТРАФ: ${base[id].title}`, base[id].important ? base[id].xp : 0, true);
            }
        }

        setTimeout(async () => {
            const finalXP = document.getElementById('todayTotal').innerText;
            archiveRef.child(today.replace(/\./g, '_')).set({ total: finalXP, date: today });
            alert("День заархивирован!");
        }, 1000);
    }

    archiveRef.on('value', snap => {
        const data = snap.val();
        const cont = document.getElementById('archiveDays'); cont.innerHTML = '';
        for(let d in data) { cont.innerHTML += `<div class="archive-tag"><b>${data[d].date}</b>: ${data[d].total} XP</div>`; }
    });

    function updateChart(chartData) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const labels = Object.keys(chartData).sort();
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: 'XP', data: labels.map(l => chartData[l]), borderColor: '#a855f7', tension: 0.4, fill: true, backgroundColor: 'rgba(168, 85, 247, 0.1)' }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }
</script>
</body>
</html>

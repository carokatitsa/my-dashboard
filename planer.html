<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Planner Fixed Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0b141d; --panel: #16222e; --border: #2d3d4d; 
            --text: #e1e8ef; --accent: #4ade80; --danger: #ff7675;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* КОНТЕЙНЕР ДЛЯ ВЕРХНЕЙ ЧАСТИ */
        .top-row { 
            display: flex; 
            flex: 1; /* Занимает доступное место сверху */
            min-height: 0; 
        }

        .main-content { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            border-right: 1px solid var(--border); 
        }

        /* УЗКАЯ БАЗА */
        .sidebar { 
            width: 300px; 
            background: var(--panel); 
            padding: 20px; 
            overflow-y: auto; 
            flex-shrink: 0; 
        }

        /* ГРАФИК ТЕПЕРЬ СТРОГО ВНИЗУ НА ВСЮ ШИРИНУ */
        .bottom-row { 
            width: 100%;
            height: 280px; 
            padding: 15px 20px; 
            box-sizing: border-box;
            border-top: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 850px) {
            .top-row { flex-direction: column; }
            .sidebar { 
                position: fixed; bottom: -100%; left: 0; width: 100% !important; height: 70%; 
                z-index: 1000; transition: 0.4s; border-radius: 20px 20px 0 0;
            }
            .sidebar.active { bottom: 0; }
            .bottom-row { height: 220px; }
            .mobile-add-trigger { display: block; }
        }
        
        .mobile-add-trigger { 
            display: none; position: fixed; bottom: 20px; right: 20px; 
            background: var(--accent); color: #000; padding: 15px 25px; 
            border-radius: 50px; font-weight: bold; z-index: 999; border: none;
        }

        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 8px; font-size: 1.1em; margin-top: 0; }

        /* ТАБЛИЦА */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1a2a3a; font-size: 0.9em; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background: #243b53; color: var(--accent); }

        /* ГРАФИК */
        .chart-viewport { width: 100%; height: 100%; overflow-x: auto; background: var(--panel); border-radius: 8px; border: 1px solid var(--border); }
        .chart-container { position: relative; height: 100%; }

        /* ИНТЕРФЕЙС БАЗЫ */
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input { background: #0b141d; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; }
        .add-btn { background: var(--accent); color: #000; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .base-item { background: #243b53; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .del-btn { background: none; border: none; color: var(--danger); font-size: 1.2em; cursor: pointer; }

        .close-sidebar { display: none; width: 100%; margin-bottom: 10px; padding: 10px; color: #fff; border: 1px solid var(--border); background: none; }
        @media (max-width: 850px) { .close-sidebar { display: block; } }
    </style>
</head>
<body>

<button class="mobile-add-trigger" onclick="toggleSidebar()">+ ДОБАВИТЬ</button>

<div class="top-row">
    <div class="main-content">
        <h2>📊 ЛОГ АКТИВНОСТИ</h2>
        <div class="table-container">
            <table>
                <thead><tr><th>Дата</th><th>Действие</th><th>XP</th><th></th></tr></thead>
                <tbody id="logBody"></tbody>
                <tfoot>
                    <tr style="background:#243b53; font-weight:bold; color:var(--accent)">
                        <td colspan="2">СЕГОДНЯ:</td>
                        <td id="todayTotal">0</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()">✕ ЗАКРЫТЬ</button>
        <h2>🏗️ БАЗА</h2>
        <div class="input-group">
            <input type="text" id="baseTitle" placeholder="Что делаем?">
            <div style="display:flex; gap:5px;">
                <input type="number" id="baseXP" placeholder="XP" style="flex:1">
                <button class="add-btn" onclick="saveToBase()" style="flex:1">+</button>
            </div>
        </div>
        <div id="actionBase"></div>
    </div>
</div>

<div class="bottom-row">
    <div class="chart-viewport" id="chartViewport">
        <div class="chart-container" id="chartContainer">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZks9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        databaseURL: "https://my-dashboard-dc67a-default-rtdb.firebaseio.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.appspot.com",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d",
        measurementId: "G-74720EWKSB"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logRef = db.ref('daily_log');
    const baseRef = db.ref('action_presets');
    let chart;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    function saveToBase() {
        const title = document.getElementById('baseTitle').value;
        const xp = parseInt(document.getElementById('baseXP').value);
        if(title && xp) { baseRef.push({ title, xp }); document.getElementById('baseTitle').value = ''; document.getElementById('baseXP').value = ''; }
    }

    function deleteFromBase(e, id) {
        e.stopPropagation();
        if(confirm('Удалить шаблон?')) baseRef.child(id).remove();
    }

    baseRef.on('value', snap => {
        const data = snap.val();
        const container = document.getElementById('actionBase');
        container.innerHTML = '';
        for(let id in data) {
            container.innerHTML += `
                <div class="base-item" onclick="addToLog('${data[id].title}', ${data[id].xp}); if(window.innerWidth < 850) toggleSidebar();">
                    <span>${data[id].title} <b>+${data[id].xp}</b></span>
                    <button class="del-btn" onclick="deleteFromBase(event, '${id}')">✕</button>
                </div>`;
        }
    });

    function addToLog(title, xp) {
        logRef.push({ title, xp, date: new Date().toLocaleDateString(), ts: Date.now() });
    }

    function deleteLogItem(id) {
        if(confirm('Удалить запись?')) logRef.child(id).remove();
    }

    logRef.on('value', snap => {
        const data = snap.val();
        const body = document.getElementById('logBody');
        const today = new Date().toLocaleDateString();
        let html = ''; let totalToday = 0; let chartData = {};
        const sortedIds = Object.keys(data || {}).sort((a,b) => data[b].ts - data[a].ts);

        sortedIds.forEach(id => {
            const item = data[id];
            if(item.date === today) totalToday += item.xp;
            chartData[item.date] = (chartData[item.date] || 0) + item.xp;
            html += `<tr><td>${item.date}</td><td>${item.title}</td><td style="color:var(--accent)">+${item.xp}</td><td><button class="del-btn" onclick="deleteLogItem('${id}')">✕</button></td></tr>`;
        });
        body.innerHTML = html;
        document.getElementById('todayTotal').innerText = totalToday;
        updateChart(chartData);
    });

    function updateChart(chartData) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const container = document.getElementById('chartContainer');
        const viewport = document.getElementById('chartViewport');
        const labels = Object.keys(chartData).sort((a, b) => new Date(a.split('.').reverse().join('-')) - new Date(b.split('.').reverse().join('-')));
        const dataPoints = labels.map(l => chartData[l]);
        
        container.style.width = Math.max(viewport.offsetWidth, labels.length * 100) + 'px';

        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ 
                    label: 'XP', data: dataPoints, borderColor: '#4ade80', 
                    backgroundColor: 'rgba(74, 222, 128, 0.1)', borderWidth: 3, fill: true, tension: 0.3 
                }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true }, x: { grid: { display: false } } } }
        });
        setTimeout(() => { viewport.scrollLeft = viewport.scrollWidth; }, 300);
    }
</script>
</body>
</html>

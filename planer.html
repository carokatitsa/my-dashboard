<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Planner Mobile Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0b141d; --panel: #16222e; --border: #2d3d4d; 
            --text: #e1e8ef; --accent: #4ade80; --danger: #ff7675;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: row; height: 100vh;
        }

        /* --- ГЛАВНЫЕ КОНТЕЙНЕРЫ --- */
        .main-content { 
            flex: 2; padding: 15px; display: flex; flex-direction: column; 
            border-right: 2px solid var(--border); overflow-y: auto;
        }
        .sidebar { 
            flex: 1; background: var(--panel); padding: 15px; 
            display: flex; flex-direction: column; overflow-y: auto;
        }

        /* МОБИЛЬНАЯ ВЕРСИЯ (ОСНОВНОЕ ИСПРАВЛЕНИЕ) */
        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .main-content { border-right: none; border-bottom: 2px solid var(--border); width: 100%; box-sizing: border-box; }
            .sidebar { width: 100%; box-sizing: border-box; }
            .chart-viewport { height: 250px; }
        }

        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 8px; font-size: 1.1em; margin-top: 0; }

        /* ТАБЛИЦА */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1a2a3a; font-size: 0.9em; }
        th, td { border: 1px solid var(--border); padding: 12px 8px; text-align: left; }
        th { background: #243b53; color: var(--accent); }
        .total-row { background: #243b53; font-weight: bold; color: var(--accent); }

        /* ГРАФИК */
        .chart-viewport {
            width: 100%; overflow-x: auto; background: var(--panel);
            border-radius: 8px; margin-top: 15px; border: 1px solid var(--border);
        }
        .chart-container { position: relative; height: 220px; }

        /* БАЗА ДЕЙСТВИЙ */
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input { 
            background: #0b141d; border: 1px solid var(--border); color: white; 
            padding: 12px; border-radius: 6px; outline: none; font-size: 16px; /* 16px предотвращает зум на iPhone */
        }
        .add-btn { background: var(--accent); color: #000; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .base-item { 
            background: #243b53; padding: 15px; border-radius: 8px; margin-bottom: 10px; 
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .base-item .title { flex-grow: 1; font-weight: 500; }
        .base-item b { color: var(--accent); }
        .del-btn { background: none; border: none; color: var(--danger); font-size: 1.4em; cursor: pointer; padding: 5px; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="main-content">
    <h2>📊 ЛОГ АКТИВНОСТИ</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Действие</th>
                    <th>XP</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="logBody"></tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="2">СЕГОДНЯ НАБРАНО:</td>
                    <td id="todayTotal">0</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="chart-viewport" id="chartViewport">
        <div class="chart-container" id="chartContainer">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<div class="sidebar">
    <h2>🏗️ МОЯ БАЗА</h2>
    <div class="input-group">
        <input type="text" id="baseTitle" placeholder="Что делаем?" style="flex:2">
        <input type="number" id="baseXP" placeholder="XP" style="flex:1">
        <button class="add-btn" onclick="saveToBase()">+</button>
    </div>
    <div id="actionBase"></div>
</div>

<script>
    // ТВОЙ FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZks9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        databaseURL: "https://my-dashboard-dc67a-default-rtdb.firebaseio.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.appspot.com",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d",
        measurementId: "G-74720EWKSB"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logRef = db.ref('daily_log');
    const baseRef = db.ref('action_presets');
    let chart;

    // Сохранение шаблона в базу
    function saveToBase() {
        const title = document.getElementById('baseTitle').value;
        const xp = parseInt(document.getElementById('baseXP').value);
        if(title && xp) {
            baseRef.push({ title, xp });
            document.getElementById('baseTitle').value = '';
            document.getElementById('baseXP').value = '';
        }
    }

    // Удаление шаблона из базы
    function deleteFromBase(e, id) {
        e.stopPropagation();
        if(confirm('Удалить шаблон?')) baseRef.child(id).remove();
    }

    baseRef.on('value', snap => {
        const data = snap.val();
        const container = document.getElementById('actionBase');
        container.innerHTML = '';
        for(let id in data) {
            container.innerHTML += `
                <div class="base-item" onclick="addToLog('${data[id].title}', ${data[id].xp})">
                    <span class="title">${data[id].title}</span>
                    <b>+${data[id].xp}</b>
                    <button class="del-btn" onclick="deleteFromBase(event, '${id}')">✕</button>
                </div>`;
        }
    });

    function addToLog(title, xp) {
        logRef.push({ title, xp, date: new Date().toLocaleDateString(), ts: Date.now() });
    }

    function deleteLogItem(id) {
        if(confirm('Удалить запись из истории?')) logRef.child(id).remove();
    }

    logRef.on('value', snap => {
        const data = snap.val();
        const body = document.getElementById('logBody');
        const today = new Date().toLocaleDateString();
        let html = '';
        let totalToday = 0;
        let chartData = {};

        const sortedIds = Object.keys(data || {}).sort((a,b) => data[b].ts - data[a].ts);
        sortedIds.forEach(id => {
            const item = data[id];
            if(item.date === today) totalToday += item.xp;
            chartData[item.date] = (chartData[item.date] || 0) + item.xp;
            html += `<tr>
                <td>${item.date}</td>
                <td>${item.title}</td>
                <td style="color:var(--accent); font-weight:bold;">+${item.xp}</td>
                <td><button class="del-btn" onclick="deleteLogItem('${id}')">✕</button></td>
            </tr>`;
        });
        body.innerHTML = html;
        document.getElementById('todayTotal').innerText = totalToday;
        updateChart(chartData);
    });

    function updateChart(chartData) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const container = document.getElementById('chartContainer');
        const viewport = document.getElementById('chartViewport');
        const labels = Object.keys(chartData).sort((a, b) => new Date(a.split('.').reverse().join('-')) - new Date(b.split('.').reverse().join('-')));
        const dataPoints = labels.map(l => chartData[l]);

        const step = window.innerWidth < 850 ? 90 : 130;
        container.style.width = Math.max(viewport.offsetWidth, labels.length * step) + 'px';

        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'XP', data: dataPoints, borderColor: '#4ade80',
                    backgroundColor: 'rgba(74, 222, 128, 0.1)', borderWidth: 3, fill: true, tension: 0.3
                }]
            },
            options: {
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: '#2d3d4d' } },
                    x: { grid: { color: '#2d3d4d' } }
                }
            }
        });
        setTimeout(() => { viewport.scrollLeft = viewport.scrollWidth; }, 300);
    }
</script>
</body>
</html>

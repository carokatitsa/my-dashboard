<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив Государств | Bronze Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #05070a;
            --panel: #0f111a;
            --accent: #b8860b;
            --gold: #ffd700;
            --text: #e0e0e0;
            --border: rgba(184, 134, 11, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cinzel', serif; /* Если есть возможность, подключи этот шрифт от Google */
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            padding: 30px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(15,17,26,1), transparent);
            border-bottom: 1px solid var(--border);
        }

        h1 {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .main-container {
            max-width: 1400px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 40px;
            padding: 0 20px;
        }

        /* Панель создания государства */
        .creator-panel {
            background: var(--panel);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .creator-panel h2 {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 25px;
            border-left: 3px solid var(--gold);
            padding-left: 15px;
        }

        input, textarea {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); background: rgba(0,0,0,0.6); outline: none; }

        .btn-prime {
            background: linear-gradient(135deg, #8b6508, #b8860b);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .btn-prime:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(184, 134, 11, 0.4); }

        /* Сетка государств */
        .countries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .country-card {
            background: var(--panel);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: 0.4s;
            position: relative;
        }

        .country-card:hover { transform: scale(1.02); border-color: var(--gold); }

        .flag-box {
            width: 100%;
            height: 180px;
            background: #000;
            position: relative;
        }

        .flag-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        .country-info { padding: 20px; }
        .country-info h3 { color: var(--gold); margin: 0 0 10px 0; font-size: 1.5rem; }
        .country-date { color: var(--accent); font-size: 0.9rem; font-weight: bold; margin-bottom: 15px; display: block; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-action {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--glass);
            color: #fff;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-action:hover { background: var(--accent); }

        /* МОДАЛЬНОЕ ОКНО ДЛЯ ПРАВИТЕЛЕЙ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            backdrop-filter: blur(10px);
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .modal-content {
            max-width: 1000px;
            margin: 0 auto;
        }

        .close-modal {
            position: absolute;
            top: 30px; right: 30px;
            font-size: 30px; color: var(--gold); cursor: pointer;
        }

        .rulers-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fa fa-scroll"></i> Летопись Государств</h1>
</header>

<div class="main-container">
    <div class="creator-panel">
        <h2>Основать Державу</h2>
        <input type="text" id="cName" placeholder="Название государства">
        <input type="text" id="cFlag" placeholder="Ссылка на флаг (URL)">
        <input type="text" id="cYears" placeholder="Годы (напр. 3100 — 30 до н.э.)">
        <textarea id="cDesc" rows="4" placeholder="Краткая история становления..."></textarea>
        <button class="btn-prime" onclick="addCountry()">Записать в архив</button>
    </div>

    <div class="countries-grid" id="countriesList">
        </div>
</div>

<div id="rulerModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div class="rulers-header">
            <h2 id="modalCountryName" style="color: var(--gold); font-size: 2.5rem;">Название</h2>
            <p id="modalCountryYears" style="color: var(--accent);"></p>
        </div>
        
        <div style="display: grid; grid-template-columns: 300px 1fr; gap: 30px;">
            <div class="creator-panel" style="position: static; width: 100%;">
                <h3>Добавить правителя</h3>
                <input type="text" id="rName" placeholder="Имя">
                <input type="text" id="rYears" placeholder="Годы правления">
                <input type="text" id="rPhoto" placeholder="Ссылка на портрет">
                <textarea id="rDesc" placeholder="Деяния..."></textarea>
                <button class="btn-prime" onclick="addRuler()">Сохранить</button>
            </div>
            <div id="rulersSubList" class="countries-grid">
                </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let activeCountryId = null;

    // --- ЛОГИКА ГОСУДАРСТВ ---

    async function loadCountries() {
        const list = document.getElementById('countriesList');
        list.innerHTML = "";
        const snap = await getDocs(collection(db, "archive_nations"));
        
        snap.forEach(d => {
            const n = d.data();
            list.innerHTML += `
                <div class="country-card">
                    <div class="flag-box">
                        <img src="${n.flag || 'https://via.placeholder.com/400x200?text=No+Flag'}" class="flag-img">
                    </div>
                    <div class="country-info">
                        <h3>${n.name}</h3>
                        <span class="country-date"><i class="fa fa-hourglass-half"></i> ${n.years}</span>
                        <div class="btn-group">
                            <button class="btn-action" onclick="openRulers('${d.id}', '${n.name}', '${n.years}')">
                                <i class="fa fa-crown"></i> Правители
                            </button>
                            <button class="btn-action" style="border-color: #f85149; color: #f85149" onclick="deleteCountry('${d.id}')">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    window.addCountry = async function() {
        const name = document.getElementById('cName').value;
        const flag = document.getElementById('cFlag').value;
        const years = document.getElementById('cYears').value;
        const desc = document.getElementById('cDesc').value;

        if(!name) return alert("Назовите государство!");
        await addDoc(collection(db, "archive_nations"), { name, flag, years, desc });
        location.reload();
    }

    window.deleteCountry = async function(id) {
        if(confirm("Удалить государство и всех его правителей?")) {
            await deleteDoc(doc(db, "archive_nations", id));
            loadCountries();
        }
    }

    // --- ЛОГИКА ПРАВИТЕЛЕЙ ---

    window.openRulers = function(id, name, years) {
        activeCountryId = id;
        document.getElementById('modalCountryName').innerText = name;
        document.getElementById('modalCountryYears').innerText = years;
        document.getElementById('rulerModal').style.display = "block";
        loadRulers();
    }

    window.closeModal = () => document.getElementById('rulerModal').style.display = "none";

    async function loadRulers() {
        const list = document.getElementById('rulersSubList');
        list.innerHTML = "";
        const q = query(collection(db, "rulers"), where("countryId", "==", activeCountryId));
        const snap = await getDocs(q);

        snap.forEach(d => {
            const r = d.data();
            list.innerHTML += `
                <div class="country-card" style="height: fit-content;">
                    <img src="${r.photo || ''}" style="width:100%; height:200px; object-fit:cover">
                    <div class="country-info">
                        <h4 style="color:var(--gold); margin:0">${r.name}</h4>
                        <small style="color:var(--accent)">${r.years}</small>
                        <p style="font-size:0.8rem; opacity:0.7">${r.desc}</p>
                        <button class="btn-action" onclick="deleteRuler('${d.id}')">Удалить</button>
                    </div>
                </div>
            `;
        });
    }

    window.addRuler = async function() {
        const name = document.getElementById('rName').value;
        const years = document.getElementById('rYears').value;
        const photo = document.getElementById('rPhoto').value;
        const desc = document.getElementById('rDesc').value;

        await addDoc(collection(db, "rulers"), {
            countryId: activeCountryId,
            name, years, photo, desc
        });
        loadRulers();
    }

    window.deleteRuler = async function(id) {
        await deleteDoc(doc(db, "rulers", id));
        loadRulers();
    }

    loadCountries();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Archive | Bronze Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg: #0c0e12;
            --surface: #161a20;
            --accent: #d4af37;
            --accent-hover: #f1c40f;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --border: #2d343f;
            --danger: #e74c3c;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        /* Навигация */
        header {
            background: rgba(22, 26, 32, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .btn-back {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center; gap: 8px;
        }

        .btn-back:hover { color: var(--accent); }

        .container {
            max-width: 1400px; margin: 40px auto;
            display: grid; grid-template-columns: 380px 1fr;
            gap: 40px; padding: 0 20px;
        }

        /* Форма (Боковая панель) */
        .editor-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            height: fit-content;
            position: sticky; top: 100px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .editor-card h2 {
            font-family: 'Playfair Display', serif;
            margin-top: 0; color: var(--accent);
            font-size: 22px; margin-bottom: 25px;
        }

        input, textarea {
            background: #0f1216;
            border: 1px solid var(--border);
            color: #fff; padding: 14px;
            border-radius: 8px; width: 100%;
            margin-bottom: 15px; box-sizing: border-box;
            font-family: inherit; transition: 0.3s;
        }

        input:focus { border-color: var(--accent); outline: none; }

        .btn-main {
            background: var(--accent);
            color: #000; border: none;
            padding: 16px; border-radius: 8px;
            width: 100%; cursor: pointer;
            font-weight: 700; text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-main:hover { background: var(--accent-hover); transform: translateY(-2px); }

        /* Сетка государств */
        .nations-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .nation-card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: 0.4s;
        }

        .nation-card:hover { transform: translateY(-10px); border-color: var(--accent); }

        .nation-flag { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid var(--border); }

        .nation-content { padding: 20px; }

        .nation-title { font-family: 'Playfair Display', serif; font-size: 22px; margin: 0; color: #fff; }

        .nation-years { color: var(--accent); font-size: 13px; font-weight: 600; margin-top: 5px; display: block; }

        .nation-actions { display: flex; gap: 8px; margin-top: 20px; }

        .btn-icon {
            flex: 1; padding: 10px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); color: var(--text);
            border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 12px;
        }

        .btn-icon:hover { background: var(--accent); color: #000; }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            padding: 40px; box-sizing: border-box; overflow-y: auto;
        }

        .modal-container { max-width: 1200px; margin: 0 auto; position: relative; }

        .close-modal { position: absolute; top: -10px; right: 0; font-size: 30px; color: var(--accent); cursor: pointer; }

        /* ВЕРТИКАЛЬНЫЕ КАРТОЧКИ ПРАВИТЕЛЕЙ */
        .rulers-display-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .ruler-v-card {
            background: #1c2128; border: 1px solid var(--border);
            border-radius: 20px; padding: 30px 20px;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; position: relative; transition: 0.3s;
        }

        .ruler-v-card:hover { border-color: var(--accent); }

        .ruler-avatar {
            width: 160px; height: 160px;
            border-radius: 50%; object-fit: cover;
            border: 4px solid var(--accent);
            margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .ruler-name { font-family: 'Playfair Display', serif; font-size: 22px; color: #fff; margin: 0; }

        .ruler-years-alt { color: var(--accent); font-weight: 600; font-size: 14px; margin: 10px 0; display: block; }

        /* Раскрывающееся описание */
        .ruler-full-desc {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s ease-out;
            font-size: 14px; color: var(--text-dim);
            line-height: 1.6; margin-top: 0;
        }

        .ruler-full-desc.show { max-height: 1000px; margin-top: 15px; padding-bottom: 10px; }

        .expand-btn {
            background: none; border: 1px solid var(--border);
            color: var(--accent); cursor: pointer;
            border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; margin-top: 10px;
        }

        .expand-btn.active { transform: rotate(180deg); background: var(--accent); color: #000; }

        .ruler-controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }

        .ruler-mini-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; }
        .ruler-mini-btn:hover { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">BRONZE ARCHIVE</a>
    <a href="history.html" class="btn-back"><i class="fa fa-chevron-left"></i> Назад к карте</a>
</header>

<div class="container">
    <aside class="editor-card">
        <h2 id="formTitle">Основать Державу</h2>
        <input type="text" id="cName" placeholder="Название нации">
        <input type="text" id="cFlag" placeholder="URL флага">
        <input type="text" id="cYears" placeholder="Годы (напр. 1500 - 1000 BC)">
        <textarea id="cDesc" rows="4" placeholder="Краткое описание нации..."></textarea>
        <button class="btn-main" id="saveNationBtn" onclick="saveNation()">Записать в историю</button>
        <button id="cancelEditBtn" onclick="resetNationForm()" style="display:none; background:none; border:none; color:var(--text-dim); width:100%; margin-top:10px; cursor:pointer;">Отмена</button>
    </aside>

    <main class="nations-grid" id="nationsList"></main>
</div>

<div id="rulerModal" class="modal">
    <div class="modal-container">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h1 id="modalTitle" style="font-family: 'Playfair Display'; color: var(--accent); margin-bottom: 30px;"></h1>
        
        <div style="display: grid; grid-template-columns: 350px 1fr; gap: 40px;">
            <div class="editor-card" style="position: static; width: 100%; box-sizing: border-box;">
                <h2 id="rulerFormTitle">Добавить правителя</h2>
                <input type="text" id="rName" placeholder="Имя">
                <input type="text" id="rYears" placeholder="Годы правления">
                <input type="text" id="rPhoto" placeholder="URL портрета">
                <textarea id="rDesc" rows="5" placeholder="Великие деяния и история..."></textarea>
                <button class="btn-main" id="saveRulerBtn" onclick="saveRuler()">Вписать в летопись</button>
                <button id="cancelRulerEditBtn" onclick="resetRulerForm()" style="display:none; background:none; border:none; color:var(--text-dim); width:100%; margin-top:10px; cursor:pointer;">Отмена</button>
            </div>
            <div id="rulersDisplay" class="rulers-display-grid"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let editNationId = null;
    let editRulerId = null;
    let activeCountryId = null;

    // --- ЛОГИКА СТРАН ---

    async function loadNations() {
        const list = document.getElementById('nationsList');
        list.innerHTML = "";
        const snap = await getDocs(collection(db, "archive_nations"));
        snap.forEach(d => {
            const n = d.data();
            list.innerHTML += `
                <div class="nation-card">
                    <img src="${n.flag || 'https://via.placeholder.com/400x200?text=Flag'}" class="nation-flag">
                    <div class="nation-content">
                        <span class="nation-years">${n.years}</span>
                        <h3 class="nation-title">${n.name}</h3>
                        <div class="nation-actions">
                            <button class="btn-icon" onclick="openRulers('${d.id}', '${n.name}')"><i class="fa fa-crown"></i> Лидеры</button>
                            <button class="btn-icon" onclick="editNation('${d.id}', \`${n.name}\`, \`${n.flag}\`, \`${n.years}\`, \`${n.desc}\`)"><i class="fa fa-edit"></i></button>
                            <button class="btn-icon" style="color:var(--danger)" onclick="deleteNation('${d.id}')"><i class="fa fa-trash"></i></button>
                        </div>
                    </div>
                </div>`;
        });
    }

    window.saveNation = async function() {
        const data = {
            name: document.getElementById('cName').value,
            flag: document.getElementById('cFlag').value,
            years: document.getElementById('cYears').value,
            desc: document.getElementById('cDesc').value
        };
        if(!data.name) return alert("Введите название!");

        if (editNationId) {
            await updateDoc(doc(db, "archive_nations", editNationId), data);
        } else {
            await addDoc(collection(db, "archive_nations"), data);
        }
        resetNationForm();
        loadNations();
    }

    window.editNation = (id, name, flag, years, desc) => {
        editNationId = id;
        document.getElementById('cName').value = name;
        document.getElementById('cFlag').value = flag;
        document.getElementById('cYears').value = years;
        document.getElementById('cDesc').value = desc;
        document.getElementById('formTitle').innerText = "Править Державу";
        document.getElementById('saveNationBtn').innerText = "Обновить";
        document.getElementById('cancelEditBtn').style.display = "block";
    }

    window.resetNationForm = () => {
        editNationId = null;
        document.getElementById('cName').value = "";
        document.getElementById('cFlag').value = "";
        document.getElementById('cYears').value = "";
        document.getElementById('cDesc').value = "";
        document.getElementById('formTitle').innerText = "Основать Державу";
        document.getElementById('saveNationBtn').innerText = "Записать в историю";
        document.getElementById('cancelEditBtn').style.display = "none";
    }

    window.deleteNation = async (id) => {
        if(confirm("Удалить страну?")) {
            await deleteDoc(doc(db, "archive_nations", id));
            loadNations();
        }
    }

    // --- ЛОГИКА ПРАВИТЕЛЕЙ ---

    window.openRulers = (id, name) => {
        activeCountryId = id;
        document.getElementById('modalTitle').innerText = `Летопись: ${name}`;
        document.getElementById('rulerModal').style.display = "block";
        loadRulers();
    }

    window.closeModal = () => {
        document.getElementById('rulerModal').style.display = "none";
        resetRulerForm();
    }

    async function loadRulers() {
        const list = document.getElementById('rulersDisplay');
        list.innerHTML = "";
        const snap = await getDocs(collection(db, "rulers"));
        snap.forEach(d => {
            const r = d.data();
            if (r.countryId === activeCountryId) {
                list.innerHTML += `
                    <div class="ruler-v-card">
                        <div class="ruler-controls">
                            <button class="ruler-mini-btn" onclick="editRuler('${d.id}', \`${r.name}\`, \`${r.years}\`, \`${r.photo}\`, \`${r.desc}\`)"><i class="fa fa-edit"></i></button>
                            <button class="ruler-mini-btn" style="color:var(--danger)" onclick="deleteRuler('${d.id}')"><i class="fa fa-trash"></i></button>
                        </div>
                        <img src="${r.photo || 'https://via.placeholder.com/150'}" class="ruler-avatar">
                        <h3 class="ruler-name">${r.name}</h3>
                        <span class="ruler-years-alt">${r.years}</span>
                        <div id="desc-${d.id}" class="ruler-full-desc">${r.desc || 'История умалчивает о подробностях...'}</div>
                        <button class="expand-btn" onclick="toggleDesc('${d.id}', this)">
                            <i class="fa fa-chevron-down"></i>
                        </button>
                    </div>`;
            }
        });
    }

    window.toggleDesc = function(id, btn) {
        const div = document.getElementById(`desc-${id}`);
        div.classList.toggle('show');
        btn.classList.toggle('active');
    }

    window.saveRuler = async function() {
        const data = {
            countryId: activeCountryId,
            name: document.getElementById('rName').value,
            years: document.getElementById('rYears').value,
            photo: document.getElementById('rPhoto').value,
            desc: document.getElementById('rDesc').value
        };
        if(!data.name) return alert("Введите имя правителя!");

        if (editRulerId) {
            await updateDoc(doc(db, "rulers", editRulerId), data);
        } else {
            await addDoc(collection(db, "rulers"), data);
        }
        resetRulerForm();
        loadRulers();
    }

    window.editRuler = (id, name, years, photo, desc) => {
        editRulerId = id;
        document.getElementById('rName').value = name;
        document.getElementById('rYears').value = years;
        document.getElementById('rPhoto').value = photo;
        document.getElementById('rDesc').value = desc;
        document.getElementById('rulerFormTitle').innerText = "Править запись";
        document.getElementById('saveRulerBtn').innerText = "Сохранить";
        document.getElementById('cancelRulerEditBtn').style.display = "block";
    }

    window.resetRulerForm = () => {
        editRulerId = null;
        document.getElementById('rName').value = "";
        document.getElementById('rYears').value = "";
        document.getElementById('rPhoto').value = "";
        document.getElementById('rDesc').value = "";
        document.getElementById('rulerFormTitle').innerText = "Добавить правителя";
        document.getElementById('saveRulerBtn').innerText = "Вписать в летопись";
        document.getElementById('cancelRulerEditBtn').style.display = "none";
    }

    window.deleteRuler = async (id) => {
        if(confirm("Удалить правителя?")) {
            await deleteDoc(doc(db, "rulers", id));
            loadRulers();
        }
    }

    loadNations();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Правители | Bronze Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0d1117; --bg-sidebar: #161b22; --accent: #cd7f32; --gold: #f1c40f; --text: #c9d1d9; --border: #30363d; }
        body { background: var(--bg-dark); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .back-link { color: var(--accent); text-decoration: none; font-size: 14px; }
        
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        
        /* Форма */
        .admin-panel { background: var(--bg-sidebar); padding: 20px; border-radius: 8px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 20px; }
        input, textarea { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }

        /* Сетка карточек */
        .rulers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .ruler-card { background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: 0.3s; position: relative; }
        .ruler-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .ruler-img { width: 100%; height: 250px; object-fit: cover; background: #000; }
        .ruler-info { padding: 15px; }
        .ruler-info h3 { margin: 0 0 5px 0; color: var(--gold); font-size: 18px; }
        .ruler-years { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 10px; display: block; }
        .ruler-desc { font-size: 13px; line-height: 1.4; color: #8b949e; }
        
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(248, 81, 73, 0.8); color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px; z-index: 10; }
    </style>
</head>
<body>

<header>
    <div>
        <a href="history.html" class="back-link">← Вернуться к карте</a>
        <h1 id="countryTitle" style="margin: 10px 0 0 0;">Правители государства</h1>
    </div>
</header>

<div class="container">
    <div class="admin-panel">
        <h3 style="margin-top:0">Добавить правителя</h3>
        <input type="text" id="rName" placeholder="Имя правителя">
        <input type="text" id="rYears" placeholder="Годы правления (напр. 1250 - 1300)">
        <input type="text" id="rPhoto" placeholder="Ссылка на фото (URL)">
        <textarea id="rDesc" rows="4" placeholder="Краткое описание достижений..."></textarea>
        <button class="btn-add" onclick="addRuler()">Сохранить карточку</button>
    </div>

    <div class="rulers-grid" id="rulersList">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Получаем параметры из URL (id страны)
    const urlParams = new URLSearchParams(window.location.search);
    const countryId = urlParams.get('id');
    const collectionRef = urlParams.get('coll');

    // Загружаем название страны
    async function loadCountryName() {
        if (!countryId) return;
        const docRef = doc(db, collectionRef, countryId);
        const snap = await getDoc(docRef);
        if (snap.exists()) {
            document.getElementById('countryTitle').innerText = `Правители: ${snap.data().name}`;
        }
    }

    // Загружаем правителей
    async function loadRulers() {
        const list = document.getElementById('rulersList');
        list.innerHTML = "Загрузка...";
        
        const q = query(collection(db, "rulers"), where("countryId", "==", countryId));
        const snap = await getDocs(q);
        
        list.innerHTML = "";
        snap.forEach(d => {
            const r = d.data();
            list.innerHTML += `
                <div class="ruler-card">
                    <button class="del-btn" onclick="deleteRuler('${d.id}')"><i class="fa fa-trash"></i></button>
                    <img src="${r.photo || 'https://via.placeholder.com/200x250?text=No+Photo'}" class="ruler-img">
                    <div class="ruler-info">
                        <h3>${r.name}</h3>
                        <span class="ruler-years">${r.years}</span>
                        <p class="ruler-desc">${r.desc}</p>
                    </div>
                </div>
            `;
        });
    }

    // Добавляем правителя
    window.addRuler = async function() {
        const name = document.getElementById('rName').value;
        const years = document.getElementById('rYears').value;
        const photo = document.getElementById('rPhoto').value;
        const desc = document.getElementById('rDesc').value;

        if (!name || !years) return alert("Введите имя и годы!");

        await addDoc(collection(db, "rulers"), {
            countryId,
            name,
            years,
            photo,
            desc,
            createdAt: Date.now()
        });

        // Очистка
        document.getElementById('rName').value = "";
        document.getElementById('rYears').value = "";
        document.getElementById('rPhoto').value = "";
        document.getElementById('rDesc').value = "";
        
        loadRulers();
    }

    window.deleteRuler = async function(id) {
        if(confirm("Удалить правителя?")) {
            await deleteDoc(doc(db, "rulers", id));
            loadRulers();
        }
    }

    loadCountryName();
    loadRulers();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Archive | Bronze Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Подключаем премиальный шрифт */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root { 
            --bg-dark: #080a0e; 
            --panel-bg: rgba(18, 22, 30, 0.95); 
            --accent: #d4af37; /* Старое золото */
            --gold-bright: #ffd700; 
            --text-main: #e2e8f0; 
            --text-dim: #94a3b8; 
            --border: rgba(184, 134, 11, 0.2); 
            --shadow: 0 15px 40px rgba(0,0,0,0.6);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body { 
            background: var(--bg-dark); 
            background-image: radial-gradient(circle at center, #11151d 0%, var(--bg-dark) 100%);
            color: var(--text-main); 
            font-family: var(--font-sans); 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
        }

        /* Верхняя навигация */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 40px; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(13, 16, 22, 0.8);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        .back-link { 
            color: var(--text-dim); text-decoration: none; font-size: 14px; 
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .back-link:hover { color: var(--gold-bright); }

        .logo-text {
            font-family: var(--font-serif); font-size: 24px; color: var(--accent);
            letter-spacing: 1px;
        }

        /* Главный заголовок с названием страны */
        .page-header {
            text-align: center; margin: 50px 0;
        }

        .page-header h1 {
            font-family: var(--font-serif); font-size: 42px; margin: 0;
            color: var(--gold-bright); text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        /* Основной контейнер */
        .archive-wrapper { 
            max-width: 1200px; margin: 0 auto; padding: 0 30px 50px 30px;
            display: grid; grid-template-columns: 360px 1fr; gap: 40px; 
            align-items: start;
        }
        
        /* Глобальный стиль для стеклянных панелей */
        .glass-panel { 
            background: var(--panel-bg); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            box-shadow: var(--shadow);
            backdrop-filter: blur(5px);
            transition: 0.3s ease;
        }
        
        /* Форма добавления (Левая часть) */
        .creator-panel { 
            padding: 30px; 
            position: sticky; top: 110px;
        }

        .creator-panel h3 { 
            color: var(--accent); margin-top: 0; margin-bottom: 25px; 
            text-align: center; text-transform: uppercase; font-size: 17px; 
            letter-spacing: 1.5px; font-weight: 600;
        }

        input, textarea { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            color: #fff; padding: 12px; border-radius: 6px; 
            width: 100%; box-sizing: border-box; margin-bottom: 15px; 
            font-family: var(--font-sans); transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-prime { 
            background: linear-gradient(135deg, #a68628 0%, var(--accent) 100%); 
            color: #000; border: none; padding: 15px; border-radius: 6px; 
            cursor: pointer; font-weight: bold; width: 100%; 
            font-size: 15px; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-prime:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(184,134,11, 0.3); }

        /* Панель просмотра (Правая часть) */
        .view-panel {
            padding: 40px;
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }
        
        /* Кнопки управления на карточке */
        .ruler-actions {
            position: absolute; top: 15px; right: 15px; display: flex; gap: 8px;
        }
        .mini-btn {
            background: none; border: none; color: var(--text-dim); cursor: pointer;
            font-size: 16px; padding: 5px; transition: 0.2s;
        }
        .mini-btn:hover { color: var(--gold-bright); }

        /* ВАУ: Большой круглый портрет по центру */
        .ruler-img-wrap {
            width: 220px; height: 220px; border-radius: 50%;
            border: 4px solid var(--accent);
            padding: 8px; /* Отступ */
            background: var(--bg-dark);
            box-shadow: 0 10px 30px rgba(212,175,55,0.3);
            margin-bottom: 25px;
            display: flex; justify-content: center; align-items: center;
        }

        .ruler-img { 
            width: 100%; height: 100%; object-fit: cover; 
            border-radius: 50%; 
        }

        /* Информация правителя */
        .ruler-display-name {
            font-family: var(--font-serif); font-size: 36px; color: #fff;
            margin: 0;
        }

        .ruler-display-years {
            font-size: 16px; color: var(--accent); font-weight: bold;
            display: block; margin: 10px 0 25px 0;
            font-style: italic;
        }

        /* Описание деяний */
        .ruler-display-desc {
            font-size: 15px; line-height: 1.8; color: var(--text-dim);
            text-align: justify;
            max-width: 600px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        /* Адаптация для мобильных */
        @media (max-width: 900px) {
            .archive-wrapper { grid-template-columns: 1fr; }
            .creator-panel { position: static; margin-bottom: 30px; }
            header { padding: 15px; }
            .page-header h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

<header>
    <a href="history.html" class="back-link"><i class="fa fa-chevron-left"></i> Назад к карте</a>
    <div class="logo-text">BRONZE ARCHIVE</div>
</header>

<div class="page-header">
    <h1 id="countryTitle">Летопись</h1>
</div>

<div class="archive-wrapper">
    <div class="creator-panel glass-panel">
        <h3>Добавить правителя</h3>
        <input type="text" id="rName" placeholder="Имя">
        <input type="text" id="rYears" placeholder="Годы правления">
        <input type="text" id="rPhoto" placeholder="Ссылка на портрет (URL)">
        <textarea id="rDesc" rows="6" placeholder="Великие деяния и история..."></textarea>
        <button class="btn-prime" onclick="addRuler()">Вписать в историю</button>
    </div>

    <div id="rulersDisplay" class="glass-panel view-panel">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, getDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Получаем параметры из URL (id страны)
    const urlParams = new URLSearchParams(window.location.search);
    const countryId = urlParams.get('id');
    const collectionRef = urlParams.get('coll') || 'historical_countries';

    // Загружаем название страны для заголовка
    async function loadCountryName() {
        if (!countryId) return;
        try {
            const docRef = doc(db, collectionRef, countryId);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                document.getElementById('countryTitle').innerText = snap.data().name;
            }
        } catch (e) { console.error("Ошибка загрузки заголовка", e); }
    }

    // Загружаем правителей (показываем самого последнего добавленного как главного)
    async function loadMainRuler() {
        const display = document.getElementById('rulersDisplay');
        display.innerHTML = "<div style='color:var(--accent); text-align:center;'>Открываем фолианты...</div>";
        
        try {
            // Показываем только одного последнего правителя для эффекта
            const q = query(
                collection(db, "rulers"), 
                where("countryId", "==", countryId),
                orderBy("createdAt", "desc"),
                limit(1)
            );
            const snap = await getDocs(q);
            
            display.innerHTML = "";
            
            if (snap.empty) {
                display.innerHTML = `
                    <div style="text-align: center; color: var(--text-dim); padding: 50px 0;">
                        <i class="fa fa-scroll" style="font-size: 50px; margin-bottom: 20px; color: var(--accent);"></i>
                        <p>В этом государстве еще нет известных правителей.</p>
                        <p style="font-size: 13px;">Используйте форму слева, чтобы создать первую летопись.</p>
                    </div>`;
                return;
            }

            snap.forEach(d => {
                const r = d.data();
                display.innerHTML = `
                    <div class="ruler-actions">
                        <button class="mini-btn"><i class="fa fa-pen"></i></button>
                        <button class="mini-btn" style="color:var(--danger)" onclick="deleteRuler('${d.id}')"><i class="fa fa-trash"></i></button>
                    </div>

                    <div class="ruler-img-wrap">
                        <img src="${r.photo || 'https://via.placeholder.com/150'}" class="ruler-img" onerror="this.src='https://via.placeholder.com/150?text=Portret+Amis'">
                    </div>
                    
                    <h2 class="ruler-display-name">${r.name}</h2>
                    <span class="ruler-display-years"><i class="fa fa-history"></i> ${r.years}</span>
                    
                    <div class="ruler-display-desc">
                        ${r.desc || 'Описание деяний утеряно в веках...'}
                    </div>

                    <i class="fa fa-chevron-down" style="color:var(--accent); margin-top:30px; font-size: 20px; opacity:0.5;"></i>
                `;
            });
        } catch (e) { 
            console.error("Ошибка загрузки", e); 
            display.innerHTML = "<div style='color:red'>Ошибка доступа. Проверьте индексы в Firebase.</div>";
        }
    }

    // Добавляем правителя
    window.addRuler = async function() {
        const name = document.getElementById('rName').value.trim();
        const years = document.getElementById('rYears').value.trim();
        const photo = document.getElementById('rPhoto').value.trim();
        const desc = document.getElementById('rDesc').value.trim();

        if (!name || !years) return alert("Введите имя и годы!");

        try {
            await addDoc(collection(db, "rulers"), {
                countryId,
                name,
                years,
                photo,
                desc,
                createdAt: Date.now()
            });

            // Очистка полей
            document.getElementById('rName').value = "";
            document.getElementById('rYears').value = "";
            document.getElementById('rPhoto').value = "";
            document.getElementById('rDesc').value = "";
            
            loadMainRuler();
        } catch (e) { alert("Ошибка сохранения!"); }
    }

    window.deleteRuler = async function(id) {
        if(confirm("Вычеркнуть правителя из истории навсегда?")) {
            await deleteDoc(doc(db, "rulers", id));
            loadMainRuler();
        }
    }

    loadCountryName();
    loadMainRuler();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Archive | Nations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #080a0f;
            --card-bg: rgba(17, 25, 40, 0.75);
            --accent-cyan: #00f2ff;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 255, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
        }

        header {
            padding: 40px; text-align: center;
        }

        h1 {
            font-size: 2.5rem; font-weight: 800; letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .main-container {
            max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: 360px 1fr;
            gap: 30px; padding: 20px;
        }

        /* Боковая панель (Form) */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            height: fit-content;
            position: sticky; top: 30px;
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--accent-cyan); }

        input, textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: #fff; padding: 14px;
            border-radius: 12px; width: 100%;
            margin-bottom: 15px; box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-cyan); outline: none; }

        .btn-submit {
            background: var(--accent-blue);
            color: white; border: none;
            padding: 16px; border-radius: 12px;
            width: 100%; cursor: pointer;
            font-weight: 600; transition: 0.3s;
        }

        .btn-submit:hover { background: #2563eb; transform: translateY(-2px); }

        /* Сетка карточек */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden; transition: 0.4s;
        }

        .card:hover { border-color: var(--accent-cyan); transform: translateY(-5px); }

        .card-img { width: 100%; height: 200px; object-fit: cover; }

        .card-body { padding: 25px; }

        .card-title { font-size: 1.5rem; margin: 0; font-weight: 700; }

        .card-meta { color: var(--accent-cyan); font-size: 0.85rem; font-weight: 600; margin-top: 5px; display: block; }

        .card-actions { display: flex; gap: 10px; margin-top: 20px; }

        .btn-secondary {
            flex: 1; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); color: #fff;
            padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s;
        }

        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        /* Модалка */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            z-index: 1000; padding: 40px; box-sizing: border-box;
        }

        .modal-content { max-width: 1100px; margin: 0 auto; position: relative; }

        .close-btn { position: absolute; top: -20px; right: 0; font-size: 2rem; cursor: pointer; color: var(--accent-cyan); }

        .ruler-entry {
            display: flex; gap: 20px; background: rgba(255,255,255,0.03);
            padding: 15px; border-radius: 16px; margin-bottom: 15px;
            border: 1px solid var(--border); align-items: center;
        }
    </style>
</head>
<body>

<header>
    <h1>NATION_ARCHIVE_v2</h1>
</header>

<div class="main-container">
    <aside class="glass-panel">
        <h2>[+] НОВАЯ ЗАПИСЬ</h2>
        <input type="text" id="cName" placeholder="Название нации">
        <input type="text" id="cFlag" placeholder="URL флага">
        <input type="text" id="cYears" placeholder="Период (2000 BC - 1000 AD)">
        <textarea id="cDesc" rows="4" placeholder="Краткий лог истории..."></textarea>
        <button class="btn-submit" onclick="addCountry()">СОХРАНИТЬ В БАЗУ</button>
    </aside>

    <main class="grid" id="countriesList">
        </main>
</div>

<div id="rulerModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalCountryName" style="font-size: 2rem; margin-bottom: 5px;"></h2>
        <p id="modalCountryYears" style="color: var(--accent-cyan); margin-bottom: 30px;"></p>

        <div style="display: grid; grid-template-columns: 320px 1fr; gap: 40px;">
            <div class="glass-panel" style="position: static; background: rgba(0,0,0,0.3);">
                <h3>НОВЫЙ ЛИДЕР</h3>
                <input type="text" id="rName" placeholder="Имя">
                <input type="text" id="rYears" placeholder="Годы правления">
                <input type="text" id="rPhoto" placeholder="URL портрета">
                <textarea id="rDesc" placeholder="Достижения..."></textarea>
                <button class="btn-submit" onclick="addRuler()">ДОБАВИТЬ</button>
            </div>
            <div id="rulersSubList">
                </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let activeCountryId = null;

    async function loadCountries() {
        const list = document.getElementById('countriesList');
        list.innerHTML = "";
        const snap = await getDocs(collection(db, "archive_nations"));
        snap.forEach(d => {
            const n = d.data();
            list.innerHTML += `
                <div class="card">
                    <img src="${n.flag || 'https://via.placeholder.com/400x200?text=Flag'}" class="card-img">
                    <div class="card-body">
                        <span class="card-meta">${n.years}</span>
                        <h3 class="card-title">${n.name}</h3>
                        <div class="card-actions">
                            <button class="btn-secondary" onclick="openRulers('${d.id}', '${n.name}', '${n.years}')">ЛИДЕРЫ</button>
                            <button class="btn-secondary" style="color:#ff4b4b" onclick="deleteCountry('${d.id}')">УДАЛИТЬ</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    window.addCountry = async function() {
        const name = document.getElementById('cName').value;
        const flag = document.getElementById('cFlag').value;
        const years = document.getElementById('cYears').value;
        const desc = document.getElementById('cDesc').value;
        if(!name) return;
        await addDoc(collection(db, "archive_nations"), { name, flag, years, desc });
        loadCountries();
    }

    window.deleteCountry = async function(id) {
        if(confirm("Удалить запись навсегда?")) {
            await deleteDoc(doc(db, "archive_nations", id));
            loadCountries();
        }
    }

    window.openRulers = function(id, name, years) {
        activeCountryId = id;
        document.getElementById('modalCountryName').innerText = name;
        document.getElementById('modalCountryYears').innerText = years;
        document.getElementById('rulerModal').style.display = "block";
        loadRulers();
    }

    window.closeModal = () => document.getElementById('rulerModal').style.display = "none";

    async function loadRulers() {
        const list = document.getElementById('rulersSubList');
        list.innerHTML = "";
        const q = query(collection(db, "rulers"), where("countryId", "==", activeCountryId));
        const snap = await getDocs(q);
        snap.forEach(d => {
            const r = d.data();
            list.innerHTML += `
                <div class="ruler-entry">
                    <img src="${r.photo || ''}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border: 2px solid var(--accent-cyan)">
                    <div style="flex:1">
                        <div style="font-weight:700">${r.name}</div>
                        <div style="font-size:0.8rem; color:var(--accent-cyan)">${r.years}</div>
                        <div style="font-size:0.85rem; opacity:0.7">${r.desc}</div>
                    </div>
                    <button onclick="deleteRuler('${d.id}')" style="background:none; border:none; color:#ff4b4b; cursor:pointer">&times;</button>
                </div>`;
        });
    }

    window.addRuler = async function() {
        const name = document.getElementById('rName').value;
        const years = document.getElementById('rYears').value;
        const photo = document.getElementById('rPhoto').value;
        const desc = document.getElementById('rDesc').value;
        await addDoc(collection(db, "rulers"), { countryId: activeCountryId, name, years, photo, desc });
        loadRulers();
    }

    window.deleteRuler = async function(id) {
        await deleteDoc(doc(db, "rulers", id));
        loadRulers();
    }

    loadCountries();
</script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LingoArchive Pro | Languages</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    :root { 
      --bg-main: #06090f;
      --bg-card: #111a2e;
      --text-main: #e8eefc;
      --text-muted: #a9b6d3;
      --accent: #3498db;
      --gold: #f1c40f;
      --error: #ff6b6b;
      --success: #2ecc71;
      --heart: #e74c3c;
    }

    body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-main); color: var(--text-main); }
    header { background:#111a2e; padding:16px; position:sticky; top:0; z-index: 100; border-bottom: 1px solid #1e2a44; }
    nav a { color: var(--text-main); margin-right:14px; text-decoration:none; font-weight:600; }
    
    main { max-width:900px; margin:auto; padding:24px; }
    .card { background: var(--bg-card); border-radius:14px; padding:20px; margin:16px 0; border: 1px solid #1e2a44; position: relative; }
    
    .btn { background: var(--accent); color: white; border: none; padding: 12px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
    .btn:hover { opacity: 0.8; }
    
    input, textarea { background:#000; border:1px solid #333; color:#fff; padding:12px; border-radius:8px; width:100%; box-sizing:border-box; outline:none; font-size: 16px; }
    
    /* Стили для экзамена */
    .test-word { font-size: 36px; color: var(--gold); margin: 20px 0; font-weight: bold; text-align: center; word-wrap: break-word; }
    
    .test-header-row { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 10px; 
        padding-bottom: 5px;
        border-bottom: 1px solid #1e2a44;
    }
    .test-q-count { font-size: 13px; color: var(--text-muted); margin: 0; }

    .feedback-note { background: #000; padding: 12px; border-radius: 8px; margin-top: 12px; border-left: 4px solid var(--accent); color: var(--text-muted); font-size: 14px; }
    .muted { color: var(--text-muted); font-size: 14px; }
    
    .fav-btn { cursor: pointer; font-size: 20px; transition: 0.2s; background: none; border: none; padding: 0; line-height: 1; }
    .fav-btn.active { color: var(--heart); }
    .fav-btn.inactive { color: #333; }

    .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    
    /* Стили для проверки дубликатов */
    .duplicate-warning { font-size: 12px; margin-top: 5px; display: none; align-items: center; gap: 5px; }
    .is-duplicate { color: var(--error); display: flex; }
    .is-unique { color: var(--success); display: flex; }

    @media (max-width: 600px) { 
        .add-grid { grid-template-columns: 1fr; }
        main { padding: 15px; }
        .test-word { font-size: 28px; margin: 15px 0; }
        .card { padding: 15px; }
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="index.html">🏠 Главная</a>
    <a href="coins.html">🪙 Монеты</a>
    <a href="languages.html" style="color:var(--gold)">📚 Языки</a>
    <a href="training.html">💪 Тренировки</a>
  </nav>
</header>

<main>
  <h1>📚 Мои Языки</h1>

  <div style="display:flex; gap:8px; margin-bottom:15px; flex-wrap: wrap;">
    <button class="btn" onclick="setLang('EN')">🇬🇧 EN</button>
    <button class="btn" onclick="setLang('DE')">🇩🇪 DE</button>
    <button class="btn" onclick="setLang('PL')">🇵🇱 PL</button>
    <button class="btn" onclick="setLang('ES')">🇪🇸 ES</button>
  </div>

  <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap: wrap;">
    <button class="btn" style="background:var(--gold); color:#000;" onclick="startTestMode(false)">
      <i class="fas fa-graduation-cap"></i> Экзамен (Все)
    </button>
    <button class="btn" style="background:var(--heart); color:#fff;" onclick="startTestMode(true)">
      <i class="fas fa-heart"></i> Экзамен (Избранное)
    </button>
  </div>

  <div id="testBox" class="card" style="display:none; border: 2px solid var(--gold);">
    <h2 id="testTitle" style="margin-top:0">📝 Экзамен</h2>
    <div id="setupTest" style="text-align: center; padding: 20px 0;">
        <p id="testStatusMsg" style="font-weight:bold; color:var(--accent)"></p>
        <label>Количество вопросов:</label><br>
        <input id="testCount" type="number" value="10" min="1" style="width:100px; margin:10px 0; text-align:center;"><br>
        <button class="btn btn-save" style="background:var(--success); color:white" onclick="beginTest()">Поехали!</button>
    </div>
    <div id="testArea"></div>
  </div>

  <div class="card" style="border: 1px solid var(--accent)">
    <h3 style="margin-top:0">➕ Добавить новое</h3>
    <div class="add-grid">
        <div>
            <input id="text" placeholder="Слово / Фраза" oninput="checkDuplicate(this.value)">
            <div id="dupMsg" class="duplicate-warning"></div>
        </div>
        <input id="translation" placeholder="Перевод">
    </div>
    <textarea id="note" placeholder="Заметка (необязательно)" rows="2"></textarea>
    <button class="btn" id="addBtn" style="width:100%; margin-top:10px" onclick="add()">Сохранить в базу</button>
  </div>

  <div style="display:flex; gap:10px; margin-bottom:20px">
    <button class="btn" style="background:#2c3e50" onclick="setType('words')">📝 Слова</button>
    <button class="btn" style="background:#2c3e50" onclick="setType('phrases')">💬 Фразы</button>
  </div>

  <h2 id="titleDisplay">Список</h2>
  <input id="search" placeholder="🔍 Поиск по списку..." oninput="applySearch()" style="margin-bottom:15px">

  <div id="list"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
    authDomain: "my-dashboard-dc67a.firebaseapp.com",
    projectId: "my-dashboard-dc67a",
    storageBucket: "my-dashboard-dc67a.firebasestorage.app",
    messagingSenderId: "710702954120",
    appId: "1:710702954120:web:f06b1038c48d3bd328913d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentLang = "EN";
let currentType = "words";
let fullSnapshotData = [];
let onlyFavoritesTest = false;

window.onload = () => { loadData(); };

// Функция мгновенной проверки на дубликат
window.checkDuplicate = (val) => {
    const msgDiv = document.getElementById("dupMsg");
    const addBtn = document.getElementById("addBtn");
    const cleanVal = val.trim().toLowerCase();

    if (cleanVal.length < 2) {
        msgDiv.style.display = "none";
        return;
    }

    const exists = fullSnapshotData.find(i => i.text.toLowerCase() === cleanVal);

    msgDiv.style.display = "flex";
    if (exists) {
        msgDiv.className = "duplicate-warning is-duplicate";
        msgDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> Уже есть в базе (${exists.translation})`;
        // addBtn.style.opacity = "0.5"; // Можно заблокировать кнопку, если нужно
    } else {
        msgDiv.className = "duplicate-warning is-unique";
        msgDiv.innerHTML = `<i class="fas fa-check-circle"></i> Новое слово`;
        addBtn.style.opacity = "1";
    }
};

async function loadData() {
  const list = document.getElementById("list");
  list.innerHTML = "<p class='muted'>Загрузка...</p>";
  document.getElementById("titleDisplay").innerText = `${currentLang} | ${currentType === 'words' ? 'Слова' : 'Фразы'}`;

  const q = query(collection(db, "languages"), where("lang", "==", currentLang), where("type", "==", currentType));
  
  try {
    const snapshot = await getDocs(q);
    fullSnapshotData = [];
    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      data.id = docSnap.id;
      fullSnapshotData.push(data);
    });
    renderList(fullSnapshotData);
  } catch (err) {
    list.innerHTML = "<p style='color:red'>Ошибка доступа.</p>";
  }
}

function renderList(items) {
  const list = document.getElementById("list");
  list.innerHTML = "";
  if (items.length === 0) { list.innerHTML = "<p class='muted'>Здесь пока ничего нет</p>"; return; }

  items.forEach((e, index) => {
    const isFav = e.favorite === true;
    list.innerHTML += `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <h3 style="margin:0">${index + 1}. ${e.text}</h3>
            <div style="display:flex; gap:12px; align-items:center;">
                <button class="fav-btn ${isFav ? 'active' : 'inactive'}" onclick="toggleFav('${e.id}', ${isFav})">
                    <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                </button>
                <button class="btn" style="background:none; color:var(--error); padding:0; width:auto;" onclick="removeItem('${e.id}')">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>
        <p style="font-size:18px; margin: 10px 0;"><b>${e.translation}</b></p>
        ${e.note ? `<div class="feedback-note">💡 ${e.note}</div>` : ""}
      </div>`;
  });
}

async function toggleFav(id, currentState) {
    const wordDoc = doc(db, "languages", id);
    await updateDoc(wordDoc, { favorite: !currentState });
    loadData();
}

async function add() {
  const valText = document.getElementById("text").value.trim();
  const valTrans = document.getElementById("translation").value.trim();
  const valNote = document.getElementById("note").value.trim();

  if (!valText || !valTrans) return alert("Заполни поля!");

  await addDoc(collection(db, "languages"), {
    lang: currentLang, type: currentType, text: valText, translation: valTrans, note: valNote, favorite: false, created: Date.now()
  });

  document.getElementById("text").value = "";
  document.getElementById("translation").value = "";
  document.getElementById("note").value = "";
  document.getElementById("dupMsg").style.display = "none";
  loadData();
}

window.applySearch = () => {
    const val = document.getElementById("search").value.toLowerCase();
    const filtered = fullSnapshotData.filter(i => i.text.toLowerCase().includes(val) || i.translation.toLowerCase().includes(val));
    renderList(filtered);
};

let testWords = [];
let testIndex = 0;

function startTestMode(favOnly) {
  onlyFavoritesTest = favOnly;
  const pool = favOnly ? fullSnapshotData.filter(i => i.favorite === true) : fullSnapshotData;
  
  if (pool.length === 0) {
      alert(favOnly ? "У вас нет избранных слов в этом разделе!" : "Список пуст!");
      return;
  }

  document.getElementById("testBox").style.display = "block";
  document.getElementById("setupTest").style.display = "block";
  document.getElementById("testStatusMsg").innerText = favOnly ? "Режим: Избранное ❤" : "Режим: Все слова";
  document.getElementById("testArea").innerHTML = "";
  window.scrollTo({top: 0, behavior: 'smooth'});
}

async function beginTest() {
  const countInput = document.getElementById("testCount");
  const count = Number(countInput.value);
  let pool = onlyFavoritesTest ? fullSnapshotData.filter(i => i.favorite === true) : fullSnapshotData;

  testWords = [...pool].sort(() => Math.random() - 0.5).slice(0, count);
  testIndex = 0;
  document.getElementById("setupTest").style.display = "none";
  showQuestion();
}

function showQuestion() {
  const area = document.getElementById("testArea");
  if (testIndex >= testWords.length) {
    area.innerHTML = `<div style="text-align:center; padding: 20px 0;"><h3>✅ Экзамен завершен!</h3><button class="btn" style="background:var(--success)" onclick="location.reload()">Завершить</button></div>`;
    return;
  }

  const word = testWords[testIndex];
  const isFav = word.favorite === true;

  area.innerHTML = `
    <div class="test-header-row">
        <p class="test-q-count">Вопрос ${testIndex + 1} из ${testWords.length}</p>
        <button class="fav-btn ${isFav ? 'active' : 'inactive'}" onclick="toggleFavInTest('${word.id}', ${isFav})">
            <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
        </button>
    </div>
    <div class="test-word">${word.text}</div>
    <button class="btn" style="width:100%; padding: 15px; justify-content: center;" onclick="revealAnswer()">Показать ответ</button>
    <div id="answerBox" style="display:none; margin-top: 20px; text-align:center;">
        <p style="font-size: 26px; color: var(--success); font-weight: bold; margin: 10px 0;">${word.translation}</p>
        ${word.note ? `<div class="feedback-note" style="text-align:left"><b>Заметка:</b><br>${word.note}</div>` : ""}
        <button class="btn" style="margin-top:20px; width:100%; background:var(--success); justify-content: center;" onclick="nextQuestion()">Дальше →</button>
    </div>
  `;
}

window.toggleFavInTest = async (id, currentState) => {
    const wordDoc = doc(db, "languages", id);
    const newState = !currentState;
    const btn = document.querySelector("#testArea .fav-btn");
    btn.className = `fav-btn ${newState ? 'active' : 'inactive'}`;
    btn.innerHTML = `<i class="${newState ? 'fas' : 'far'} fa-heart"></i>`;
    btn.onclick = () => toggleFavInTest(id, newState);

    await updateDoc(wordDoc, { favorite: newState });
    const wordInTest = testWords.find(w => w.id === id);
    if(wordInTest) wordInTest.favorite = newState;
    const wordInMain = fullSnapshotData.find(w => w.id === id);
    if(wordInMain) wordInMain.favorite = newState;
};

async function removeItem(id) {
  if(confirm("Удалить это слово навсегда?")) {
    await deleteDoc(doc(db, "languages", id));
    loadData();
  }
}

function revealAnswer() {
    document.getElementById("answerBox").style.display = "block";
    event.currentTarget.style.display = "none"; 
}

function nextQuestion() { testIndex++; showQuestion(); }
function setLang(l) { currentLang = l; loadData(); }
function setType(t) { currentType = t; loadData(); }

window.add = add; window.removeItem = removeItem; window.setLang = setLang; 
window.setType = setType; window.startTestMode = startTestMode; 
window.beginTest = beginTest; window.revealAnswer = revealAnswer; 
window.nextQuestion = nextQuestion; window.toggleFav = toggleFav;
</script>

</body>
</html>

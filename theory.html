<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingoArchive Pro | Ultimate German Prepositions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-main: #06090f; --bg-card: #111a2e; --text-main: #e8eefc;
            --accent: #3498db; --gold: #f1c40f; --success: #2ecc71; --error: #ff6b6b;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: var(--bg-card); border-radius:14px; padding:25px; border: 1px solid #1e2a44; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #1e2a44; padding-bottom: 20px; }
        
        .quiz-section-title { color: var(--gold); font-size: 20px; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--gold); padding-left: 15px; }
        
        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .quiz-row { background: #0c1221; padding: 15px; border-radius: 10px; border: 1px solid #1e2a44; display: flex; flex-direction: column; gap: 8px; transition: 0.3s; }
        .quiz-row:hover { border-color: var(--accent); }

        .input-wrap { display: flex; align-items: center; gap: 10px; }
        .quiz-input { background: rgba(0,0,0,0.4); border: none; border-bottom: 2px solid var(--accent); color: #fff; font-size: 17px; padding: 5px; width: 140px; outline: none; font-weight: bold; }
        .quiz-input.correct { border-bottom-color: var(--success); color: var(--success); }
        .quiz-input.wrong { border-bottom-color: var(--error); color: var(--error); }
        
        .hint { color: #a9b6d3; font-size: 13px; font-style: italic; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 15px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; width: 100%; margin-top: 40px; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .progress-bar { position: fixed; top: 0; left: 0; height: 5px; background: var(--gold); transition: width 0.3s; z-index: 1000; }
        .stats { background: var(--gold); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="progress-bar" id="progressBar" style="width: 0%"></div>

<div class="container">
    <div class="header-flex">
        <div>
            <a href="languages.html" style="color: var(--accent); text-decoration: none; font-size: 14px;">← НАЗАД В МЕНЮ</a>
            <h1 style="margin: 10px 0 0 0;">🇩🇪 Mega Prepositions Trainer</h1>
        </div>
        <div class="stats" id="scoreDisplay">Выполнено: 0%</div>
    </div>

    <div id="gameContent">
        </div>

    <button class="btn" onclick="checkAll()">ПРОВЕРИТЬ ВСЕ УПРАЖНЕНИЯ</button>
</div>

<script>
    const database = {
        "Wechselpräpositionen (Где? Dativ)": [
            { a: "auf dem", q: "Tisch", h: "На столе (поверхность)" },
            { a: "in der", q: "Küche", h: "В кухне (внутри)" },
            { a: "an der", q: "Wand", h: "На стене (вертикаль)" },
            { a: "vor dem", q: "Haus", h: "Перед домом" },
            { a: "hinter dem", q: "Haus", h: "За домом" },
            { a: "unter dem", q: "Bett", h: "Под кроватью" },
            { a: "neben dem", q: "Stuhl", h: "Рядом со стулом" },
            { a: "zwischen den", q: "Stühlen", h: "Между стульями (Plural)" },
            { a: "über dem", q: "Bild", h: "Над картиной" }
        ],
        "Wechselpräpositionen (Куда? Akkusativ)": [
            { a: "auf den", q: "Tisch", h: "На стол (поверхность)" },
            { a: "in die", q: "Küche", h: "В кухню (внутрь)" },
            { a: "an die", q: "Wand", h: "На стену (вертикаль)" },
            { a: "vor das", q: "Auto", h: "Перед машиной" },
            { a: "hinter die", q: "Tür", h: "За дверь" },
            { a: "unter das", q: "Bett", h: "Под кровать" },
            { a: "neben den", q: "Schrank", h: "Рядом со шкафом" },
            { a: "zwischen die", q: "Stühle", h: "Между стульями (Plural)" }
        ],
        "Путешествия (Nach / In / Zu)": [
            { a: "nach", q: "Berlin", h: "В Берлин (Город)" },
            { a: "nach", q: "Spanien", h: "В Испанию (Страна ср.р.)" },
            { a: "in die", q: "Schweiz", h: "В Швейцарию (Страна жен.р.)" },
            { a: "in die", q: "USA", h: "В США (Plural)" },
            { a: "in die", q: "Türkei", h: "В Турцию (Страна жен.р.)" },
            { a: "in die", q: "Berge", h: "В горы" },
            { a: "an das", q: "Meer", h: "На море (к воде)" },
            { a: "auf die", q: "Insel", h: "На остров" },
            { a: "zu", q: "mir", h: "Ко мне (человек)" },
            { a: "zu", q: "Oma", h: "К бабушке (человек)" },
            { a: "nach", q: "Hause", h: "Домой (Исключение)" },
            { a: "zu", q: "Hause", h: "Дома (Исключение)" }
        ],
        "Люди и Работа (Bei / Mit / Von)": [
            { a: "bei", q: "BMW", h: "В компании BMW (Где работаешь)" },
            { a: "beim", q: "Arzt", h: "У врача (Dativ)" },
            { a: "zum", q: "Arzt", h: "К врачу (Направление)" },
            { a: "mit dem", q: "Bruder", h: "С братом" },
            { a: "von", q: "meinem Vater", h: "От моего отца" },
            { a: "bei", q: "uns", h: "У нас (дома)" },
            { a: "mit der", q: "Mutter", h: "С матерью" }
        ],
        "Время и Транспорт": [
            { a: "um", q: "9 Uhr", h: "В 9 часов (время)" },
            { a: "am", q: "Montag", h: "В понедельник (день)" },
            { a: "im", q: "Januar", h: "В январе (месяц)" },
            { a: "im", q: "Sommer", h: "Летом (сезон)" },
            { a: "seit", q: "einem Jahr", h: "Уже год (с прошлого)" },
            { a: "vor", q: "zwei Tagen", h: "Два дня назад" },
            { a: "mit dem", q: "Bus", h: "На автобусе" },
            { a: "mit der", q: "Bahn", h: "На поезде/трамвае" }
        ],
        "Управление глаголов (Verben mit Präp)": [
            { a: "auf", q: "dich warten", h: "Ждать ТЕБЯ (Auf + Akk)" },
            { a: "an", q: "den Urlaub denken", h: "Думать об отпуске (An + Akk)" },
            { a: "von", q: "einem Auto träumen", h: "Мечтать о машине (Von + Dat)" },
            { a: "für", q: "Musik interessieren", h: "Интересоваться музыкой" },
            { a: "über", q: "das Geschenk freuen", h: "Радоваться подарку" },
            { a: "mit", q: "dir sprechen", h: "Говорить с тобой" }
        ]
    };

    function initGame() {
        const container = document.getElementById('gameContent');
        let html = '';

        for (const [section, exercises] of Object.entries(database)) {
            html += `<div class="quiz-section-title"><i class="fas fa-layer-group"></i> ${section}</div>`;
            html += `<div class="quiz-grid">`;
            
            exercises.forEach(ex => {
                html += `
                    <div class="quiz-row">
                        <div class="input-wrap">
                            <input type="text" class="quiz-input" data-answer="${ex.a}" placeholder="...">
                            <span style="font-weight:600">${ex.q}</span>
                        </div>
                        <div class="hint">${ex.h}</div>
                    </div>
                `;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    window.checkAll = function() {
        const inputs = document.querySelectorAll('.quiz-input');
        let correctCount = 0;

        inputs.forEach(input => {
            const user = input.value.trim().toLowerCase();
            const correct = input.dataset.answer.toLowerCase();

            if (user === correct) {
                input.classList.add('correct');
                input.classList.remove('wrong');
                correctCount++;
            } else {
                input.classList.add('wrong');
                input.classList.remove('correct');
                // Подсказка при ошибке
                input.title = `Правильно: ${correct}`;
            }
        });

        const percent = Math.round((correctCount / inputs.length) * 100);
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('scoreDisplay').innerText = `Выполнено: ${percent}%`;

        if (percent === 100) {
            alert("🔥 ПЕРФЕКТНО! Ты выучил все предлоги!");
        } else {
            alert(`Твой результат: ${percent}%. Ошибки подсвечены красным. Наведи на поле, чтобы увидеть ответ.`);
        }
    };

    initGame();
</script>

</body>
</html>

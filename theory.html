<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingoArchive Pro | Universal Trainer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-main: #06090f; --bg-card: #111a2e; --text-main: #e8eefc;
            --accent: #3498db; --gold: #f1c40f; --success: #2ecc71; --error: #ff6b6b;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 550px; width: 100%; }
        .card { background: var(--bg-card); border-radius:20px; padding:30px; border: 1px solid #1e2a44; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        
        .card-box { min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .prep-display { font-size: 42px; color: var(--gold); font-weight: bold; text-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        
        .quiz-input { background: rgba(0,0,0,0.3); border: 2px solid #1e2a44; color: #fff; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; font-size: 18px; text-align: center; outline: none; transition: 0.3s; }
        .quiz-input:focus { border-color: var(--accent); }

        .cat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
        .cat-btn { padding: 12px; border-radius: 10px; border: 1px solid #1e2a44; background: #1a2642; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 11px; }
        .cat-btn.active { background: var(--accent); border-color: #fff; transform: scale(1.05); }

        .btn-main { background: var(--success); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        
        .list-item { text-align: left; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #1e2a44; }
        .list-quest { font-size: 14px; color: #a9b6d3; margin-bottom: 8px; }

        .progress-text { font-size: 14px; color: #a9b6d3; margin-bottom: 10px; text-align: center; }
        .history-item { background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1e2a44; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .history-item:hover { border-color: var(--accent); background: #16223d; }
        
        .item-actions { display: flex; gap: 15px; align-items: center; padding-right: 10px; }
        .delete-btn { color: #5c6b89; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .delete-btn:hover { color: var(--error); }
        .play-btn { color: var(--gold); cursor: pointer; font-size: 20px; }

        .hidden { display: none; }
        textarea { background:#000; border:1px solid #333; color:#fff; padding:15px; border-radius:8px; width:100%; box-sizing:border-box; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupView">
        <h1 style="text-align:center">📘 Trainer Pro</h1>
        <div class="card">
            <h3>Создать тренировку</h3>
            <textarea id="theoryInput" rows="5" placeholder="Вставь данные..."></textarea>
            <button class="btn-main" style="background: var(--accent)" onclick="saveAndPlay()">💾 Сохранить и открыть</button>
        </div>
        <div id="historyList" style="margin-top:20px"></div>
    </div>

    <div id="gameView" class="hidden">
        <div class="progress-text" id="progressInfo">Загрузка...</div>
        <div id="dynamicContent"></div>
        <button onclick="exitGame()" style="background:none; border:none; color:#a9b6d3; cursor:pointer; margin-top:20px; width:100%">← Меню</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const currentLang = new URLSearchParams(window.location.search).get('lang') || 'DE';

    let cards = [];
    let currentIndex = 0;
    let selectedCategory = "";

    window.onload = loadThemes;

    async function loadThemes() {
        const q = query(collection(db, "theory"), where("lang", "==", currentLang));
        const snap = await getDocs(q);
        const list = document.getElementById('historyList');
        list.innerHTML = "<h3>Мои тренировки:</h3>";
        
        snap.forEach(docSnap => {
            const data = docSnap.data();
            const id = docSnap.id;
            const title = data.text.split('\n')[0].substring(0, 30);
            
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span style="flex:1; padding: 10px; cursor:pointer" onclick="window.launchGame('${id}')">${title}...</span>
                <div class="item-actions">
                    <i class="fas fa-trash-alt delete-btn" onclick="window.deleteItem('${id}')"></i>
                    <i class="fas fa-play play-btn" onclick="window.launchGame('${id}')"></i>
                </div>
            `;
            list.appendChild(div);
        });
    }

    window.deleteItem = async (id) => {
        if(confirm("Удалить это задание?")) {
            await deleteDoc(doc(db, "theory", id));
            loadThemes();
        }
    };

    window.launchGame = async (id) => {
        const docRef = doc(db, "theory", id);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            prepareGame(docSnap.data().text);
        }
    };

    window.saveAndPlay = async () => {
        const text = document.getElementById('theoryInput').value.trim();
        if(!text) return;
        const newDoc = await addDoc(collection(db, "theory"), { lang: currentLang, text: text, created: Date.now() });
        prepareGame(text);
    };

    function prepareGame(fullText) {
        const lines = fullText.split('\n').filter(l => l.trim() !== "");
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('gameView').classList.remove('hidden');
        
        if (lines[0].includes('|')) {
            cards = lines.map(line => {
                const parts = line.split('|').map(x => x.trim());
                return { prep: parts[0], trans: parts[1], cat: parts[2] };
            }).sort(() => Math.random() - 0.5);
            currentIndex = 0;
            renderCardUI();
            showCard();
        } else {
            renderListUI(lines);
        }
    }

    function renderCardUI() {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card card-box">
                <div id="prepDisplay" class="prep-display">---</div>
                <input type="text" id="userTrans" class="quiz-input" placeholder="Перевод...">
                <div class="cat-grid">
                    <button class="cat-btn" onclick="setCategory('D')">DATIV</button>
                    <button class="cat-btn" onclick="setCategory('A')">AKKUSATIV</button>
                    <button class="cat-btn" onclick="setCategory('W')">WECHSEL</button>
                </div>
                <button class="btn-main" onclick="nextCard()">ОТВЕТИТЬ</button>
            </div>`;
    }

    function showCard() {
        if (currentIndex >= cards.length) {
            alert("🎉 Готово!");
            exitGame();
            return;
        }
        selectedCategory = "";
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        const input = document.getElementById('userTrans');
        if(input) { input.value = ""; input.style.borderColor = "#1e2a44"; }
        
        const current = cards[currentIndex];
        document.getElementById('prepDisplay').innerText = current.prep;
        document.getElementById('progressInfo').innerText = `Карточка ${currentIndex + 1} из ${cards.length}`;
    }

    window.setCategory = (cat) => {
        selectedCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => {
            const isTarget = b.innerText.startsWith(cat === 'D' ? 'DATIV' : cat === 'A' ? 'AKKUSATIV' : 'WECHSEL');
            b.classList.toggle('active', isTarget);
        });
    };

    window.nextCard = () => {
        const userT = document.getElementById('userTrans').value.trim().toLowerCase();
        const current = cards[currentIndex];
        const isCorrectTrans = current.trans.toLowerCase().split(',').some(t => t.trim() === userT);
        const isCorrectCat = selectedCategory === current.cat;

        if (isCorrectTrans && isCorrectCat) {
            currentIndex++;
            showCard();
        } else {
            document.getElementById('userTrans').style.borderColor = "var(--error)";
            alert(`Ошибка!\nВерно: ${current.trans} (${current.cat})`);
            const failed = cards.splice(currentIndex, 1)[0];
            cards.push(failed);
            showCard();
        }
    };

    function renderListUI(lines) {
        document.getElementById('progressInfo').innerText = "Режим списка";
        let html = '<div class="card" style="text-align:left">';
        lines.forEach(line => {
            let parts = line.split('-');
            let quest = parts[1] ? parts[1].trim() : 'Напиши перевод';
            let ans = parts[0].replace(/_/g, ' ').trim();
            html += `
                <div class="list-item">
                    <div class="list-quest">${quest}</div>
                    <input type="text" class="list-input quiz-input" data-answer="${ans}" placeholder="...">
                </div>`;
        });
        html += `<button class="btn-main" onclick="checkList()">Проверить</button></div>`;
        document.getElementById('dynamicContent').innerHTML = html;
    }

    window.checkList = () => {
        document.querySelectorAll('.list-input').forEach(input => {
            const isCorrect = input.value.trim().toLowerCase() === input.dataset.answer.toLowerCase();
            input.style.borderColor = isCorrect ? "var(--success)" : "var(--error)";
            if(!isCorrect) input.value += ` (${input.dataset.answer})`;
        });
    };

    window.exitGame = () => { location.reload(); };
</script>
</body>
</html>

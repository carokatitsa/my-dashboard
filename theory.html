<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingoArchive Pro | Theory Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-main: #06090f; --bg-card: #111a2e; --text-main: #e8eefc;
            --accent: #3498db; --gold: #f1c40f; --success: #2ecc71; --error: #ff6b6b;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: var(--bg-card); border-radius:14px; padding:25px; border: 1px solid #1e2a44; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { background:#000; border:1px solid #333; color:#fff; padding:15px; border-radius:8px; width:100%; box-sizing:border-box; font-size: 14px; font-family: monospace; }
        
        /* Кнопки */
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); }

        /* Сетка упражнений */
        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .quiz-item { background: #0c1221; padding: 15px; border-radius: 10px; border-left: 4px solid var(--accent); }
        
        .quiz-input { background: transparent; border: none; border-bottom: 2px solid var(--accent); color: var(--gold); font-size: 18px; width: 120px; text-align: center; outline: none; font-weight: bold; }
        .correct { border-bottom-color: var(--success) !important; color: var(--success) !important; }
        .wrong { border-bottom-color: var(--error) !important; color: var(--error) !important; }

        /* История */
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #1e2a44; cursor: pointer; }
        .history-item:hover { background: rgba(52, 152, 219, 0.1); }
        
        .hidden { display: none; }
        .muted { color: #a9b6d3; font-size: 14px; }
        
        /* Табличный стиль */
        .theory-table { width: 100%; border-collapse: collapse; background: #0c1221; border-radius: 10px; overflow: hidden; }
        .theory-table th, .theory-table td { padding: 10px; border: 1px solid #1e2a44; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <a href="languages.html" style="color: var(--accent); text-decoration: none; font-weight: bold;">← В базу слов</a>
    <h1>📘 Theory Trainer: <span id="langName" style="color: var(--gold)">...</span></h1>

    <div id="setupView" class="card">
        <h3>Добавить новый блок знаний</h3>
        <p class="muted">Вставь готовый список упражнений или таблицу через |</p>
        <textarea id="theoryInput" rows="10" placeholder="Предлог_Артикль - Фраза (Подсказка)"></textarea>
        <div style="margin-top: 15px;">
            <button class="btn" style="background: var(--gold); color: #000;" onclick="saveAndPlay()">
                <i class="fas fa-save"></i> Сохранить в библиотеку
            </button>
        </div>
    </div>

    <div id="historyView" class="card">
        <h3>Твои упражнения</h3>
        <div id="historyList"></div>
    </div>

    <div id="gameView" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="gameTitle">Тренировка</h2>
            <button class="btn" style="background: #333;" onclick="exitGame()">Выход</button>
        </div>
        <div id="quizContainer"></div>
        <button class="btn" id="checkBtn" style="width: 100%; margin-top: 25px; background: var(--success); height: 50px;" onclick="checkQuiz()">Проверить всё</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const currentLang = urlParams.get('lang') || 'DE';
    document.getElementById('langName').innerText = currentLang;

    window.onload = loadThemes;

    async function loadThemes() {
        const q = query(collection(db, "theory"), where("lang", "==", currentLang));
        const snap = await getDocs(q);
        const list = document.getElementById('historyList');
        list.innerHTML = "";
        
        snap.forEach(docSnap => {
            const data = docSnap.data();
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span><i class="fas fa-layer-group"></i> <b>${data.text.split('\n')[0].substring(0, 40)}...</b></span>
                <button class="btn" style="padding: 5px 15px">Играть</button>
            `;
            div.onclick = () => startGame(data.text);
            list.appendChild(div);
        });
    }

    window.saveAndPlay = async () => {
        const text = document.getElementById('theoryInput').value.trim();
        if (!text) return alert("Пусто!");

        await addDoc(collection(db, "theory"), {
            lang: currentLang,
            text: text,
            created: Date.now()
        });

        document.getElementById('theoryInput').value = "";
        loadThemes();
        alert("Сохранено!");
    };

    function startGame(fullText) {
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('historyView').classList.add('hidden');
        document.getElementById('gameView').classList.remove('hidden');

        const container = document.getElementById('quizContainer');
        const lines = fullText.split('\n').filter(l => l.trim() !== "");
        
        if (lines[0].includes('|')) {
            // Режим Таблицы
            let html = '<table class="theory-table"><tbody>';
            lines.forEach(line => {
                const p = line.split('|').map(x => x.trim());
                html += `<tr><td style="color:var(--gold); font-weight:bold">${p[0]}</td>`;
                for(let i=1; i<p.length; i++) html += `<td><input type="text" class="quiz-input" style="width:70px" data-answer="${p[i]}"></td>`;
                html += `</tr>`;
            });
            container.innerHTML = html + '</tbody></table>';
        } else {
            // Режим Предлогов/Фраз
            let html = '<div class="quiz-grid">';
            lines.forEach(line => {
                let [ansPart, question] = line.split('-').map(x => x.trim());
                const realAnswer = ansPart.replace(/_/g, ' ');
                html += `
                    <div class="quiz-item">
                        <input type="text" class="quiz-input" data-answer="${realAnswer}" placeholder="...">
                        <div style="margin-top:5px; font-weight:600">${question}</div>
                    </div>`;
            });
            container.innerHTML = html + '</div>';
        }
    }

    window.checkQuiz = () => {
        const inputs = document.querySelectorAll('.quiz-input');
        inputs.forEach(input => {
            const user = input.value.trim().toLowerCase();
            const correct = input.dataset.answer.toLowerCase();
            if (user === correct) {
                input.className = "quiz-input correct";
            } else {
                input.className = "quiz-input wrong";
                input.title = "Верно: " + correct;
            }
        });
    };

    window.exitGame = () => {
        document.getElementById('setupView').classList.remove('hidden');
        document.getElementById('historyView').classList.remove('hidden');
        document.getElementById('gameView').classList.add('hidden');
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingoArchive Pro | Universal Trainer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-main: #06090f; --bg-card: #111a2e; --text-main: #e8eefc;
            --accent: #3498db; --gold: #f1c40f; --success: #2ecc71; --error: #ff6b6b;
            --row-orange: #ff9800; --row-bright-green: #00ff00; --row-dark-green: #689f38; --row-grey: #9e9e9e;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 650px; width: 100%; }
        .card { background: var(--bg-card); border-radius:20px; padding:30px; border: 1px solid #1e2a44; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        /* Стили для КАРТОЧЕК */
        .card-box { min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; text-align: center; }
        .prep-display { font-size: 42px; color: var(--gold); font-weight: bold; text-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
        .cat-btn { padding: 12px; border-radius: 10px; border: 1px solid #1e2a44; background: #1a2642; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 11px; }
        .cat-btn.active { background: var(--accent); border-color: #fff; transform: scale(1.05); }

        /* Стили для ЦВЕТНОЙ ТАБЛИЦЫ */
        .table-header { display: flex; gap: 5px; margin-bottom: 10px; font-weight: bold; }
        .header-cell { flex: 1; text-align: center; color: var(--gold); font-size: 18px; }
        .table-row { display: flex; gap: 5px; padding: 8px; border-radius: 5px; margin-bottom: 5px; }
        .table-row input { color: #000 !important; font-weight: bold; background: white; border: none; }

        /* Общие инпуты и кнопки */
        .quiz-input { background: rgba(0,0,0,0.3); border: 2px solid #1e2a44; color: #fff; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; font-size: 18px; text-align: center; outline: none; transition: 0.3s; }
        .quiz-input:focus { border-color: var(--accent); }
        .btn-main { background: var(--success); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }

        .list-item { text-align: left; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #1e2a44; }
        .list-quest { font-size: 14px; color: #a9b6d3; margin-bottom: 8px; }
        .history-item { background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1e2a44; display: flex; justify-content: space-between; align-items: center; }
        
        .hidden { display: none; }
        textarea { background:#000; border:1px solid #333; color:#fff; padding:15px; border-radius:8px; width:100%; box-sizing:border-box; margin-bottom: 10px; font-family: monospace; }
        .progress-text { font-size: 14px; color: #a9b6d3; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupView">
        <h1 style="text-align:center">📘 LingoArchive Pro</h1>
        <div class="card">
            <textarea id="theoryInput" rows="5" placeholder="Вставь данные..."></textarea>
            <button class="btn-main" style="background: var(--accent)" onclick="saveAndPlay()">💾 Сохранить и открыть</button>
        </div>
        <div id="historyList" style="margin-top:20px"></div>
    </div>

    <div id="gameView" class="hidden">
        <div class="progress-text" id="progressInfo"></div>
        <div id="dynamicContent"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:#a9b6d3; cursor:pointer; margin-top:20px; width:100%">← Меню</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const currentLang = new URLSearchParams(window.location.search).get('lang') || 'DE';

    let cards = [];
    let currentIndex = 0;
    let selectedCategory = "";

    window.onload = loadThemes;

    async function loadThemes() {
        const q = query(collection(db, "theory"), where("lang", "==", currentLang));
        const snap = await getDocs(q);
        const list = document.getElementById('historyList');
        list.innerHTML = "<h3>Мои тренировки:</h3>";
        snap.forEach(docSnap => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${docSnap.data().text.split('\n')[0].substring(0,30)}...</span>
                <div>
                    <i class="fas fa-trash" style="cursor:pointer; color:#5c6b89; margin-right:15px" onclick="window.delItem('${docSnap.id}')"></i>
                    <i class="fas fa-play" style="cursor:pointer; color:var(--gold); font-size:20px" onclick="window.launchGame('${docSnap.id}')"></i>
                </div>`;
            list.appendChild(div);
        });
    }

    window.delItem = async (id) => { if(confirm("Удалить?")) { await deleteDoc(doc(db, "theory", id)); loadThemes(); } };
    window.launchGame = async (id) => { 
        const docSnap = await getDoc(doc(db, "theory", id)); 
        if(docSnap.exists()) prepareGame(docSnap.data().text); 
    };

    window.saveAndPlay = async () => {
        const text = document.getElementById('theoryInput').value.trim();
        if(!text) return;
        await addDoc(collection(db, "theory"), { lang: currentLang, text: text, created: Date.now() });
        prepareGame(text);
    };

    function prepareGame(fullText) {
        const lines = fullText.split('\n').filter(l => l.trim() !== "");
        const cols = lines[0].split('|').length;
        
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('gameView').classList.remove('hidden');
        const container = document.getElementById('dynamicContent');

        // 1. КАРТОЧКИ (3 колонки)
        if (cols === 3) {
            cards = lines.map(line => {
                const p = line.split('|').map(x => x.trim());
                return { prep: p[0], trans: p[1], cat: p[2] };
            }).sort(() => Math.random() - 0.5);
            currentIndex = 0;
            renderCardUI();
            showCard();
        } 
        // 2. ЦВЕТНАЯ ТАБЛИЦА (4 колонки)
        else if (cols === 4) {
            renderTableUI(lines);
        }
        // 3. ОБЫЧНЫЙ СПИСОК (2 колонки)
        else {
            renderListUI(lines);
        }
    }

    // --- ЛОГИКА КАРТОЧЕК ---
    function renderCardUI() {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card card-box">
                <div id="prepDisplay" class="prep-display">---</div>
                <input type="text" id="userTrans" class="quiz-input" placeholder="Перевод...">
                <div class="cat-grid">
                    <button class="cat-btn" onclick="window.setCat('D')">DATIV</button>
                    <button class="cat-btn" onclick="window.setCat('A')">AKKUSATIV</button>
                    <button class="cat-btn" onclick="window.setCat('W')">WECHSEL</button>
                </div>
                <button class="btn-main" onclick="window.checkCard()">ОТВЕТИТЬ</button>
            </div>`;
    }

    function showCard() {
        if (currentIndex >= cards.length) { alert("Готово!"); location.reload(); return; }
        selectedCategory = "";
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        const input = document.getElementById('userTrans');
        input.value = ""; input.style.borderColor = "#1e2a44";
        document.getElementById('prepDisplay').innerText = cards[currentIndex].prep;
        document.getElementById('progressInfo').innerText = `Карточка ${currentIndex + 1} из ${cards.length}`;
    }

    window.setCat = (c) => { 
        selectedCategory = c; 
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText.startsWith(c === 'D' ? 'DATIV' : c === 'A' ? 'AKKUSATIV' : 'WECHSEL')));
    };

    window.checkCard = () => {
        const cur = cards[currentIndex];
        const isOk = cur.trans.toLowerCase().split(',').some(t => t.trim() === document.getElementById('userTrans').value.trim().toLowerCase());
        if (isOk && selectedCategory === cur.cat) { currentIndex++; showCard(); }
        else { alert(`Ошибка! Правильно: ${cur.trans} (${cur.cat})`); cards.push(cards.splice(currentIndex, 1)[0]); showCard(); }
    };

    // --- ЛОГИКА ЦВЕТНОЙ ТАБЛИЦЫ ---
    function renderTableUI(lines) {
        document.getElementById('progressInfo').innerText = "Personalpronomen";
        let html = '<div class="card"><div class="table-header"><div class="header-cell">N</div><div class="header-cell">G</div><div class="header-cell">D</div><div class="header-cell">A</div></div>';
        lines.forEach((line, i) => {
            const parts = line.split('|').map(p => p.trim());
            const colors = ['row-orange', 'row-orange', 'row-bright-green', 'row-bright-green', 'row-bright-green', 'row-dark-green', 'row-dark-green', 'row-grey', 'row-grey'];
            html += `<div class="table-row" style="background:var(--${colors[i] || 'row-grey'})">`;
            parts.forEach(p => html += `<div style="flex:1"><input type="text" class="quiz-input table-input" data-ans="${p}" placeholder="..."></div>`);
            html += `</div>`;
        });
        html += '<button class="btn-main" onclick="window.checkAllTable()">Проверить всё</button></div>';
        document.getElementById('dynamicContent').innerHTML = html;
    }

    window.checkAllTable = () => {
        document.querySelectorAll('.table-input').forEach(i => {
            const ok = i.value.trim().toLowerCase() === i.dataset.ans.toLowerCase();
            i.style.background = ok ? "#2ecc71" : "#ff6b6b";
            if(!ok) i.value = i.dataset.ans;
        });
    };

    // --- ЛОГИКА СПИСКА ---
    function renderListUI(lines) {
        document.getElementById('progressInfo').innerText = "Упражнение";
        let html = '<div class="card">';
        lines.forEach(line => {
            const p = line.split('|').map(x => x.trim());
            html += `<div class="list-item"><div class="list-quest">${p[1] || '...'}</div><input type="text" class="quiz-input list-input" data-ans="${p[0]}" placeholder="Ответ..."></div>`;
        });
        html += '<button class="btn-main" onclick="window.checkList()">Проверить</button></div>';
        document.getElementById('dynamicContent').innerHTML = html;
    }

    window.checkList = () => {
        document.querySelectorAll('.list-input').forEach(i => {
            const ok = i.value.trim().toLowerCase() === i.dataset.ans.toLowerCase();
            i.style.borderColor = ok ? "var(--success)" : "var(--error)";
            if(!ok) i.value += ` (${i.dataset.ans})`;
        });
    };
</script>
</body>
</html>

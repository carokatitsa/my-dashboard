<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingoArchive Pro | Universal Trainer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-main: #06090f; --bg-card: #111a2e; --text-main: #e8eefc;
            --accent: #3498db; --gold: #f1c40f; --success: #2ecc71; --error: #ff6b6b;
            /* Цвета строк из референса */
            --row-orange: #ff9800; --row-bright-green: #00ff00; --row-dark-green: #689f38; --row-grey: #9e9e9e;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 650px; width: 100%; }
        .card { background: var(--bg-card); border-radius:20px; padding:25px; border: 1px solid #1e2a44; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        
        /* Стили карточек */
        .card-box { min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .prep-display { font-size: 42px; color: var(--gold); font-weight: bold; }
        
        .quiz-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: #000; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; font-size: 14px; text-align: center; outline: none; font-weight: bold; }
        .quiz-input:focus { background: #fff; }

        .btn-main { background: var(--success); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        
        /* Стили Таблицы */
        .table-header { display: flex; gap: 5px; margin-bottom: 10px; font-weight: bold; color: var(--text-main); padding-left: 5px; }
        .header-cell { flex: 1; text-align: center; font-size: 18px; }
        .table-row { display: flex; gap: 5px; padding: 8px; border-radius: 5px; margin-bottom: 5px; align-items: center; }
        .cell { flex: 1; }

        /* Цвета для строк по индексам */
        .row-color-0, .row-color-1 { background-color: var(--row-orange); }
        .row-color-2, .row-color-3, .row-color-4 { background-color: var(--row-bright-green); }
        .row-color-5, .row-color-6 { background-color: var(--row-dark-green); }
        .row-color-7, .row-color-8 { background-color: var(--row-grey); }

        .progress-text { font-size: 14px; color: #a9b6d3; margin-bottom: 10px; text-align: center; }
        .history-item { background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1e2a44; display: flex; justify-content: space-between; align-items: center; }
        .play-btn { color: var(--gold); cursor: pointer; font-size: 20px; }
        .delete-btn { color: #5c6b89; cursor: pointer; margin-right: 15px; }

        .hidden { display: none; }
        textarea { background:#000; border:1px solid #333; color:#fff; padding:15px; border-radius:8px; width:100%; box-sizing:border-box; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupView">
        <h1 style="text-align:center">📘 LingoArchive Pro</h1>
        <div class="card">
            <h3>Создать упражнение</h3>
            <textarea id="theoryInput" rows="5" placeholder="ich | mein | mir | mich"></textarea>
            <button class="btn-main" style="background: var(--accent)" onclick="saveAndPlay()">💾 Сохранить и открыть</button>
        </div>
        <div id="historyList" style="margin-top:20px"></div>
    </div>

    <div id="gameView" class="hidden">
        <div class="progress-text" id="progressInfo">Упражнение</div>
        <div id="dynamicContent"></div>
        <button onclick="exitGame()" style="background:none; border:none; color:#a9b6d3; cursor:pointer; margin-top:20px; width:100%">← В меню</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const currentLang = new URLSearchParams(window.location.search).get('lang') || 'DE';

    let cards = [];
    let currentIndex = 0;

    window.onload = loadThemes;

    async function loadThemes() {
        const q = query(collection(db, "theory"), where("lang", "==", currentLang));
        const snap = await getDocs(q);
        const list = document.getElementById('historyList');
        list.innerHTML = "<h3>Мои тренировки:</h3>";
        snap.forEach(docSnap => {
            const data = docSnap.data();
            const id = docSnap.id;
            const title = data.text.split('\n')[0].substring(0, 30);
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${title}...</span><div class="item-actions">
                <i class="fas fa-trash-alt delete-btn" onclick="window.deleteItem('${id}')"></i>
                <i class="fas fa-play play-btn" onclick="window.launchGame('${id}')"></i>
            </div>`;
            list.appendChild(div);
        });
    }

    window.deleteItem = async (id) => {
        if(confirm("Удалить?")) { await deleteDoc(doc(db, "theory", id)); loadThemes(); }
    };

    window.launchGame = async (id) => {
        const docSnap = await getDoc(doc(db, "theory", id));
        if (docSnap.exists()) prepareGame(docSnap.data().text);
    };

    window.saveAndPlay = async () => {
        const text = document.getElementById('theoryInput').value.trim();
        if(!text) return;
        await addDoc(collection(db, "theory"), { lang: currentLang, text: text, created: Date.now() });
        prepareGame(text);
    };

    function prepareGame(fullText) {
        const lines = fullText.split('\n').filter(l => l.trim() !== "");
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('gameView').classList.remove('hidden');
        
        // Если в строке 2 палки (3 части) — это карточки. Иначе — ТАБЛИЦА.
        const isCardFormat = lines[0].split('|').length === 3;

        if (isCardFormat) {
            cards = lines.map(line => {
                const parts = line.split('|').map(x => x.trim());
                return { prep: parts[0], trans: parts[1], cat: parts[2] };
            }).sort(() => Math.random() - 0.5);
            renderCardUI();
        } else {
            renderTableUI(lines);
        }
    }

    function renderTableUI(lines) {
        document.getElementById('progressInfo').innerText = "Personalpronomen";
        let html = '<div class="card" style="text-align:left; max-height: 85vh; overflow-y: auto;">';
        
        // Заголовок таблицы один раз сверху
        html += `
            <div class="table-header">
                <div class="header-cell">N</div>
                <div class="header-cell">G</div>
                <div class="header-cell">D</div>
                <div class="header-cell">A</div>
            </div>`;
        
        lines.forEach((line, index) => {
            const parts = line.split('|').map(p => p.trim());
            // Класс цвета строки (циклично или по индексу как в референсе)
            const colorClass = `row-color-${index}`;
            
            html += `<div class="table-row ${colorClass}">`;
            parts.forEach(part => {
                html += `
                    <div class="cell">
                        <input type="text" class="list-input quiz-input" 
                               data-answer="${part.replace(/_/g, ' ')}" 
                               placeholder="...">
                    </div>`;
            });
            html += `</div>`;
        });
        
        html += `<button class="btn-main" onclick="checkTable()">Проверить всё</button></div>`;
        document.getElementById('dynamicContent').innerHTML = html;
    }

    window.checkTable = () => {
        document.querySelectorAll('.list-input').forEach(input => {
            const user = input.value.trim().toLowerCase();
            const correct = input.dataset.answer.toLowerCase();
            const isCorrect = user === correct;
            if (isCorrect) {
                input.style.backgroundColor = "#2ecc71";
                input.style.color = "#fff";
            } else {
                input.style.backgroundColor = "#ff6b6b";
                input.style.color = "#fff";
                input.value = input.dataset.answer;
            }
        });
    };

    window.exitGame = () => { location.reload(); };
</script>
</body>
</html>

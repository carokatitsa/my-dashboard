<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingoArchive Pro | Theory Trainer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-main: #06090f; --bg-card: #111a2e; --text-main: #e8eefc;
            --accent: #3498db; --gold: #f1c40f; --success: #2ecc71; --error: #ff6b6b;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: var(--bg-card); border-radius:14px; padding:20px; border: 1px solid #1e2a44; margin-bottom: 20px; }
        textarea { background:#000; border:1px solid #333; color:#fff; padding:12px; border-radius:8px; width:100%; box-sizing:border-box; font-size: 16px; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; }
        
        /* Стили тренажера */
        .quiz-item { margin-bottom: 25px; padding: 15px; background: #0c1221; border-radius: 10px; border-left: 4px solid var(--gold); }
        .quiz-text { font-size: 20px; margin-bottom: 10px; }
        .quiz-input { background: transparent; border: none; border-bottom: 2px solid var(--accent); color: var(--gold); font-size: 20px; width: 120px; text-align: center; outline: none; }
        .correct { border-bottom-color: var(--success) !important; color: var(--success) !important; }
        .wrong { border-bottom-color: var(--error) !important; color: var(--error) !important; }
        
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #1e2a44; cursor: pointer; }
        .history-item:hover { background: #1e2a44; }
        .hidden { display: none; }
        .muted { color: #a9b6d3; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <a href="languages.html" style="color: var(--accent); text-decoration: none; font-weight: bold;">← В базу слов</a>
    <h1>📘 Тренажер теории: <span id="langName">...</span></h1>

    <div id="setupView" class="card">
        <h3>Добавить новую тему</h3>
        <p class="muted">Впишите фразы (каждая с новой строки). Например:<br><i>ins Kino<br>nach Deutschland</i></p>
        <textarea id="theoryInput" rows="6" placeholder="Введите фразы для заучивания..."></textarea>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button class="btn" style="background: var(--gold); color: #000;" onclick="saveAndPlay()">
                <i class="fas fa-save"></i> Сохранить и Начать
            </button>
        </div>
    </div>

    <div id="historyView" class="card">
        <h3>Сохраненные темы</h3>
        <div id="historyList"></div>
    </div>

    <div id="gameView" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="gameTitle">Тренировка</h2>
            <button class="btn" style="background: #333;" onclick="exitGame()">Выход</button>
        </div>
        <div id="quizContainer"></div>
        <button class="btn" id="checkBtn" style="width: 100%; margin-top: 20px; background: var(--success);" onclick="checkQuiz()">Проверить ответы</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const currentLang = urlParams.get('lang') || 'EN';
    document.getElementById('langName').innerText = currentLang;

    let activePhrases = [];

    window.onload = loadThemes;

    // Загрузка тем из базы
    async function loadThemes() {
        const q = query(collection(db, "theory"), where("lang", "==", currentLang));
        const snap = await getDocs(q);
        const list = document.getElementById('historyList');
        list.innerHTML = "";
        
        snap.forEach(docSnap => {
            const data = docSnap.data();
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span><b>${data.text.split('\n')[0].substring(0, 30)}...</b> (${data.text.split('\n').length} фраз)</span>
                <i class="fas fa-play" style="color: var(--success)"></i>
            `;
            div.onclick = () => startGame(data.text);
            list.appendChild(div);
        });
    }

    // Сохранение
    window.saveAndPlay = async () => {
        const text = document.getElementById('theoryInput').value.trim();
        if (!text) return alert("Введите текст!");

        await addDoc(collection(db, "theory"), {
            lang: currentLang,
            text: text,
            created: Date.now()
        });

        document.getElementById('theoryInput').value = "";
        loadThemes();
        startGame(text);
    };

    // Запуск игры
    function startGame(fullText) {
        activePhrases = fullText.split('\n').filter(line => line.trim() !== "");
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('historyView').classList.add('hidden');
        document.getElementById('gameView').classList.remove('hidden');

        const container = document.getElementById('quizContainer');
        container.innerHTML = "";

        activePhrases.forEach((phrase, index) => {
            // Логика: разделяем фразу. Первое слово (артикль/предлог) прячем.
            const parts = phrase.trim().split(' ');
            const hiddenPart = parts[0]; // Например, "ins" или "nach"
            const rest = parts.slice(1).join(' '); // Например, "Kino" или "Deutschland"

            container.innerHTML += `
                <div class="quiz-item">
                    <div class="quiz-text">
                        <input type="text" class="quiz-input" data-answer="${hiddenPart}" placeholder="..."> 
                        <span>${rest}</span>
                    </div>
                </div>
            `;
        });
    }

    window.checkQuiz = () => {
        const inputs = document.querySelectorAll('.quiz-input');
        let correctCount = 0;

        inputs.forEach(input => {
            const userVal = input.value.trim().toLowerCase();
            const correctVal = input.dataset.answer.toLowerCase();

            if (userVal === correctVal) {
                input.className = "quiz-input correct";
                correctCount++;
            } else {
                input.className = "quiz-input wrong";
                input.value = `${userVal} (${correctVal})`;
            }
        });

        if (correctCount === activePhrases.length) {
            alert("Идеально! Все артикли и предлоги верны.");
        }
    };

    window.exitGame = () => {
        document.getElementById('setupView').classList.remove('hidden');
        document.getElementById('historyView').classList.remove('hidden');
        document.getElementById('gameView').classList.add('hidden');
    };

</script>
</body>
</html>

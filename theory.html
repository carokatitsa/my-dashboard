<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingoArchive Pro | Mastery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-main: #06090f; --bg-card: #111a2e; --text-main: #e8eefc;
            --accent: #3498db; --gold: #f1c40f; --success: #2ecc71; --error: #ff6b6b;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: var(--bg-card); border-radius:14px; padding:25px; border: 1px solid #1e2a44; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { background:#000; border:1px solid #333; color:#fff; padding:15px; border-radius:8px; width:100%; box-sizing:border-box; font-size: 14px; font-family: 'Courier New', monospace; }
        .btn { background: var(--accent); color: white; border: none; padding: 14px 22px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        
        .quiz-row { display: flex; align-items: center; gap: 15px; background: #0c1221; padding: 18px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid var(--accent); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .quiz-input { background: rgba(0,0,0,0.4); border: none; border-bottom: 2px solid var(--accent); color: var(--gold); font-size: 18px; padding: 5px; text-align: center; outline: none; width: 160px; font-weight: bold; }
        .correct { border-bottom-color: var(--success) !important; color: var(--success) !important; text-shadow: 0 0 8px rgba(46, 204, 113, 0.4); }
        .wrong { border-bottom-color: var(--error) !important; color: var(--error) !important; }
        
        .hint { color: #a9b6d3; font-size: 14px; font-style: italic; margin-left: auto; }
        .history-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #1e2a44; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .history-item:hover { background: rgba(52, 152, 219, 0.1); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <a href="languages.html" style="color: var(--accent); text-decoration: none; font-weight: bold; font-size: 14px;">← ВЕРНУТЬСЯ В АРХИВ</a>
    <h1 style="font-size: 28px; margin: 20px 0;">🇩🇪 Практика предлогов: <span id="langName" style="color: var(--gold);">...</span></h1>

    <div id="setupView" class="card">
        <h3>Новое упражнение</h3>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 15px;">Создавай фразы в формате: <b>Предлог_Артикль - Фраза (Подсказка)</b></p>
        <textarea id="theoryInput" rows="8" placeholder="an_der - Haltestelle (На остановке)"></textarea>
        <div style="margin-top: 20px;">
            <button class="btn" style="background: var(--gold); color: #000;" onclick="saveAndPlay()">
                <i class="fas fa-play"></i> Начать тренировку
            </button>
        </div>
    </div>

    <div id="historyView" class="card">
        <h3>Твои сохраненные темы</h3>
        <div id="historyList"></div>
    </div>

    <div id="gameView" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 id="gameTitle" style="margin:0;">Заполни пропуски</h2>
            <button class="btn" style="background: #2c3e50;" onclick="exitGame()">Завершить</button>
        </div>
        <div id="quizContainer"></div>
        <button class="btn" id="checkBtn" style="width: 100%; margin-top: 30px; background: var(--success); font-size: 18px; height: 55px;" onclick="checkQuiz()">Проверить ответы</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDlZkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:f06b1038c48d3bd328913d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const urlParams = new URLSearchParams(window.location.search);
    const currentLang = urlParams.get('lang') || 'DE';
    document.getElementById('langName').innerText = currentLang;

    window.onload = loadThemes;

    async function loadThemes() {
        const q = query(collection(db, "theory"), where("lang", "==", currentLang));
        const snap = await getDocs(q);
        const list = document.getElementById('historyList');
        list.innerHTML = "";
        snap.forEach(docSnap => {
            const data = docSnap.data();
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span><i class="fas fa-book" style="margin-right:10px; color:var(--accent)"></i> ${data.text.split('\n')[0].substring(0, 50)}...</span><i class="fas fa-arrow-right"></i>`;
            div.onclick = () => startGame(data.text);
            list.appendChild(div);
        });
    }

    window.saveAndPlay = async () => {
        const text = document.getElementById('theoryInput').value.trim();
        if (!text) return alert("Впиши фразы!");
        await addDoc(collection(db, "theory"), { lang: currentLang, text: text, created: Date.now() });
        document.getElementById('theoryInput').value = "";
        loadThemes();
        startGame(text);
    };

    function startGame(fullText) {
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('historyView').classList.add('hidden');
        document.getElementById('gameView').classList.remove('hidden');

        const container = document.getElementById('quizContainer');
        const lines = fullText.split('\n').filter(l => l.trim() !== "");
        
        container.innerHTML = lines.map(line => {
            let [ansPart, rest] = line.split('-').map(x => x.trim());
            const realAnswer = ansPart.replace(/_/g, ' ');
            return `
                <div class="quiz-row">
                    <input type="text" class="quiz-input" data-answer="${realAnswer}" placeholder="...">
                    <span style="font-size: 18px;">${rest}</span>
                </div>`;
        }).join('');
    }

    window.checkQuiz = () => {
        const inputs = document.querySelectorAll('.quiz-input');
        let allCorrect = true;
        inputs.forEach(input => {
            const user = input.value.trim().toLowerCase();
            const correct = input.dataset.answer.toLowerCase();
            if (user === correct) {
                input.className = "quiz-input correct";
            } else {
                input.className = "quiz-input wrong";
                input.value = correct; // Показываем правильный ответ
                allCorrect = false;
            }
        });
        if(allCorrect) alert("🎉 Великолепно! Ты мастер предлогов!");
    };

    window.exitGame = () => {
        document.getElementById('setupView').classList.remove('hidden');
        document.getElementById('historyView').classList.remove('hidden');
        document.getElementById('gameView').classList.add('hidden');
    };
</script>
</body>
</html>

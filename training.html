<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Training Coach v1.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --gold: #f1c40f; --text: #e0e0e0; --accent: #3498db; --green: #2ecc71; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .workout-input-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        textarea { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 14px; resize: vertical; }
        
        .btn-analyze { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        
        .history-item { background: var(--card); border-left: 4px solid var(--gold); padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .exercise-block { background: #0d0d0d; padding: 12px; border-radius: 6px; margin-top: 10px; border: 1px solid #222; }
        .ex-name { color: var(--gold); font-weight: bold; font-size: 16px; display: block; margin-bottom: 5px; }
        
        .ai-advice { background: rgba(52, 152, 219, 0.1); border: 1px solid var(--accent); padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 13px; color: var(--accent); }
        .ai-advice.up { border-color: var(--green); color: var(--green); background: rgba(46, 204, 113, 0.1); }

        .stats-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: var(--card); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-box small { color: #888; font-size: 11px; text-transform: uppercase; }
        .stat-box b { display: block; font-size: 20px; color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h2>🧠 AI Тренер: Анализ Прогресса</h2>

    <div class="stats-row">
        <div class="stat-box">
            <small>Тоннаж за сегодня</small>
            <b id="todayTonnage">0 кг</b>
        </div>
        <div class="stat-box">
            <small>Тренировок в базе</small>
            <b id="totalWorkouts">0</b>
        </div>
    </div>

    <div class="workout-input-card">
        <label style="display:block; margin-bottom:10px; font-weight:bold;">Вставь отчет с тренировки:</label>
        <textarea id="rawWorkout" rows="10" placeholder="Жим обычный&#10;60 на 10 -> 70 на 8 -> 80 на 6, дроп сет 40 кг на 20"></textarea>
        <button class="btn-analyze" onclick="processWorkout()">Проанализировать и сохранить</button>
    </div>

    <div id="workoutHistory"></div>
</div>

<script>
    // --- FIREBASE (Используй свои ключи) ---
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDLzkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:90e5e9a158f31d9728913d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let workoutLogs = [];

    // Подгрузка истории
    db.collection("workouts").orderBy("date", "desc").onSnapshot(snap => {
        workoutLogs = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderWorkouts();
    });

    async function processWorkout() {
        const text = document.getElementById('rawWorkout').value;
        if(!text.trim()) return;

        const dateStr = new Date().toLocaleDateString('ru-RU');
        const lines = text.split('\n').filter(l => l.trim() !== "");
        let workoutData = [];
        let totalWeight = 0;

        for (let i = 0; i < lines.length; i++) {
            // Если строка содержит цифры и "на", считаем это подходами
            if (lines[i].includes(' на ')) {
                const name = lines[i-1] || "Упражнение";
                const setsRaw = lines[i].split('->');
                
                let sets = setsRaw.map(s => {
                    const match = s.match(/(\d+[.,]?\d*)\s*(кг|на)?\s*(\d+)/);
                    if (match) {
                        const w = parseFloat(match[1]);
                        const r = parseInt(match[3]);
                        totalWeight += (w * r);
                        return { weight: w, reps: r };
                    }
                    return null;
                }).filter(s => s);

                workoutData.push({ name, sets });
            }
        }

        await db.collection("workouts").add({
            date: dateStr,
            exercises: workoutData,
            tonnage: totalWeight,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.getElementById('rawWorkout').value = "";
        alert("Тренировка сохранена! Анализирую...");
    }

    function renderWorkouts() {
        const container = document.getElementById('workoutHistory');
        const tonnageEl = document.getElementById('todayTonnage');
        const countEl = document.getElementById('totalWorkouts');
        
        container.innerHTML = "";
        countEl.innerText = workoutLogs.length;

        workoutLogs.forEach((w, index) => {
            if(index === 0) tonnageEl.innerText = Math.round(w.tonnage) + " кг";

            let exHtml = w.exercises.map(ex => {
                // Ищем это же упражнение в прошлой тренировке для AI-анализа
                const advice = getAIAdvice(ex, index);
                
                return `
                    <div class="exercise-block">
                        <span class="ex-name">${ex.name}</span>
                        <div style="font-size: 13px; color: #ccc;">
                            ${ex.sets.map(s => `${s.weight}кг x ${s.reps}`).join(' → ')}
                        </div>
                        <div class="ai-advice ${advice.includes('увеличить') ? 'up' : ''}">
                            🤖 ${advice}
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML += `
                <div class="history-item">
                    <b style="color:var(--gold)">${w.date}</b>
                    ${exHtml}
                </div>
            `;
        });
    }

    function getAIAdvice(currentEx, currentIndex) {
        // Ищем такое же упражнение в предыдущих тренировках
        let prevEx = null;
        for(let i = currentIndex + 1; i < workoutLogs.length; i++) {
            prevEx = workoutLogs[i].exercises.find(e => e.name === currentEx.name);
            if(prevEx) break;
        }

        if(!prevEx) return "Первая запись. Продолжай в том же духе!";

        // Сравниваем максимальный вес
        const currMax = Math.max(...currentEx.sets.map(s => s.weight));
        const prevMax = Math.max(...prevEx.sets.map(s => s.weight));
        
        // Сравниваем повторения на макс весе
        const currRepsOnMax = currentEx.sets.find(s => s.weight === currMax).reps;
        const prevRepsOnMax = prevEx.sets.find(s => s.weight === prevMax).reps;

        if (currMax > prevMax) return "Отлично! Ты увеличил рабочий вес. Закрепи результат на следующей тренировке.";
        
        if (currMax === prevMax) {
            if (currRepsOnMax > prevRepsOnMax) {
                return `Прогресс в повторах (+${currRepsOnMax - prevRepsOnMax}). На следующей тренировке попробуй добавить 2.5 кг!`;
            }
            if (currRepsOnMax >= 10) {
                return "Ты сделал 10+ повторений с этим весом. Пора увеличить вес на 2.5-5 кг!";
            }
            return "Вес тот же. Постарайся сделать на 1-2 повторения больше в следующий раз.";
        }

        return "Вес ниже обычного. Восстанавливайся и старайся вернуться к рабочим весам.";
    }
</script>

</body>
</html>

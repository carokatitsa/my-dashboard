<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Power Log AI v2.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --gold: #f1c40f; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --red: #f85149; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Стили карточек */
        .workout-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; }
        
        input, select { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        .set-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 10px; margin-bottom: 8px; align-items: center; }
        .btn-add-set { background: none; border: 1px dashed var(--blue); color: var(--blue); padding: 8px; cursor: pointer; width: 100%; border-radius: 6px; margin-bottom: 15px; }
        
        .btn-save { background: var(--green); color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
        
        /* Аналитика */
        .ai-card { background: rgba(88, 166, 255, 0.1); border: 1px solid var(--blue); padding: 15px; border-radius: 8px; margin-top: 15px; display: none; }
        .advice-up { color: var(--green); font-weight: bold; }
        
        .history-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-top: 15px; }
        .ex-tag { background: #21262d; padding: 4px 8px; border-radius: 4px; font-size: 12px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">🏋️ AI Тренировка</h2>

    <div class="workout-box">
        <div class="input-group">
            <label>Упражнение</label>
            <input type="text" id="exName" placeholder="Напр: Жим лежа" list="exList">
            <datalist id="exList">
                <option value="Жим обычный">
                <option value="Грудь в тренажере">
                <option value="Жим в наклоне">
                <option value="Брусья">
                <option value="Трицепс кнут">
            </datalist>
        </div>

        <label>Подходы (Вес | Повторы)</label>
        <div id="setsContainer">
            <div class="set-row">
                <input type="number" class="set-w" placeholder="кг">
                <input type="number" class="set-r" placeholder="раз">
                <button style="color:var(--red); border:none; background:none;" onclick="this.parentElement.remove()">✕</button>
            </div>
        </div>
        <button class="btn-add-set" onclick="addSetField()">+ Добавить подход</button>

        <div id="aiFeedback" class="ai-card"></div>
        
        <button class="btn-save" onclick="saveExercise()">СОХРАНИТЬ УПРАЖНЕНИЕ</button>
    </div>

    <h3 style="color:var(--gold)">Прогресс за сегодня</h3>
    <div id="todayList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDLzkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:90e5e9a158f31d9728913d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lastWorkoutData = null;

    function addSetField() {
        const div = document.createElement('div');
        div.className = 'set-row';
        div.innerHTML = `
            <input type="number" class="set-w" placeholder="кг">
            <input type="number" class="set-r" placeholder="раз">
            <button style="color:var(--red); border:none; background:none;" onclick="this.parentElement.remove()">✕</button>
        `;
        document.getElementById('setsContainer').appendChild(div);
    }

    async function saveExercise() {
        const name = document.getElementById('exName').value;
        const weights = document.getElementsByClassName('set-w');
        const reps = document.getElementsByClassName('set-r');
        
        let sets = [];
        let maxWeight = 0;

        for(let i=0; i<weights.length; i++) {
            if(weights[i].value) {
                const w = parseFloat(weights[i].value);
                const r = parseInt(reps[i].value);
                sets.push({w, r});
                if(w > maxWeight) maxWeight = w;
            }
        }

        if(!name || sets.length === 0) return alert("Заполни упражнение и подходы!");

        const today = new Date().toLocaleDateString('ru-RU');
        
        // 1. Ищем историю этого упражнения для анализа
        const historySnap = await db.collection("gym_logs")
            .where("name", "==", name)
            .orderBy("ts", "desc")
            .limit(1)
            .get();

        let advice = "Первая тренировка! Установим базу.";
        if(!historySnap.empty) {
            const last = historySnap.docs[0].data();
            advice = analyzeProgress(sets, last.sets);
        }

        // 2. Сохраняем
        await db.collection("gym_logs").add({
            name,
            sets,
            maxWeight,
            date: today,
            ts: firebase.firestore.FieldValue.serverTimestamp()
        });

        // 3. Показываем совет
        const fb = document.getElementById('aiFeedback');
        fb.style.display = "block";
        fb.innerHTML = `🤖 <b>AI Анализ:</b> ${advice}`;
        
        loadToday();
        alert("Упражнение записано!");
    }

    function analyzeProgress(currentSets, lastSets) {
        const currentMax = Math.max(...currentSets.map(s => s.w));
        const lastMax = Math.max(...lastSets.map(s => s.w));
        
        const currentTotalReps = currentSets.reduce((sum, s) => sum + s.r, 0);
        const lastTotalReps = lastSets.reduce((sum, s) => sum + s.r, 0);

        if (currentMax > lastMax) {
            return `<span class="advice-up">МОЩНО! Ты поднял новый вес (${currentMax}кг). Закрепи его 2 тренировки.</span>`;
        }
        
        if (currentMax === lastMax) {
            const currentRepsAtMax = currentSets.filter(s => s.w === currentMax).reduce((sum, s) => sum + s.r, 0);
            const lastRepsAtMax = lastSets.filter(s => s.w === lastMax).reduce((sum, s) => sum + s.r, 0);

            if (currentRepsAtMax > lastRepsAtMax) {
                return `<span class="advice-up">Прогресс! Сделал больше повторов. На следующей тренировке добавь +2.5 кг.</span>`;
            }
            return "Вес тот же. Попробуй накинуть 1-2 повторения в каждом подходе.";
        }

        return "Вес ниже прошлого. Возможно, нужен отдых. Не форсируй.";
    }

    async function loadToday() {
        const today = new Date().toLocaleDateString('ru-RU');
        const snap = await db.collection("gym_logs")
            .where("date", "==", today)
            .orderBy("ts", "desc")
            .get();
        
        const list = document.getElementById('todayList');
        list.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `
                <div class="history-card">
                    <b>${d.name}</b> <br>
                    <small>${d.sets.map(s => `${s.w}x${s.r}`).join(' → ')}</small>
                </div>
            `;
        });
    }

    window.onload = loadToday;
</script>
</body>
</html>

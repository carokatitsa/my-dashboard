<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym AI v3.1</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --gold: #f1c40f; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --red: #f85149; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        input { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .set-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 10px; margin-bottom: 10px; }
        .btn { border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-add { background: none; border: 1px dashed var(--blue); color: var(--blue); }
        .btn-save { background: var(--green); color: #fff; }
        .item { background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--gold)">🏋️ ТРЕНИРОВКА</h2>
    <div class="box">
        <input type="text" id="exName" placeholder="Упражнение (напр. Жим)">
        <div id="setsContainer">
            <div class="set-row">
                <input type="number" class="set-w" placeholder="кг">
                <input type="number" class="set-r" placeholder="раз">
                <button onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--red);">✕</button>
            </div>
        </div>
        <button class="btn btn-add" onclick="addSet()">+ Добавить подход</button>
        <button id="saveBtn" class="btn btn-save" onclick="saveData()">СОХРАНИТЬ</button>
    </div>
    <div id="list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDLzkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:90e5e9a158f31d9728913d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function addSet() {
        const div = document.createElement('div');
        div.className = 'set-row';
        div.innerHTML = `<input type="number" class="set-w" placeholder="кг"><input type="number" class="set-r" placeholder="раз"><button onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--red);">✕</button>`;
        document.getElementById('setsContainer').appendChild(div);
    }

    async function saveData() {
        const name = document.getElementById('exName').value;
        const w = document.getElementsByClassName('set-w');
        const r = document.getElementsByClassName('set-r');
        const btn = document.getElementById('saveBtn');
        
        let sets = [];
        for(let i=0; i<w.length; i++) {
            if(w[i].value && r[i].value) sets.push({w: w[i].value, r: r[i].value});
        }

        if(!name || sets.length === 0) return alert("Заполни поля!");

        btn.disabled = true;
        btn.innerText = "СВЯЗЬ С БАЗОЙ...";

        try {
            // Упрощенная отправка без сложных проверок
            await db.collection("gym_logs").add({
                name: name,
                sets: sets,
                ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Готово, бро!");
            location.reload();
        } catch (err) {
            console.error(err);
            alert("Ошибка! Открой консоль (F12) и посмотри текст ошибки.");
            btn.disabled = false;
            btn.innerText = "СОХРАНИТЬ";
        }
    }

    async function load() {
        const snap = await db.collection("gym_logs").orderBy("ts", "desc").limit(10).get();
        const list = document.getElementById('list');
        snap.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `<div class="item"><b>${d.name}</b><br><small>${d.sets.map(s => s.w+'кг x '+s.r).join(' | ')}</small></div>`;
        });
    }
    load();
</script>
</body>
</html>

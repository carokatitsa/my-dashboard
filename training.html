<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gym Coach v4.2</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --gold: #f1c40f; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --red: #f85149; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-size: 12px; text-transform: uppercase; font-weight: bold; }
        input { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; }
        input:focus { border-color: var(--blue); outline: none; }
        .set-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 8px; margin-bottom: 10px; }
        .btn { border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: none; border: 1px dashed var(--blue); color: var(--blue); }
        .btn-save { background: var(--green); color: #fff; }
        #aiBox { background: #000; border: 1px solid var(--gold); padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px; line-height: 1.5; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-top: 10px; position: relative; }
        .verdict-line { font-size: 12px; color: var(--gold); margin-top: 8px; font-style: italic; display: block; border-top: 1px solid var(--border); padding-top: 5px; }
        .ds { color: var(--red); font-size: 10px; font-weight: bold; border: 1px solid var(--red); padding: 1px 3px; border-radius: 3px; margin-left: 5px; }
        .btns { position: absolute; top: 15px; right: 10px; }
        .btn-m { background: none; border: none; cursor: pointer; filter: grayscale(1); margin-left: 10px; }
        .summary { background: rgba(88, 166, 255, 0.1); border: 1px solid var(--blue); padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--gold)">🏋️ AI ТРЕНИРОВКА</h2>
    
    <div id="aiBox"></div>
    <div id="statsBox" class="summary" style="display:none;"></div>

    <div class="box">
        <label>Дата тренировки</label>
        <input type="date" id="exDate">

        <label>Упражнение</label>
        <input type="text" id="exName" placeholder="Напр: Жим лежа" list="exList">
        <datalist id="exList">
            <option value="Жим обычный"><option value="Грудь на сиденьи"><option value="Брусья"><option value="Присед">
        </datalist>

        <label>Подходы</label>
        <div id="sets">
            <div class="set-row">
                <input type="number" class="sw" placeholder="кг">
                <input type="number" class="sr" placeholder="раз">
                <button onclick="this.parentElement.remove()" style="color:var(--red); background:none; border:none;">✕</button>
            </div>
        </div>
        
        <button class="btn btn-add" onclick="addSet()">+ Добавить подход</button>
        <button id="saveBtn" class="btn btn-save" onclick="save()">СОХРАНИТЬ</button>
    </div>

    <h3 id="listHeader" style="color:var(--gold)">Результаты за сегодня</h3>
    <div id="list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDLzkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:90e5e9a158f31d9728913d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let editId = null;

    // Установка сегодняшней даты в поле при загрузке
    const setTodayDate = () => {
        const d = new Date();
        const dateStr = d.toISOString().split('T')[0];
        document.getElementById('exDate').value = dateStr;
    };

    function addSet(w='', r='') {
        const div = document.createElement('div');
        div.className = 'set-row';
        div.innerHTML = `<input type="number" class="sw" value="${w}" placeholder="кг"><input type="number" class="sr" value="${r}" placeholder="раз"><button onclick="this.parentElement.remove()" style="color:var(--red); background:none; border:none;">✕</button>`;
        document.getElementById('sets').appendChild(div);
    }

    async function save() {
        const date = document.getElementById('exDate').value;
        const name = document.getElementById('exName').value.trim();
        const ws = document.getElementsByClassName('sw');
        const rs = document.getElementsByClassName('sr');
        const btn = document.getElementById('saveBtn');
        
        let sets = [];
        let curMaxW = 0, curMaxR = 0;

        for(let i=0; i<ws.length; i++) {
            let weight = parseFloat(ws[i].value);
            let reps = parseInt(rs[i].value);
            if(weight && reps) {
                let isDs = (i > 0 && weight < parseFloat(ws[i-1].value));
                sets.push({w: weight, r: reps, ds: isDs});
                if(weight > curMaxW) { curMaxW = weight; curMaxR = reps; }
                else if(weight === curMaxW && reps > curMaxR) { curMaxR = reps; }
            }
        }

        if(!name || !date || sets.length === 0) return alert("Заполни дату, название и подходы!");
        btn.disabled = true;

        try {
            const snap = await db.collection("gym_logs").where("name", "==", name).get();
            let history = snap.docs.map(d => d.data()).sort((a,b) => b.ts - a.ts);
            
            // Сравниваем с последней записью, у которой дата не совпадает с выбранной в инпуте
            let lastEx = history.find(h => h.date !== date);

            let advice = "Первая запись для анализа в будущем!";
            let verdict = "База упражнения создана. Жду прогресса!";

            if(lastEx) {
                const pMaxW = Math.max(...lastEx.sets.map(s => s.w));
                const pMaxR = Math.max(...lastEx.sets.filter(s => s.w === pMaxW).map(s => s.r));

                if(curMaxW > pMaxW) {
                    advice = `🔥 РЕКОРД ВЕСА! +${curMaxW-pMaxW}кг.`;
                    verdict = `Ты мощнее, чем в прошлый раз (${pMaxW}кг). Закрепи результат!`;
                } else if(curMaxW === pMaxW) {
                    if(curMaxR > pMaxR) {
                        advice = `📈 ПРОГРЕСС В ПОВТОРАХ! +${curMaxR-pMaxR} раз.`;
                        verdict = `При том же весе ты сделал больше раз. Накинь +2.5кг в следующий раз!`;
                    } else if (curMaxR < pMaxR) {
                        advice = `⚠️ СПАД. На ${pMaxR-curMaxR} раз меньше.`;
                        verdict = `Сегодня тяжелее обычного. Отдохни и восстановись.`;
                    } else {
                        advice = `💪 СТАБИЛЬНОСТЬ.`;
                        verdict = `Повторил результат прошлого раза. Попробуй экстра-повтор!`;
                    }
                } else {
                    advice = `🧘 ТЕХНИЧЕСКАЯ РАБОТА.`;
                    verdict = `Вес меньше пикового (${pMaxW}кг). Работаем над техникой.`;
                }
            }

            const data = { name, sets, date, ts: Date.now(), verdict, advice };

            if(editId) {
                await db.collection("gym_logs").doc(editId).update(data);
                editId = null;
            } else {
                await db.collection("gym_logs").add(data);
            }

            document.getElementById('aiBox').style.display = 'block';
            document.getElementById('aiBox').innerHTML = `🤖 <b>AI ВЕРДИКТ:</b> ${advice}<br>👉 ${verdict}`;
            
            document.getElementById('exName').value = '';
            document.getElementById('sets').innerHTML = `<div class="set-row"><input type="number" class="sw" placeholder="кг"><input type="number" class="sr" placeholder="раз"><button onclick="this.parentElement.remove()" style="color:var(--red); background:none; border:none;">✕</button></div>`;
            load();
        } catch (e) { alert("Ошибка!"); console.log(e); }
        btn.disabled = false;
        btn.innerText = "СОХРАНИТЬ";
    }

    async function load() {
        const selectedDate = document.getElementById('exDate').value;
        const snap = await db.collection("gym_logs").get();
        const list = document.getElementById('list');
        list.innerHTML = "";
        
        // Показываем записи только за выбранную дату
        const docs = snap.docs
            .filter(d => d.data().date === selectedDate)
            .sort((a,b) => b.data().ts - a.data().ts);

        const stats = document.getElementById('statsBox');
        document.getElementById('listHeader').innerText = `Результаты за ${selectedDate}`;

        if(docs.length > 0) {
            stats.style.display = 'block';
            let vol = 0;
            docs.forEach(doc => doc.data().sets.forEach(s => vol += s.w * s.r));
            stats.innerHTML = `📊 <b>Всего:</b> ${docs.length} упр. | <b>Объем:</b> ${vol} кг`;
        } else {
            stats.style.display = 'none';
            list.innerHTML = "<p style='text-align:center; opacity:0.5;'>На эту дату записей нет. 🦾</p>";
        }

        docs.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `
                <div class="card">
                    <b>${d.name}</b>
                    <div class="btns">
                        <button class="btn-m" onclick="edit('${doc.id}')">✏️</button>
                        <button class="btn-m" onclick="del('${doc.id}')">🗑️</button>
                    </div>
                    <br><small>${d.sets.map(s => `${s.w}×${s.r}${s.ds?'<span class="ds">DS</span>':''}`).join(' | ')}</small>
                    <span class="verdict-line">🤖 ${d.verdict}</span>
                </div>`;
        });
    }

    async function edit(id) {
        const doc = await db.collection("gym_logs").doc(id).get();
        const d = doc.data();
        document.getElementById('exDate').value = d.date;
        document.getElementById('exName').value = d.name;
        document.getElementById('sets').innerHTML = "";
        d.sets.forEach(s => addSet(s.w, s.r));
        editId = id;
        document.getElementById('saveBtn').innerText = "ОБНОВИТЬ";
        window.scrollTo(0,0);
    }

    async function del(id) {
        if(confirm("Удалить запись?")) { await db.collection("gym_logs").doc(id).delete(); load(); }
    }

    // Слушатель изменения даты: если меняешь дату в календаре, список ниже обновляется
    document.getElementById('exDate').addEventListener('change', load);

    window.onload = () => {
        setTodayDate();
        load();
    };
</script>
</body>
</html>

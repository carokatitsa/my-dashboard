<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gym Pro OS v5.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --gold: #f1c40f; --text: #c9d1d9; 
            --blue: #58a6ff; --green: #238636; --red: #f85149; --border: #30363d; 
        }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .sidebar { 
            width: 250px; background: #010409; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px; overflow-y: auto;
        }
        .sidebar h3 { color: var(--blue); font-size: 14px; text-transform: uppercase; margin-bottom: 15px; }
        .ex-item { 
            padding: 10px; border: 1px solid var(--border); border-radius: 8px; 
            margin-bottom: 8px; cursor: pointer; transition: 0.2s; font-size: 13px; background: rgba(255,255,255,0.03);
        }
        .ex-item:hover { background: var(--border); border-color: var(--gold); }

        /* ЦЕНТР */
        .main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .content-wrapper { width: 100%; max-width: 600px; }

        /* ВИДЖЕТ ДАТЫ И ОТЧЕТА */
        .status-panel {
            background: linear-gradient(145deg, #1c2128, #111827);
            border: 1px solid var(--blue); border-radius: 16px;
            padding: 20px; margin-bottom: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .status-header input { background: transparent; border: none; color: var(--blue); font-size: 18px; font-weight: bold; cursor: pointer; outline: none; }
        .ai-report-text { font-size: 14px; line-height: 1.6; color: #fff; font-style: italic; }
        .stats-badge { font-size: 12px; color: var(--gold); font-weight: bold; margin-top: 10px; display: block; }

        .box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        input[type="text"] { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; }
        
        .set-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 8px; margin-bottom: 10px; }
        .btn { border: none; padding: 14px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: none; border: 1px dashed var(--blue); color: var(--blue); margin-bottom: 10px; }
        .btn-save { background: var(--green); color: #fff; font-size: 16px; }
        .btn-save:active { transform: scale(0.98); }

        /* ГАРМОШКА ИСТОРИИ */
        .history-day { margin-bottom: 10px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .history-header { 
            background: #21262d; padding: 12px 15px; cursor: pointer; display: flex; 
            justify-content: space-between; align-items: center; font-weight: bold; font-size: 14px;
        }
        .history-header:hover { background: #30363d; }
        .history-content { background: #0d1117; display: none; padding: 10px; }
        .history-content.active { display: block; }

        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .card b { color: var(--gold); }
        .verdict-line { font-size: 11px; color: #8b949e; margin-top: 8px; display: block; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .main { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>📂 МОЯ БАЗА</h3>
    <div id="exerciseLibrary"></div>
</div>

<div class="main">
    <div class="content-wrapper">
        <div class="status-panel">
            <div class="status-header">
                <input type="date" id="exDate" onchange="loadHistory()">
                <span id="dayTone">⚡️ Готов к работе</span>
            </div>
            <div id="aiReport" class="ai-report-text">Выберите дату или сохраните упражнение, чтобы увидеть отчет за тренировку...</div>
            <div id="quickStats" class="stats-badge"></div>
        </div>

        <div class="box">
            <input type="text" id="exName" placeholder="Название упражнения...">
            <div id="sets">
                <div class="set-row">
                    <input type="number" class="sw" placeholder="кг">
                    <input type="number" class="sr" placeholder="раз">
                    <button onclick="this.parentElement.remove()" style="color:var(--red); background:none; border:none;">✕</button>
                </div>
            </div>
            <button class="btn btn-add" onclick="addSet()">+ Добавить подход</button>
            <button id="saveBtn" class="btn btn-save" onclick="save()">СОХРАНИТЬ РЕЗУЛЬТАТ</button>
        </div>

        <h3 style="color:var(--gold); font-size: 16px; margin-bottom: 15px;">📜 АРХИВ ТРЕНИРОВОК</h3>
        <div id="historyAccordion"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDLzkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:90e5e9a158f31d9728913d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let editId = null;

    // ОБНОВЛЕНИЕ БИБЛИОТЕКИ СЛЕВА
    async function updateLibrary() {
        const snap = await db.collection("gym_logs").get();
        const names = [...new Set(snap.docs.map(d => d.data().name))].sort();
        const lib = document.getElementById('exerciseLibrary');
        lib.innerHTML = names.map(n => `<div class="ex-item" onclick="autoFill('${n}')">➕ ${n}</div>`).join('');
    }

    async function autoFill(name) {
        document.getElementById('exName').value = name;
        const snap = await db.collection("gym_logs").where("name", "==", name).get();
        const history = snap.docs.map(d => d.data()).sort((a,b) => b.ts - a.ts);
        const last = history[0];
        const setsContainer = document.getElementById('sets');
        setsContainer.innerHTML = "";
        last.sets.forEach(s => addSet(s.w, s.r));
    }

    function addSet(w='', r='') {
        const div = document.createElement('div');
        div.className = 'set-row';
        div.innerHTML = `<input type="number" class="sw" value="${w}" placeholder="кг"><input type="number" class="sr" value="${r}" placeholder="раз"><button onclick="this.parentElement.remove()" style="color:var(--red); background:none; border:none;">✕</button>`;
        document.getElementById('sets').appendChild(div);
    }

    // СОХРАНЕНИЕ
    async function save() {
        const date = document.getElementById('exDate').value;
        const name = document.getElementById('exName').value.trim();
        const ws = document.getElementsByClassName('sw');
        const rs = document.getElementsByClassName('sr');
        const btn = document.getElementById('saveBtn');
        
        let sets = [];
        let curMaxW = 0, curMaxR = 0;
        for(let i=0; i<ws.length; i++) {
            let weight = parseFloat(ws[i].value);
            let reps = parseInt(rs[i].value);
            if(weight && reps) {
                sets.push({w: weight, r: reps});
                if(weight > curMaxW) { curMaxW = weight; curMaxR = reps; }
            }
        }

        if(!name || sets.length === 0) return alert("Заполни данные!");
        btn.disabled = true;

        const snap = await db.collection("gym_logs").where("name", "==", name).get();
        let history = snap.docs.map(d => d.data()).sort((a,b) => b.ts - a.ts);
        let lastEx = history.find(h => h.date !== date);

        let verdict = lastEx ? `Прошлый раз: ${Math.max(...lastEx.sets.map(s=>s.w))}кг. Погнали!` : "База создана!";

        const data = { name, sets, date, ts: Date.now(), verdict };
        if(editId) { await db.collection("gym_logs").doc(editId).update(data); editId = null; }
        else { await db.collection("gym_logs").add(data); }

        document.getElementById('exName').value = '';
        document.getElementById('sets').innerHTML = `<div class="set-row"><input type="number" class="sw" placeholder="кг"><input type="number" class="sr" placeholder="раз"><button onclick="this.parentElement.remove()" style="color:var(--red); background:none; border:none;">✕</button></div>`;
        btn.disabled = false;
        loadHistory();
        updateLibrary();
    }

    // ЗАГРУЗКА ИСТОРИИ С ГАРМОШКОЙ И ОТЧЕТОМ
    async function loadHistory() {
        const snap = await db.collection("gym_logs").get();
        const allData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        const grouped = {};

        // Группируем по датам
        allData.forEach(item => {
            if(!grouped[item.date]) grouped[item.date] = [];
            grouped[item.date].push(item);
        });

        const container = document.getElementById('historyAccordion');
        container.innerHTML = "";

        const sortedDates = Object.keys(grouped).sort().reverse();
        const selectedDate = document.getElementById('exDate').value;

        sortedDates.forEach(date => {
            const exercises = grouped[date];
            const isToday = date === selectedDate;
            let totalVolume = 0;
            exercises.forEach(ex => ex.sets.forEach(s => totalVolume += (s.w * s.r)));

            // Если это выбранная дата — обновляем отчет вверху
            if(isToday) {
                updateReport(exercises, totalVolume);
            }

            const section = document.createElement('div');
            section.className = 'history-day';
            section.innerHTML = `
                <div class="history-header" onclick="this.nextElementSibling.classList.toggle('active')">
                    <span>📅 ${date}</span>
                    <span style="color:var(--blue)">${exercises.length} упр. | ${totalVolume} кг ▾</span>
                </div>
                <div class="history-content ${isToday ? 'active' : ''}">
                    ${exercises.map(ex => `
                        <div class="card">
                            <b>${ex.name}</b>
                            <div style="position:absolute; top:10px; right:10px;">
                                <button onclick="edit('${ex.id}')" style="background:none; border:none; cursor:pointer;">✏️</button>
                                <button onclick="del('${ex.id}')" style="background:none; border:none; cursor:pointer;">🗑️</button>
                            </div>
                            <br><small>${ex.sets.map(s => `${s.w}×${s.r}`).join(' | ')}</small>
                            <span class="verdict-line">${ex.verdict}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(section);
        });

        if(!grouped[selectedDate]) {
            document.getElementById('aiReport').innerText = "На эту дату записей нет. Самое время потренироваться!";
            document.getElementById('quickStats').innerText = "";
        }
    }

    // ПИСЬМЕННЫЙ ОТЧЕТ
    function updateReport(exercises, volume) {
        const reportBox = document.getElementById('aiReport');
        const statsBox = document.getElementById('quickStats');
        const toneBox = document.getElementById('dayTone');

        let text = "";
        if(volume > 5000) {
            text = `Ого! Сегодня была по-настоящему тяжелая тренировка. Вы проделали огромный объем работы, задействовав ${exercises.length} упражнений. Основной фокус был на интенсивности.`;
            toneBox.innerText = "🔥 Режим Зверя";
        } else if(volume > 0) {
            text = `Хорошая техническая сессия. Вы выполнили ${exercises.length} упражнений. Такой объем отлично подходит для поддержания тонуса и отработки нейромышечной связи.`;
            toneBox.innerText = "💪 Продуктивно";
        }

        reportBox.innerText = text;
        statsBox.innerText = `📊 ИТОГО: ${volume} кг поднято за сегодня.`;
    }

    async function edit(id) {
        const doc = await db.collection("gym_logs").doc(id).get();
        const d = doc.data();
        document.getElementById('exDate').value = d.date;
        document.getElementById('exName').value = d.name;
        document.getElementById('sets').innerHTML = "";
        d.sets.forEach(s => addSet(s.w, s.r));
        editId = id;
        document.getElementById('saveBtn').innerText = "ОБНОВИТЬ";
        window.scrollTo(0,0);
    }

    async function del(id) {
        if(confirm("Удалить?")) { await db.collection("gym_logs").doc(id).delete(); loadHistory(); updateLibrary(); }
    }

    window.onload = () => {
        document.getElementById('exDate').value = new Date().toISOString().split('T')[0];
        loadHistory();
        updateLibrary();
    };
</script>
</body>
</html>

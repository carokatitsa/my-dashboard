<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gym Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --gold: #f1c40f; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --red: #f85149; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        input { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .set-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 8px; margin-bottom: 10px; }
        .btn { border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: none; border: 1px dashed var(--blue); color: var(--blue); }
        .btn-save { background: var(--green); color: #fff; }
        #aiBox { background: #000; border: 1px solid var(--gold); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-top: 10px; position: relative; }
        .ds { color: var(--red); font-size: 10px; font-weight: bold; border: 1px solid var(--red); padding: 1px 3px; border-radius: 3px; margin-left: 5px; }
        .btns { position: absolute; top: 15px; right: 10px; }
        .btn-m { background: none; border: none; cursor: pointer; filter: grayscale(1); margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--gold)">🏋️ AI ТРЕНИРОВКА</h2>
    
    <div id="aiBox"></div>

    <div class="box">
        <input type="text" id="exName" placeholder="Упражнение" list="exList">
        <datalist id="exList">
            <option value="Жим обычный"><option value="Грудь на сиденьи"><option value="Брусья">
        </datalist>

        <div id="sets">
            <div class="set-row">
                <input type="number" class="sw" placeholder="кг">
                <input type="number" class="sr" placeholder="раз">
                <button onclick="this.parentElement.remove()" style="color:var(--red); background:none; border:none;">✕</button>
            </div>
        </div>
        
        <button class="btn btn-add" onclick="addSet()">+ Добавить подход</button>
        <button id="saveBtn" class="btn btn-save" onclick="save()">СОХРАНИТЬ</button>
    </div>

    <h3 style="color:var(--gold)">Сегодняшний лог</h3>
    <div id="list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3QRDLzkS9-NnupC5KN65fMv1j39ZovsI",
        authDomain: "my-dashboard-dc67a.firebaseapp.com",
        projectId: "my-dashboard-dc67a",
        storageBucket: "my-dashboard-dc67a.firebasestorage.app",
        messagingSenderId: "710702954120",
        appId: "1:710702954120:web:90e5e9a158f31d9728913d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let editId = null;

    function addSet(w='', r='') {
        const div = document.createElement('div');
        div.className = 'set-row';
        div.innerHTML = `<input type="number" class="sw" value="${w}" placeholder="кг"><input type="number" class="sr" value="${r}" placeholder="раз"><button onclick="this.parentElement.remove()" style="color:var(--red); background:none; border:none;">✕</button>`;
        document.getElementById('sets').appendChild(div);
    }

    async function save() {
        const name = document.getElementById('exName').value.trim();
        const ws = document.getElementsByClassName('sw');
        const rs = document.getElementsByClassName('sr');
        const btn = document.getElementById('saveBtn');
        
        let sets = [];
        for(let i=0; i<ws.length; i++) {
            let weight = parseFloat(ws[i].value);
            let reps = parseInt(rs[i].value);
            if(weight && reps) {
                let isDs = (i > 0 && weight < parseFloat(ws[i-1].value));
                sets.push({w: weight, r: reps, ds: isDs});
            }
        }

        if(!name || sets.length === 0) return alert("Заполни всё!");
        btn.disabled = true;

        try {
            // AI часть: берем ВСЕ логи и фильтруем тут (чтобы не было ошибки индекса)
            const allLogs = await db.collection("gym_logs").get();
            let lastEx = allLogs.docs
                .map(d => d.data())
                .filter(d => d.name === name)
                .sort((a,b) => b.ts - a.ts)[0];

            let advice = "Красава! Первая запись есть.";
            if(lastEx) {
                const cMax = Math.max(...sets.map(s => s.w));
                const pMax = Math.max(...lastEx.sets.map(s => s.w));
                if(cMax > pMax) advice = `🔥 Рекорд! +${cMax-pMax}кг. Красавчик!`;
                else if(cMax === pMax) advice = `💪 Вес тот же. Жми больше повторов в следующий раз!`;
                else advice = `📈 Работаем на технику сегодня.`;
            }

            const data = { name, sets, date: new Date().toLocaleDateString('ru-RU'), ts: Date.now() };

            if(editId) {
                await db.collection("gym_logs").doc(editId).update(data);
                editId = null;
            } else {
                await db.collection("gym_logs").add(data);
            }

            document.getElementById('aiBox').style.display = 'block';
            document.getElementById('aiBox').innerHTML = `🤖 <b>AI:</b> ${advice}`;
            
            // Очистка
            document.getElementById('exName').value = '';
            document.getElementById('sets').innerHTML = `<div class="set-row"><input type="number" class="sw" placeholder="кг"><input type="number" class="sr" placeholder="раз"><button onclick="this.parentElement.remove()" style="color:var(--red); background:none; border:none;">✕</button></div>`;
            load();
        } catch (e) { alert("Ошибка!"); console.log(e); }
        btn.disabled = false;
        btn.innerText = "СОХРАНИТЬ";
    }

    async function load() {
        const today = new Date().toLocaleDateString('ru-RU');
        const snap = await db.collection("gym_logs").get();
        const list = document.getElementById('list');
        list.innerHTML = "";
        
        // Фильтруем сегодня прямо в коде
        const docs = snap.docs
            .filter(d => d.data().date === today)
            .sort((a,b) => b.data().ts - a.data().ts);

        docs.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `
                <div class="card">
                    <b>${d.name}</b><br>
                    <small>${d.sets.map(s => `${s.w}×${s.r}${s.ds?'<span class="ds">DS</span>':''}`).join(' | ')}</small>
                    <div class="btns">
                        <button class="btn-m" onclick="edit('${doc.id}')">✏️</button>
                        <button class="btn-m" onclick="del('${doc.id}')">🗑️</button>
                    </div>
                </div>`;
        });
    }

    async function edit(id) {
        const doc = await db.collection("gym_logs").doc(id).get();
        const d = doc.data();
        document.getElementById('exName').value = d.name;
        document.getElementById('sets').innerHTML = "";
        d.sets.forEach(s => addSet(s.w, s.r));
        editId = id;
        document.getElementById('saveBtn').innerText = "ОБНОВИТЬ";
        window.scrollTo(0,0);
    }

    async function del(id) {
        if(confirm("Удаляем?")) { await db.collection("gym_logs").doc(id).delete(); load(); }
    }

    window.onload = load;
</script>
</body>
</html>
